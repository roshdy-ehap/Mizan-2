function toggleSpuInput() {
  const type = document.getElementById('spu-type')?.value||'pct_up';
  const lbl  = document.getElementById('spu-val-lbl');
  if(!lbl) return;
  const lblMap = {pct_up:'نسبة الزيادة %',pct_dn:'نسبة التخفيض %',add:'المبلغ المضاف',sub:'المبلغ المطروح',set_margin:'هامش الربح %'};
  lbl.textContent = lblMap[type]||'القيمة';
}

function recalcMargin(pid) {
  const buy  = parseFloat(document.getElementById('spu-buy-'+pid)?.value||0);
  const sell = parseFloat(document.getElementById('spu-sell-'+pid)?.value||0);
  const mg   = document.getElementById('spu-mg-'+pid);
  if(!mg) return;
  if(buy>0 && sell>0) {
    const pct = ((sell-buy)/buy*100).toFixed(1);
    const color = pct>=20?'var(--green)':pct>=10?'var(--gold)':'var(--red)';
    mg.innerHTML = `<span style="color:${color};font-weight:700">${pct}%</span>`;
  } else { mg.textContent='—'; }
}

function applySupplierPrices(suppId) {
  const type   = document.getElementById('spu-type')?.value||'pct_up';
  const val2   = parseFloat(document.getElementById('spu-val')?.value||0);
  const target = document.getElementById('spu-target')?.value||'both';
  if(!val2||val2<=0) { toast('أدخل قيمة صحيحة','r'); return; }
  
  const prods = DB.products.filter(p=>p.supplierId===suppId||p.supplier===suppId||
    DB.suppliers.find(s=>s.id===suppId)?.name===p.supplierName);
  
  prods.forEach(p => {
    const calcNew = (price) => {
      let np = price||0;
      if(type==='pct_up')    np = np * (1 + val2/100);
      else if(type==='pct_dn') np = np * (1 - val2/100);
      else if(type==='add')  np = np + val2;
      else if(type==='sub')  np = Math.max(0, np - val2);
      else if(type==='set_margin' && target!=='buy') np = (p.buyPrice||0) * (1 + val2/100);
      return Math.round(np * 100) / 100;
    };
    
    const prod = DB.products.find(x=>x.id===p.id);
    if(!prod) return;
    
    if(target==='buy'||target==='both') {
      const nb = calcNew(prod.buyPrice||0);
      prod.buyPrice = nb;
      const inp = document.getElementById('spu-buy-'+p.id);
      if(inp) inp.value = nb;
    }
    if(target==='sell'||target==='both'||type==='set_margin') {
      const ns = type==='set_margin' ? (prod.buyPrice||0)*(1+val2/100) : calcNew(prod.sellPrice||0);
      prod.sellPrice = Math.round(ns*100)/100;
      const inp = document.getElementById('spu-sell-'+p.id);
      if(inp) inp.value = prod.sellPrice;
    }
    recalcMargin(p.id);
  });
  
  scheduleAutoSave();
  toast(`✅ تم تحديث أسعار ${prods.length} منتج`, 'g');
  log('مخزون', `تحديث أسعار مورد — ${type} ${val2}`);
}

function saveIndividualPrices(suppId) {
  const prods = DB.products.filter(p=>p.supplierId===suppId||p.supplier===suppId||
    DB.suppliers.find(s=>s.id===suppId)?.name===p.supplierName);
  let count=0;
  prods.forEach(p => {
    const prod = DB.products.find(x=>x.id===p.id);
    if(!prod) return;
    const nb = parseFloat(document.getElementById('spu-buy-'+p.id)?.value||prod.buyPrice||0);
    const ns = parseFloat(document.getElementById('spu-sell-'+p.id)?.value||prod.sellPrice||0);
    if(nb!==prod.buyPrice||ns!==prod.sellPrice){ prod.buyPrice=nb; prod.sellPrice=ns; count++; }
  });
  scheduleAutoSave();
  closeModalDirect();
  toast(`✅ تم حفظ تعديلات ${count} منتج`, 'g');
  log('مخزون', `تعديل فردي لأسعار مورد — ${count} منتج`);
}

let _selectedBizType = null;

function selectBizType(key) {
  _selectedBizType = key;
  // Highlight selected
  document.querySelectorAll('.biz-card').forEach(el => {
    el.style.borderColor = 'var(--border2)';
    el.style.background  = 'var(--raised)';
    el.style.transform   = 'scale(1)';
  });
  const bt  = BUSINESS_TYPES[key];
  const el  = document.getElementById('biz-'+key);
  if(el) {
    el.style.borderColor = bt.color;
    el.style.background  = bt.color+'18';
    el.style.transform   = 'scale(1.04)';
  }

  // Show detail
  const det = document.getElementById('biz-detail');
  if(det) {
    det.style.display = 'block';
    det.style.borderColor = bt.color+'50';
    document.getElementById('bd-icon').textContent = bt.icon;
    document.getElementById('bd-name').textContent = bt.name;
    const feats = [];
    if(bt.features.installments) feats.push('💳 أقساط');
    if(bt.features.loyalty)      feats.push('⭐ نقاط ولاء');
    if(bt.features.expiry)       feats.push('📅 تواريخ انتهاء');
    if(bt.features.barcode)      feats.push('📊 باركود');
    if(bt.features.warranty)     feats.push('🛡️ ضمان');
    if(bt.features.sessions)     feats.push('⏱️ جلسات');
    if(bt.features.recipes)      feats.push('📋 وصفات');
    document.getElementById('bd-features').textContent = feats.join(' • ');
    document.getElementById('bd-samples').innerHTML = bt.sampleProducts.map(p =>
      `<span style="background:var(--raised);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;font-size:11px;color:var(--txt2)">${p.emoji} ${p.name}</span>`
    ).join('') || '<span style="color:var(--txt3);font-size:12px">لا توجد منتجات جاهزة — ستبدأ فارغاً</span>';
  }

  // Enable confirm button
  const btn = document.getElementById('biz-confirm-btn');
  if(btn) { btn.disabled=false; btn.style.opacity='1'; }
}

function confirmBizType() {
  if(!_selectedBizType) return;
  const bt = BUSINESS_TYPES[_selectedBizType];

  // Save shop type
  DB.settings = DB.settings || {};
  DB.settings.shopType = _selectedBizType;
  DB.settings.shopTypeName = bt.name;
  DB.settings.shopTypeIcon = bt.icon;

  // Add default units if not set
  if(!DB.settings.units || !DB.settings.units.length) {
    DB.settings.units = bt.units;
  }

  // Add default categories
  if(!DB.categories) DB.categories = [];
  bt.categories.forEach(cat => {
    if(!DB.categories.find(c=>c===cat)) DB.categories.push(cat);
  });

  // Add sample products (only if no products exist)
  if(!DB.products.length && bt.sampleProducts.length) {
    bt.sampleProducts.forEach(p => {
      DB.products.push({
        id: genId(), ...p, active: true,
        barcode: '', minStock: 5, stockAdjustments: [], imgData: null
      });
    });
  }

  // Mark setup done
  localStorage.setItem('_mizan_setup_done','1');
  localStorage.setItem('_mizan_shop_type',_selectedBizType);

  // Save and close
  scheduleAutoSave();

  const overlay = document.getElementById('onboarding-overlay');
  if(overlay) {
    overlay.style.opacity='0';
    overlay.style.transition='opacity .4s';
    setTimeout(()=>{ if(overlay.parentNode) overlay.parentNode.removeChild(overlay); },400);
  }

  toast(`✅ تم ضبط النظام لـ ${bt.name}`, 'g');
  // Refresh current page
  try { go('dash'); } catch(e){}
}

function skipOnboarding() {
  localStorage.setItem('_mizan_setup_done','1');
  const overlay = document.getElementById('onboarding-overlay');
  if(overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
}



// ═══════════════════════════════════════════════════════════════════
//  🌐 SERVER SYNC — مزامنة مع Flask Server (متعدد المستخدمين)
// ═══════════════════════════════════════════════════════════════════
const SERVER = (function() {
  let _base = '';           // http://192.168.1.x:5000
  let _enabled = false;
  let _pollTimer = null;
  let _lastMtime = 0;
  let _saving = false;

  const SK = '_mizan_server_url';

  function getBase() { return localStorage.getItem(SK) || ''; }
  function setBase(url) {
    _base = url.replace(/\/$/,'');
    localStorage.setItem(SK, _base);
  }
  function isEnabled() { return !!getBase(); }

  // ── Auto-detect server on same machine ──
  async function autoDetect() {
    const candidates = [
      'http://localhost:5000',
      'http://127.0.0.1:5000',
    ];
    for(const url of candidates) {
      try {
        const r = await fetch(url+'/api/status', {signal: AbortSignal.timeout(800)});
        if(r.ok) { setBase(url); return url; }
      } catch(e) {}
    }
    return null;
  }

  // ── Load DB from server ──
  async function loadFromServer() {
    const base = getBase(); if(!base) return null;
    try {
      const r = await fetch(base+'/api/db', {signal: AbortSignal.timeout(3000)});
      if(!r.ok) return null;
      const text = await r.text();
      if(!text || text==='null') return null;
      return JSON.parse(text);
    } catch(e) { return null; }
  }

  // ── Save DB to server ──
  async function saveToServer(dbObj) {
    const base = getBase(); if(!base) return false;
    if(_saving) return false;
    _saving = true;
    try {
      const r = await fetch(base+'/api/db', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(dbObj),
        signal: AbortSignal.timeout(5000),
      });
      return r.ok;
    } catch(e) { return false; }
    finally { _saving = false; }
  }

  // ── Poll for changes from other devices ──
  function startPolling() {
    stopPolling();
    _pollTimer = setInterval(async () => {
      const base = getBase(); if(!base) return;
      try {
        const r = await fetch(base+'/api/db/version', {signal: AbortSignal.timeout(2000)});
        if(!r.ok) return;
        const {mtime} = await r.json();
        if(_lastMtime && mtime > _lastMtime + 0.5) {
          // Someone else saved — reload
          const newDB = await loadFromServer();
          if(newDB) {
            Object.keys(newDB).forEach(k => { if(k in DB) DB[k] = newDB[k]; });
            _lastMtime = mtime;
            // Refresh current page silently
            try { const p = document.getElementById('pageTitle')?.textContent; if(p) go(Object.keys({
              'لوحة التحكم':'dash','نقطة البيع':'pos','الفواتير':'invoices','العملاء':'customers',
              'المخزون':'inventory','التقارير':'reports','المصروفات':'expenses','الإعدادات':'settings',
            }).find(k=>({
              'لوحة التحكم':'dash','نقطة البيع':'pos','الفواتير':'invoices','العملاء':'customers',
              'المخزون':'inventory','التقارير':'reports','المصروفات':'expenses','الإعدادات':'settings',
            })[k]===document.getElementById('pageTitle')?.textContent?.trim()) || 'dash'); } catch(e){}
            showSyncBadge('🔄 تحديث من جهاز آخر');
          }
        }
      } catch(e) {}
    }, 4000); // كل 4 ثواني
  }

  function stopPolling() {
    if(_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
  }

  function showSyncBadge(msg) {
    const el = document.getElementById('server-sync-badge');
    if(!el) return;
    el.textContent = msg;
    el.style.opacity = '1';
    setTimeout(()=>{ el.style.opacity='0'; }, 3000);
  }

  // ── Create backup on server ──
  async function serverBackup(label) {
    const base = getBase(); if(!base) return false;
    try {
      const r = await fetch(base+`/api/backup?label=${encodeURIComponent(label||'manual')}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(DB),
        signal: AbortSignal.timeout(5000),
      });
      return r.ok;
    } catch(e) { return false; }
  }

  // ── Connect to server ──
  async function connect(url) {
    setBase(url);
    const data = await loadFromServer();
    if(data) {
      Object.keys(data).forEach(k => { if(k in DB) DB[k] = data[k]; });
      const r2 = await fetch(getBase()+'/api/db/version',{signal:AbortSignal.timeout(2000)}).then(r=>r.json()).catch(()=>({mtime:0}));
      _lastMtime = r2.mtime || 0;
      startPolling();
      return true;
    }
    return false;
  }

  // ── Settings UI ──
  function openServerSettings() {
    const url = getBase();
    const connected = !!url;
    openModal('🌐 إعداد Server الشبكة', `<div style="direction:rtl">
      <div style="background:${connected?'rgba(31,203,122,.06)':'rgba(200,168,75,.06)'};border:1px solid ${connected?'rgba(31,203,122,.25)':'rgba(200,168,75,.2)'};border-radius:12px;padding:14px;margin-bottom:16px">
        <div style="font-weight:700;font-size:13px;margin-bottom:4px;color:${connected?'var(--green)':'var(--gold)'}">
          ${connected?'✅ متصل بـ Server':'⚫ غير متصل'}
        </div>
        ${connected?`<div style="font-size:11px;color:var(--txt3);font-family:monospace">${url}</div>`:'<div style="font-size:11px;color:var(--txt3)">أدخل رابط الـ Server للاتصال بقاعدة البيانات المشتركة</div>'}
      </div>
      <div class="fg"><label class="flbl">🔗 رابط الـ Server</label>
        <input class="finput" id="srv-url" value="${url}" placeholder="http://192.168.1.100:5000">
      </div>
      <div style="font-size:11px;color:var(--txt3);margin:8px 0 16px;padding:10px;background:var(--raised);border-radius:8px;line-height:1.8">
        💡 <b>للاستخدام:</b><br>
        • شغّل server.exe على الجهاز الرئيسي<br>
        • الجهاز الرئيسي يفتح: http://localhost:5000<br>
        • باقي الأجهزة يفتحون: http://IP_الجهاز_الرئيسي:5000<br>
        • كل الأجهزة تشتغل على نفس البيانات
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-gold" style="flex:1" onclick="SERVER.testAndConnect()">🔗 اتصال واستيراد البيانات</button>
        <button class="btn btn-ghost" onclick="SERVER.autoDetect().then(u=>{ if(u){document.getElementById('srv-url').value=u;toast('✅ تم اكتشاف Server تلقائياً','g')}else{toast('لم يُعثر على Server','r')} })">🔍 بحث تلقائي</button>
      </div>
      ${connected?`<button class="btn btn-red" style="width:100%;margin-top:8px" onclick="SERVER.disconnect()">🔌 قطع الاتصال</button>`:''}
    </div>`,
    [{label:'إغلاق',cls:'btn-ghost',fn:'closeModalDirect()'}], false, true);
  }

  async function testAndConnect() {
    const url = (document.getElementById('srv-url')?.value||'').trim();
    if(!url){ toast('أدخل رابط الـ Server','r'); return; }
    toast('⏳ جاري الاتصال...','a');
    const ok = await connect(url);
    if(ok) {
      toast('✅ تم الاتصال وتحميل البيانات','g');
      closeModalDirect();
      scheduleAutoSave();
      try{ go('dash'); }catch(e){}
    } else {
      toast('❌ فشل الاتصال — تحقق من الرابط والشبكة','r');
    }
  }

  function disconnect() {
    stopPolling();
    localStorage.removeItem(SK);
    closeModalDirect();
    toast('تم قطع الاتصال بالـ Server','a');
    const badge = document.getElementById('server-sync-badge');
    if(badge) badge.style.opacity='0';
  }

  // ── Init on startup ──
  async function init() {
    const url = getBase();
    if(!url) return;
    const data = await loadFromServer();
    if(data) {
      Object.keys(data).forEach(k => { if(k in DB) DB[k] = data[k]; });
      const r2 = await fetch(url+'/api/db/version',{signal:AbortSignal.timeout(2000)}).then(r=>r.json()).catch(()=>({mtime:0}));
      _lastMtime = r2.mtime||0;
      startPolling();
      const el = document.getElementById('server-sync-badge');
      if(el){ el.textContent='🌐 Server'; el.style.opacity='1'; }
    }
  }

  return { init, connect, disconnect, isEnabled, getBase, autoDetect,
           loadFromServer, saveToServer, serverBackup, startPolling,
           stopPolling, openServerSettings, testAndConnect };
})();

// Hook SERVER.saveToServer into scheduleAutoSave
const _origAutoSave = scheduleAutoSave;
let _serverSaveTimer = null;
scheduleAutoSave = function() {
  _origAutoSave();
  if(SERVER.isEnabled()) {
    clearTimeout(_serverSaveTimer);
    _serverSaveTimer = setTimeout(async () => {
      const ok = await SERVER.saveToServer(DB);
      if(ok) {
        const el = document.getElementById('server-sync-badge');
        if(el){ el.textContent='✅ محفوظ'; el.style.opacity='1';
          setTimeout(()=>{el.style.opacity='0.4';},2000); }
      }
    }, 800);
  }
};

const BRANDING_KEY = '_mizan_branding';

function getBranding() {
  try {
    const d = JSON.parse(localStorage.getItem(BRANDING_KEY)||'{}');
    return {
      logoText: d.logoText || 'ميزان',
      logoEmoji: d.logoEmoji || '⚖️',
      theme: d.theme || 'dark_gold',
      primaryColor: d.primaryColor || '',
      shopName: d.shopName || '',
      tagline: d.tagline || 'نظام الإدارة المتكاملة',
      fontScale: d.fontScale || 1,
    };
  } catch(e) {
    return {logoText:'ميزان',logoEmoji:'⚖️',theme:'dark_gold',primaryColor:'',shopName:'',tagline:'نظام الإدارة المتكاملة',fontScale:1};
  }
}

function saveBranding(b) {
  localStorage.setItem(BRANDING_KEY, JSON.stringify(b));
}

function applyTheme(themeKey, primaryColor) {
  const theme = THEMES[themeKey] || THEMES.dark_gold;
  const root = document.documentElement;
  Object.entries(theme.vars).forEach(([k,v]) => root.style.setProperty(k, v));
  if(primaryColor) {
    root.style.setProperty('--gold', primaryColor);
    root.style.setProperty('--accent', primaryColor);
  }
}

function applyBranding() {
  const b = getBranding();
  // Apply theme
  applyTheme(b.theme, b.primaryColor);
  // Apply font scale
  if(b.fontScale && b.fontScale !== 1) {
    document.documentElement.style.fontSize = (b.fontScale * 16) + 'px';
  }
  // Update logo in login screen
  const logoIcon = document.querySelector('.login-logo-icon');
  if(logoIcon) logoIcon.textContent = b.logoEmoji;
  const logoTitle = document.querySelector('.login-title');
  if(logoTitle) logoTitle.textContent = b.shopName || b.logoText;
  const logoSub = document.querySelector('.login-sub');
  if(logoSub) logoSub.textContent = b.tagline;
  // Update nav brand if visible
  const brand = document.getElementById('nav-brand') || document.querySelector('.nav-brand');
  if(brand) brand.textContent = b.logoEmoji + ' ' + (b.shopName || b.logoText);
}

let _selectedTheme = getBranding().theme;

function selectTheme(key) {
  _selectedTheme = key;
  document.querySelectorAll('[id^="theme-card-"]').forEach(el => {
    const isThis = el.id === 'theme-card-'+key;
    el.style.borderColor  = isThis ? 'var(--gold)' : 'var(--border2)';
    el.style.background   = isThis ? 'var(--gold-bg)' : 'var(--raised)';
    el.querySelector('div:last-child').style.color = isThis ? 'var(--gold)' : 'var(--txt2)';
  });
  // Preview immediately
  applyTheme(key, document.getElementById('br-color-hex')?.value||'');
}

function saveBrandingSettings() {
  const colorHex = document.getElementById('br-color-hex')?.value?.trim();
  const b = {
    shopName:     document.getElementById('br-shop')?.value?.trim() || '',
    logoEmoji:    document.getElementById('br-emoji')?.value?.trim() || '⚖️',
    logoText:     document.getElementById('br-shop')?.value?.trim() || 'ميزان',
    tagline:      document.getElementById('br-tagline')?.value?.trim() || 'نظام الإدارة المتكاملة',
    theme:        _selectedTheme || 'dark_gold',
    primaryColor: colorHex || '',
    fontScale:    parseFloat(document.getElementById('br-font')?.value||'1'),
  };
  saveBranding(b);
  applyBranding();
  closeModalDirect();
  toast('✅ تم تطبيق الهوية البصرية', 'g');
  log('إعدادات', 'تغيير الهوية البصرية — '+b.theme);
}

function openEndOfDayReport() {
  const today   = new Date().toISOString().slice(0,10);
  const todayInvs = DB.invoices.filter(i => (i.date||i.created_at||'').slice(0,10) === today);
  const done    = todayInvs.filter(i => i.status==='done');
  const partial = todayInvs.filter(i => i.status==='partial');
  const returned= todayInvs.filter(i => i.status==='returned');

  const revenue = done.reduce((s,i) => s+(i.total||0), 0);
  const partRev = partial.reduce((s,i) => s+(i.paid||0), 0);
  const totalRev = revenue + partRev;
  const cost    = done.reduce((s,i) => s+i.items.reduce((ss,it) => ss+(it.buyPrice||0)*(it.qty||0),0),0);
  const profit  = revenue - cost;
  const discounts = done.reduce((s,i) => s+(i.discount||0),0);
  const deferred  = partial.reduce((s,i) => s+Math.max(0,(i.total||0)-(i.paid||0)),0);
  const todayExp = DB.expenses.filter(e => (e.date||e.created_at||'').slice(0,10)===today).reduce((s,e)=>s+(e.amount||0),0);
  const netProfit = profit - todayExp;

  // By cashier
  const byCashier = {};
  done.forEach(i => {
    const k = i.cashierName||i.cashierId||'غير محدد';
    if(!byCashier[k]) byCashier[k]={count:0,total:0,emoji:i.cashierEmoji||'👤'};
    byCashier[k].count++; byCashier[k].total+=i.total||0;
  });

  // By payment method
  const byMethod = {};
  done.forEach(i => {
    const m = i.method||'نقدي';
    byMethod[m] = (byMethod[m]||0) + (i.total||0);
  });

  // Top products today
  const topProds = {};
  done.forEach(i => i.items.forEach(it => {
    topProds[it.name] = (topProds[it.name]||0) + (it.qty||0);
  }));
  const top5 = Object.entries(topProds).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const b = getBranding ? getBranding() : {logoEmoji:'⚖️',shopName:'ميزان'};
  const dateStr = new Date().toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  const html = `<!DOCTYPE html><html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>تقرير نهاية اليوم</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;color:#1a2035;padding:20px;max-width:800px;margin:0 auto}
  h1{text-align:center;font-size:20px;margin-bottom:4px}
  .sub{text-align:center;color:#666;font-size:13px;margin-bottom:20px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
  .box{border:1px solid #dde3ec;border-radius:10px;padding:14px;text-align:center}
  .box-v{font-size:22px;font-weight:800;margin-bottom:4px}
  .box-l{font-size:11px;color:#666}
  .gold{color:#b8960a}.green{color:#0d9e5a}.red{color:#d93025}.blue{color:#0066cc}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
  th{background:#f5f7fa;padding:8px;text-align:right;font-weight:600;border-bottom:2px solid #dde3ec}
  td{padding:8px;border-bottom:1px solid #edf0f5}
  .section{font-size:14px;font-weight:700;color:#b8960a;margin:16px 0 8px;border-bottom:2px solid #b8960a;padding-bottom:4px}
  .footer{text-align:center;color:#999;font-size:11px;margin-top:20px;border-top:1px solid #eee;padding-top:12px}
  @media print{body{padding:10px}.no-print{display:none}}
</style></head>
<body>
  <h1>${b.logoEmoji} ${b.shopName||'ميزان POS'}</h1>
  <div class="sub">تقرير نهاية اليوم — ${dateStr}</div>

  <div class="grid">
    <div class="box"><div class="box-v gold">${fmt(totalRev)} ج</div><div class="box-l">إجمالي الإيراد</div></div>
    <div class="box"><div class="box-v ${netProfit>=0?'green':'red'}">${fmt(netProfit)} ج</div><div class="box-l">صافي الربح</div></div>
    <div class="box"><div class="box-v blue">${done.length+partial.length}</div><div class="box-l">عدد الفواتير</div></div>
    <div class="box"><div class="box-v">${fmt(discounts)} ج</div><div class="box-l">إجمالي الخصومات</div></div>
    <div class="box"><div class="box-v red">${fmt(deferred)} ج</div><div class="box-l">آجل اليوم</div></div>
    <div class="box"><div class="box-v red">${fmt(todayExp)} ج</div><div class="box-l">مصروفات اليوم</div></div>
  </div>

  ${Object.keys(byMethod).length ? `
  <div class="section">💳 المبيعات حسب طريقة الدفع</div>
  <table><thead><tr><th>الطريقة</th><th>المبلغ</th></tr></thead><tbody>
    ${Object.entries(byMethod).map(([m,v])=>`<tr><td>${m}</td><td class="gold"><b>${fmt(v)} ج</b></td></tr>`).join('')}
  </tbody></table>` : ''}

  ${Object.keys(byCashier).length > 1 ? `
  <div class="section">👤 أداء الكاشيرين</div>
  <table><thead><tr><th>الكاشير</th><th>الفواتير</th><th>المبيعات</th></tr></thead><tbody>
    ${Object.entries(byCashier).map(([n,v])=>`<tr><td>${v.emoji} ${n}</td><td style="text-align:center">${v.count}</td><td class="gold"><b>${fmt(v.total)} ج</b></td></tr>`).join('')}
  </tbody></table>` : ''}

  ${top5.length ? `
  <div class="section">🏆 أكثر المنتجات مبيعاً</div>
  <table><thead><tr><th>المنتج</th><th>الكمية</th></tr></thead><tbody>
    ${top5.map(([n,q],i)=>`<tr><td>${['🥇','🥈','🥉','4.','5.'][i]} ${n}</td><td style="text-align:center;font-weight:700">${q}</td></tr>`).join('')}
  </tbody></table>` : ''}

  ${returned.length ? `
  <div class="section">↩️ المرتجعات</div>
  <table><thead><tr><th>الفاتورة</th><th>المبلغ</th></tr></thead><tbody>
    ${returned.map(i=>`<tr><td>${i.no||''}</td><td class="red">${fmt(i.total)} ج</td></tr>`).join('')}
  </tbody></table>` : ''}

  <div class="footer">
    طُبع بتاريخ ${new Date().toLocaleString('ar-EG')} — ميزان POS
  </div>
  <div class="no-print" style="text-align:center;margin-top:16px">
    <button onclick="window.print()" style="padding:10px 30px;background:#b8960a;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit">🖨️ طباعة</button>
    <button onclick="window.close()" style="padding:10px 20px;background:#666;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin-right:10px;font-family:inherit">إغلاق</button>
  </div>
</body></html>`;

  const w = window.open('','_blank','width=900,height=700');
  w.document.write(html);
  w.document.close();
}


// ═══════════════════════════════════════════════════════════════
//  🔔 تنبيهات ذكية — مخزون + ديون + مدفوعات متأخرة
// ═══════════════════════════════════════════════════════════════
function runSmartAlerts(silent) {
  const alerts = [];

  // 1. Low stock
  const lowStock = DB.products.filter(p => p.active!==false && (p.minStock||0)>0 && (p.stock||0)<=(p.minStock||0));
  const zeroStock = lowStock.filter(p => (p.stock||0)===0);
  if(zeroStock.length)  alerts.push({type:'danger', icon:'🚫', msg:`${zeroStock.length} منتج نفد من المخزون — انقر لعرض طلب الشراء`, action:'inventory', key:'zero', extraFn:'openReorderPanel'});
  else if(lowStock.length) alerts.push({type:'warn', icon:'⚠️', msg:`${lowStock.length} منتج مخزونه منخفض`, action:'inventory', key:'low'});

  // 2. Big debtors (> 500)
  const bigDebt = DB.customers.filter(c => (c.debt||0) > 500).sort((a,b)=>b.debt-a.debt).slice(0,3);
  if(bigDebt.length) {
    const total = bigDebt.reduce((s,c)=>s+(c.debt||0),0);
    alerts.push({type:'warn', icon:'💳', msg:`${bigDebt.length} عملاء ديونهم تجاوزت 500 ج (إجمالي: ${fmt(total)} ج)`, action:'customers', key:'debt'});
  }

  // 3. Partial invoices > 7 days old
  const oldPartials = DB.invoices.filter(i => {
    if(i.status!=='partial') return false;
    const d = new Date(i.date||i.created_at||0);
    return (Date.now()-d.getTime()) > 7*86400000;
  });
  if(oldPartials.length) alerts.push({type:'warn', icon:'⏳', msg:`${oldPartials.length} فاتورة آجل قديمة (أكثر من 7 أيام)`, action:'customers', key:'overdue'});

  // 4. Supplier balances
  const owedSupps = DB.suppliers.filter(s=>(s.totalOwed||0)>0);
  if(owedSupps.length) {
    const total = owedSupps.reduce((s,x)=>s+(x.totalOwed||0),0);
    if(total > 1000) alerts.push({type:'info', icon:'🏭', msg:`مستحقات موردين: ${fmt(total)} ج`, action:'suppliers', key:'supp'});
  }

  if(!alerts.length) {
    if(!silent) toast('✅ لا توجد تنبيهات — كل شيء على ما يرام', 'g');
    updateAlertBadge(0);
    return;
  }

  updateAlertBadge(alerts.length);
  if(silent) return;

  // Show modal
  const colors = {danger:'rgba(240,82,82,.08)',warn:'rgba(245,158,11,.08)',info:'rgba(59,158,255,.08)'};
  const borders = {danger:'rgba(240,82,82,.25)',warn:'rgba(245,158,11,.25)',info:'rgba(59,158,255,.2)'};
  const textCol = {danger:'var(--red)',warn:'var(--amb)',info:'var(--blue)'};

  openModal('🔔 التنبيهات الذكية',
    `<div style="direction:rtl;display:flex;flex-direction:column;gap:10px">
    ${alerts.map(a=>`

// ── Split payment helpers ──
function selPay(el) {
  document.querySelectorAll('.pm').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  const isSplit = el.textContent.includes('مقسّم');
  const splitRow = document.getElementById('split-pay-row');
  const paidRow  = document.getElementById('paidAmt');
  if(splitRow) splitRow.style.display = isSplit ? 'flex' : 'none';
  if(paidRow)  paidRow.style.display  = isSplit ? 'none' : 'block';
  if(isSplit) calcSplitChange(); else calcChange();
}

function calcSplitChange() {
  const cash    = parseFloat(document.getElementById('split-cash')?.value||0);
  const digital = parseFloat(document.getElementById('split-digital')?.value||0);
  const total   = parseFloat(document.getElementById('grandTotal')?.textContent?.replace(/[^\d.]/g,'')||0);
  const paid    = cash + digital;
  const changeEl = document.getElementById('changeAmt');
  if(changeEl) {
    const change = paid - total;
    changeEl.textContent = (change >= 0 ? 'الباقي: ' : 'ناقص: ') + fmt(Math.abs(change)) + ' ج';
    changeEl.style.color = change >= 0 ? 'var(--green)' : 'var(--red)';
  }
}

//  💰 خصومات متقدمة — VIP + كميات
// ═══════════════════════════════════════════════════════════════
const DISCOUNT_RULES = {
  vip:      { label:'VIP',      pct: 10, minTotal: 0 },
  bulk:     { label:'جملة',     pct: 7,  minTotal: 0 },
  loyalty:  { label:'ولاء',     pct: 5,  minTotal: 200 },
  quantity: { label:'كميات',    pct: 5,  minQty: 10 },
};

function autoApplyDiscount() {
  const custId = document.getElementById('invCustomer')?.value;
  const cust   = custId ? DB.customers.find(c=>c.id===custId) : null;
  const discEl = document.getElementById('discPct');
  if(!discEl) return;

  let bestDisc = 0;
  let reason   = '';

  if(cust) {
    if(cust.type==='VIP')    { bestDisc = Math.max(bestDisc, DISCOUNT_RULES.vip.pct);     reason='VIP 10%'; }
    if(cust.type==='جملة')   { bestDisc = Math.max(bestDisc, DISCOUNT_RULES.bulk.pct);    reason='جملة 7%'; }
    if((cust.loyaltyPoints||0) >= 100) { bestDisc = Math.max(bestDisc, DISCOUNT_RULES.loyalty.pct); reason='ولاء 5%'; }
  }

  // Quantity discount
  const totalQty = cart.reduce((s,i)=>s+(i.qty||0),0);
  if(totalQty >= DISCOUNT_RULES.quantity.minQty) {
    bestDisc = Math.max(bestDisc, DISCOUNT_RULES.quantity.pct);
    reason = (reason?reason+' + ':'')+'كميات 5%';
  }

  if(bestDisc > 0 && parseFloat(discEl.value||0) === 0) {
    discEl.value = bestDisc;
    calcChange();
    toast(`🎁 خصم تلقائي: ${reason}`, 'g');
  }
}

let _psSessions = {};  // { deviceId: { startTime, deviceName, pricePerHour } }

function initPSSessions() {
  try {
    _psSessions = JSON.parse(localStorage.getItem('_ps_sessions')||'{}');
    // Restore timers for active sessions
    Object.entries(_psSessions).forEach(([id,s]) => {
      if(s.active) startSessionTimer(id);
    });
    if(Object.keys(_psSessions).length) updatePSDisplay();
  } catch(e) {}
}

function savePSSessions() {
  localStorage.setItem('_ps_sessions', JSON.stringify(_psSessions));
}

function openPSPanel() {
  const shopType = localStorage.getItem('_mizan_shop_type');
  // Get PS devices from products with category جلسات
  const devices = DB.products.filter(p => p.category==='جلسات' || (p.unit==='ساعة'&&(p.sellPrice||0)>0));
  const deviceCount = Math.max(devices.length, 4);

  const rows = Array.from({length: deviceCount}, (_,i) => {
    const devId = 'ps-'+(i+1);
    const sess  = _psSessions[devId];
    const active = sess && sess.active;
    const elapsed = active ? Math.floor((Date.now()-sess.startTime)/60000) : 0;
    const cost    = active ? ((elapsed/60) * (sess.pricePerHour||0)).toFixed(2) : 0;
    return `<div style="background:${active?'rgba(31,203,122,.06)':'var(--raised)'};border:1px solid ${active?'rgba(31,203,122,.25)':'var(--border2)'};border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px">
      <div style="font-size:28px">${active?'🟢':'⚫'}</div>
      <div style="flex:1">
        <div style="font-weight:700">جهاز ${i+1}</div>
        ${active
          ? `<div id="ps-time-${devId}" style="font-size:13px;color:var(--green)">${elapsed} دقيقة — ${fmt(cost)} ج</div>
             <div style="font-size:11px;color:var(--txt3)">${sess.customerName||'بدون اسم'} · ${new Date(sess.startTime).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</div>`
          : '<div style="font-size:12px;color:var(--txt3)">خالي</div>'}
      </div>
      ${active
        ? `<button class="btn btn-gold btn-sm" onclick="endPSSession('${devId}')">⏹️ إنهاء وفوترة</button>`
        : `<button class="btn btn-ghost btn-sm" onclick="startPSSession('${devId}',${ i+1})">▶️ بدء</button>`}
    </div>`;
  }).join('');

  openModal('🎮 جلسات البلايستيشن', `<div style="direction:rtl;display:flex;flex-direction:column;gap:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span style="font-size:12px;color:var(--txt3)">الجلسات النشطة: ${Object.values(_psSessions).filter(s=>s.active).length}</span>
      <button class="btn btn-ghost btn-sm" onclick="closeModalDirect();go('pos')">🛒 POS</button>
    </div>
    ${rows}
  </div>`,
  [{label:'إغلاق',cls:'btn-gold',fn:'closeModalDirect()'}], true, true);

  // Start live update
  const interval = setInterval(() => {
    if(!document.getElementById('modalBg') || !document.querySelector('[id^="ps-time-"]')) {
      clearInterval(interval); return;
    }
    Object.entries(_psSessions).forEach(([id,s]) => {
      if(!s.active) return;
      const el = document.getElementById('ps-time-'+id);
      if(!el) return;
      const elapsed = Math.floor((Date.now()-s.startTime)/60000);
      const cost = ((elapsed/60)*(s.pricePerHour||0)).toFixed(2);
      el.textContent = elapsed + ' دقيقة — ' + fmt(cost) + ' ج';
    });
  }, 10000);
}

function startPSSession(devId, devNum) {
  const products = DB.products.filter(p => p.category==='جلسات'||p.unit==='ساعة');
  const priceOpts = products.length
    ? products.map(p=>`<option value="${p.sellPrice||0}">${p.name} — ${fmt(p.sellPrice||0)} ج/ساعة</option>`).join('')
    : '<option value="15">جلسة عادية — 15 ج/ساعة</option>';

  closeModalDirect();
  setTimeout(()=>{
    openModal(`▶️ بدء جلسة — جهاز ${devNum}`, `<div style="direction:rtl">
      <div class="fl" style="margin-bottom:12px"><label class="flbl">اسم العميل (اختياري)</label>
        <input class="finput" id="ps-cust-name" placeholder="اسم العميل أو المجموعة"></div>
      <div class="fl"><label class="flbl">💰 السعر</label>
        <select class="fsel" id="ps-price">${priceOpts}</select></div>
    </div>`,
    [{label:'إلغاء',cls:'btn-ghost',fn:'closeModalDirect()'},
     {label:'▶️ بدء الجلسة',cls:'btn-gold',fn:`confirmStartPS('${devId}',${devNum})`}]);
  }, 200);
}

function confirmStartPS(devId, devNum) {
  const name  = document.getElementById('ps-cust-name')?.value||'';
  const price = parseFloat(document.getElementById('ps-price')?.value||15);
  _psSessions[devId] = { active:true, startTime:Date.now(), customerName:name, pricePerHour:price, deviceNum:devNum };
  savePSSessions();
  startSessionTimer(devId);
  closeModalDirect();
  toast(`▶️ جلسة جهاز ${devNum} بدأت`,'g');
  setTimeout(openPSPanel, 200);
}

let _psTimers = {};
function startSessionTimer(devId) {
  clearInterval(_psTimers[devId]);
  _psTimers[devId] = setInterval(() => updatePSDisplay(), 60000);
}

function updatePSDisplay() {
  const btn = document.getElementById('ps-panel-btn');
  const active = Object.values(_psSessions).filter(s=>s.active).length;
  if(btn) {
    btn.textContent = active ? `🎮 ${active}` : '🎮';
    btn.style.color = active ? 'var(--green)' : '';
  }
}

function endPSSession(devId) {
  const sess = _psSessions[devId];
  if(!sess||!sess.active) return;
  const elapsed   = (Date.now()-sess.startTime)/3600000; // hours
  const totalCost = Math.ceil(elapsed * sess.pricePerHour * 100) / 100;

  closeModalDirect();
  setTimeout(()=>{
    openModal(`⏹️ إنهاء جلسة — جهاز ${sess.deviceNum}`, `<div style="direction:rtl;text-align:center">
      <div style="font-size:36px;margin-bottom:12px">🎮</div>
      <div style="font-size:15px;font-weight:700;margin-bottom:6px">${sess.customerName||'جهاز '+sess.deviceNum}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
        <div style="background:var(--raised);border-radius:10px;padding:12px">
          <div style="font-size:11px;color:var(--txt3)">المدة</div>
          <div style="font-size:18px;font-weight:700;color:var(--blue)">${Math.floor(elapsed*60)} دقيقة</div>
        </div>
        <div style="background:var(--raised);border-radius:10px;padding:12px">
          <div style="font-size:11px;color:var(--txt3)">السعر/ساعة</div>
          <div style="font-size:18px;font-weight:700">${fmt(sess.pricePerHour)} ج</div>
        </div>
        <div style="background:var(--raised);border-radius:10px;padding:12px">
          <div style="font-size:11px;color:var(--txt3)">الإجمالي</div>
          <div style="font-size:18px;font-weight:700;color:var(--gold)">${fmt(totalCost)} ج</div>
        </div>
      </div>
    </div>`,
    [{label:'إلغاء',cls:'btn-ghost',fn:'closeModalDirect()'},
     {label:`💰 فاتورة ${fmt(totalCost)} ج`,cls:'btn-gold',fn:`checkoutPSSession('${devId}',${totalCost})`}]);
  },200);
}

function checkoutPSSession(devId, totalCost) {
  const sess = _psSessions[devId];
  // Add to cart and complete
  const sessionProd = DB.products.find(p=>p.category==='جلسات'&&p.sellPrice<=sess.pricePerHour) || 
    {id:'ps-session-'+devId, name:'جلسة بلايستيشن', sellPrice:totalCost, buyPrice:0, emoji:'🎮', stock:9999};
  
  // Create invoice directly
  const inv = {
    id:genId(), no:currentInvoiceNo(),
    items:[{id:sessionProd.id, name:'جلسة بلايستيشن — جهاز '+(sess.deviceNum||''), qty:1,
            price:totalCost, sellPrice:totalCost, buyPrice:0, emoji:'🎮'}],
    subtotal:totalCost, discount:0, total:totalCost, paid:totalCost,
    method:'نقدي', change:0,
    cashierId:currentUser.id, cashierName:currentUser.name,
    date:new Date().toISOString(), status:'done',
    customerName: sess.customerName||'',
    note:'جلسة '+Math.floor((Date.now()-sess.startTime)/60000)+' دقيقة'
  };
  DB.invoices.push(inv);
  DB.invoiceCounter++;
  
  // End session
  _psSessions[devId].active = false;
  clearInterval(_psTimers[devId]);
  savePSSessions();
  scheduleAutoSave();
  setTimeout(()=>BKUP.afterOperation('جلسة'),200);
  
  closeModalDirect();
  toast(`✅ تم إنهاء الجلسة — ${fmt(totalCost)} ج`,'g');
  updatePSDisplay();
  // Print
  setTimeout(()=>printInvoice(inv.id,'80mm'),300);
}

function openReorderPanel() {
  const low = DB.products.filter(p => p.active!==false && (p.minStock||0)>0 && (p.stock||0)<=(p.minStock||0))

  if(!low.length) { toast('✅ كل المنتجات بمخزون كافٍ','g'); return; }

  // Group by supplier
  const bySupp = {};
  low.forEach(p => {
    const suppId = p.supplierId || p.supplier || 'unknown';
    const supp   = DB.suppliers.find(s=>s.id===suppId);
    const sName  = supp?.name || p.supplierName || 'غير محدد';
    if(!bySupp[sName]) bySupp[sName] = { supp, products:[] };
    bySupp[sName].products.push(p);
  });

  const rows = low.map(p => {
    const deficit  = Math.max(1, (p.minStock||0)*2 - (p.stock||0));
    const cost     = deficit * (p.buyPrice||0);
    return `<tr>
      <td style="padding:8px">${p.emoji||'📦'} <b>${p.name}</b></td>

      <td style="padding:8px;text-align:center;color:var(--gold)" id="ro-cost-${p.id}">${cost?fmt(cost)+' ج':'—'}</td>
    </tr>`;
  }).join('');

  const totalCost = low.reduce((s,p)=>s+(Math.max(1,(p.minStock||0)*2-(p.stock||0)))*(p.buyPrice||0),0);

  openModal('📦 طلبات الشراء التلقائية', `<div style="direction:rtl">

      <span style="font-weight:700;color:var(--txt2)">تكلفة تقديرية: <b style="color:var(--gold)">${fmt(totalCost)} ج</b></span>
    </div>
    <div style="max-height:320px;overflow-y:auto">
      <table style="width:100%;font-size:12px;border-collapse:collapse">
        <thead><tr style="background:var(--raised)">
          <th style="padding:8px;text-align:right">المنتج</th>
          <th style="padding:8px;text-align:center">الرصيد</th>
          <th style="padding:8px;text-align:center">الكمية المطلوبة</th>
          <th style="padding:8px;text-align:center">سعر الشراء</th>
          <th style="padding:8px;text-align:center">التكلفة</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
      <button class="btn btn-gold" style="flex:1" onclick="sendReorderWhatsapp()">📱 إرسال للمورد واتساب</button>
      <button class="btn btn-ghost" style="flex:1" onclick="printReorderList()">🖨️ طباعة قائمة الطلب</button>
    </div>
  </div>`,
  [{label:'إغلاق',cls:'btn-ghost',fn:'closeModalDirect()'}], true, true);
}

function sendReorderWhatsapp() {
  const low = DB.products.filter(p=>p.active!==false&&(p.minStock||0)>0&&(p.stock||0)<=(p.minStock||0));
  let msg = '📦 قائمة طلب البضاعة\n';
  msg += '━━━━━━━━━━━━━━━━\n';
  low.forEach(p => {
    const qty = parseInt(document.getElementById('ro-qty-'+p.id)?.value||0) || Math.max(1,(p.minStock||0)*2-(p.stock||0));
    msg += `• ${p.name}: ${qty} ${p.unit||'قطعة'}\n`;
  });
  msg += '━━━━━━━━━━━━━━━━\n';

// ═══════════════════════════════════════════════════════════════
function openComparisonReport() {
  const now   = new Date();
  const thisM = now.toISOString().slice(0,7);
  const prevM = new Date(now.getFullYear(), now.getMonth()-1, 1).toISOString().slice(0,7);

  function getPeriodStats(from, to) {
    const invs = DB.invoices.filter(i => {
      const d=(i.date||i.created_at||'').slice(0,10);
      return d>=from && d<=to && i.status==='done';
    });
    const revenue = invs.reduce((s,i)=>s+(i.total||0),0);
    const cost    = invs.reduce((s,i)=>s+i.items.reduce((ss,it)=>ss+(it.buyPrice||0)*(it.qty||0),0),0);
    const exps    = DB.expenses.filter(e=>{const d=(e.date||e.created_at||'').slice(0,10);return d>=from&&d<=to;}).reduce((s,e)=>s+(e.amount||0),0);
    return { revenue, cost, profit:revenue-cost, net:revenue-cost-exps, count:invs.length, expenses:exps };
  }

  // This month
  const t1 = thisM+'-01', t2 = thisM+'-31';
  const p1 = thisM+'-01', p2 = prevM+'-31';
  const thisStats = getPeriodStats(t1, t2);
  const prevStats = getPeriodStats(p1.replace(thisM,prevM), p2);

  function pctChange(curr, prev) {
    if(!prev) return curr > 0 ? '+100%' : '—';
    const pct = ((curr-prev)/Math.abs(prev)*100).toFixed(1);
    return (pct>0?'+':'')+pct+'%';
  }
  function arrowColor(curr, prev, invertColors) {
    if(curr > prev) return invertColors ? 'var(--red)' : 'var(--green)';
    if(curr < prev) return invertColors ? 'var(--green)' : 'var(--red)';
    return 'var(--txt3)';
  }
  function arrow(curr, prev) { return curr>prev?'↑':curr<prev?'↓':'→'; }

  openModal('📈 تقرير المقارنة', `<div style="direction:rtl">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div style="background:var(--raised);border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:11px;color:var(--txt3);margin-bottom:4px">الشهر الماضي</div>
        <div style="font-size:13px;font-weight:700">${prevM}</div>
      </div>
      <div style="background:rgba(200,168,75,.08);border:1px solid rgba(200,168,75,.2);border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:11px;color:var(--txt3);margin-bottom:4px">هذا الشهر</div>
        <div style="font-size:13px;font-weight:700;color:var(--gold)">${thisM}</div>
      </div>
    </div>
    <table style="width:100%;font-size:13px;border-collapse:collapse">
      <thead><tr style="background:var(--raised)">
        <th style="padding:10px;text-align:right">المؤشر</th>
        <th style="padding:10px;text-align:center">الشهر الماضي</th>
        <th style="padding:10px;text-align:center">هذا الشهر</th>
        <th style="padding:10px;text-align:center">التغيير</th>
      </tr></thead>
      <tbody>
        ${[
          ['💰 الإيراد', prevStats.revenue, thisStats.revenue, false],
          ['📈 مجمل الربح', prevStats.profit, thisStats.profit, false],
          ['💎 صافي الربح', prevStats.net, thisStats.net, false],
          ['🧾 الفواتير', prevStats.count, thisStats.count, false],
          ['💸 المصروفات', prevStats.expenses, thisStats.expenses, true],
        ].map(([label, prev, curr, inv]) => `
          <tr style="border-bottom:1px solid rgba(255,255,255,.04)">
            <td style="padding:10px">${label}</td>
            <td style="padding:10px;text-align:center;color:var(--txt2)">${typeof prev==='number'&&prev>9?fmt(prev)+' ج':prev}</td>
            <td style="padding:10px;text-align:center;font-weight:700">${typeof curr==='number'&&curr>9?fmt(curr)+' ج':curr}</td>
            <td style="padding:10px;text-align:center;color:${arrowColor(curr,prev,inv)};font-weight:700">${arrow(curr,prev)} ${pctChange(curr,prev)}</td>
          </tr>`).join('')}
      </tbody>
    </table>
    <div style="margin-top:14px;padding:12px;background:${thisStats.net>=prevStats.net?'rgba(31,203,122,.06)':'rgba(240,82,82,.06)'};border:1px solid ${thisStats.net>=prevStats.net?'rgba(31,203,122,.2)':'rgba(240,82,82,.2)'};border-radius:10px;text-align:center">
      <span style="font-size:24px">${thisStats.net>=prevStats.net?'📈':'📉'}</span>
      <span style="font-weight:700;font-size:14px;color:${thisStats.net>=prevStats.net?'var(--green)':'var(--red)'};margin-right:8px">
        ${thisStats.net>=prevStats.net?'أداء أفضل من الشهر الماضي':'أداء أقل من الشهر الماضي'}
        (${pctChange(thisStats.net, prevStats.net)})
      </span>
    </div>
  </div>`,
  [{label:'إغلاق',cls:'btn-gold',fn:'closeModalDirect()'}], false, true);
}

// ═══════════════════════════════════════════════════════════════
function lockScreen() {
  // Save current user
  const u = currentUser;
  if(!u) return;
  // Show lock overlay
  const ov = document.createElement('div');
  ov.id = 'lock-overlay';
  ov.style.cssText = 'position:fixed;inset:0;z-index:29999;background:#07090f;display:flex;align-items:center;justify-content:center';
  ov.innerHTML = `
    <div style="text-align:center;max-width:320px;padding:40px">
      <div style="font-size:48px;margin-bottom:14px">🔒</div>
      <div style="font-size:18px;font-weight:700;color:var(--gold);margin-bottom:4px">${u.name}</div>
      <div style="font-size:12px;color:var(--txt2);margin-bottom:24px">الشاشة مقفلة — أدخل كلمة المرور للمتابعة</div>
      <input type="password" id="lock-pin" class="finput" placeholder="كلمة المرور"
        style="text-align:center;font-size:18px;letter-spacing:4px;margin-bottom:12px"
        onkeydown="if(event.key==='Enter')unlockScreen()">
      <button onclick="unlockScreen()" class="btn btn-gold" style="width:100%">🔓 فتح القفل</button>
      <div id="lock-err" style="color:var(--red);font-size:12px;margin-top:8px;display:none">كلمة المرور غير صحيحة</div>
      <div style="margin-top:20px;font-size:11px;color:var(--txt3)">أو <button onclick="showLoginScreen()" style="background:none;border:none;color:var(--txt3);cursor:pointer;text-decoration:underline">سجّل خروج كامل</button></div>
    </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>document.getElementById('lock-pin')?.focus(),200);
  log('نظام','قفل الشاشة');
}

function unlockScreen() {
  const pin = document.getElementById('lock-pin')?.value||'';
  const u = currentUser;
  if(!u||!pin) return;
  // Check password
  const all = [...(BUILTIN_ACCOUNTS||[]),...(DB.staff||[]),...(BUILTIN_DEFAULTS||[])];
  const acc = all.find(a=>a.id===u.id||a.username===u.username);
  const ok = acc && (acc.password===pin || BUILTIN_DEFAULTS.find(d=>d.id===acc.id)?.password===pin);
  if(!ok) {
    const err=document.getElementById('lock-err');
    if(err){err.style.display='block';setTimeout(()=>err.style.display='none',2000);}
    document.getElementById('lock-pin').value='';
    return;
  }
  const ov=document.getElementById('lock-overlay');
  if(ov) ov.remove();
  log('نظام','فتح قفل الشاشة');
}

  if(!DB.settings?.autoLock) return;

}

function openComparisonReport() {
  const now = new Date();
  const thisMonth = now.toISOString().slice(0,7);
  const lastMonth = new Date(now.getFullYear(), now.getMonth()-1, 1).toISOString().slice(0,7);

  const calc = (month) => {
    const invs = DB.invoices.filter(i=>(i.date||i.created_at||'').startsWith(month)&&i.status!=='returned');
    const rev = invs.reduce((s,i)=>s+(i.total||0),0);
    const cost = invs.reduce((s,i)=>s+(i.items||[]).reduce((ss,it)=>ss+(it.buyPrice||0)*(it.qty||0),0),0);
    return {rev,profit:rev-cost,count:invs.length,avg:invs.length?rev/invs.length:0};
  };

  const t=calc(thisMonth), l=calc(lastMonth);
  const diff=(a,b)=>b>0?(((a-b)/b)*100).toFixed(1):a>0?'+100.0':'0.0';

      <div style="background:rgba(200,168,75,.06);border:1px solid rgba(200,168,75,.2);border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:11px;color:var(--txt3);margin-bottom:4px">هذا الشهر</div>
        <div style="font-size:12px;font-weight:700;color:var(--gold)">${thisMonth}</div>
      </div>
      <div style="background:var(--raised);border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:11px;color:var(--txt3);margin-bottom:4px">الشهر الماضي</div>
        <div style="font-size:12px;font-weight:700;color:var(--txt2)">${lastMonth}</div>
      </div>
    </div>
    ${[
      ['💰 المبيعات',fmt(t.rev)+' ج',fmt(l.rev)+' ج',diff(t.rev,l.rev),arrow(t.rev,l.rev),color(t.rev,l.rev)],
      ['📈 الربح',fmt(t.profit)+' ج',fmt(l.profit)+' ج',diff(t.profit,l.profit),arrow(t.profit,l.profit),color(t.profit,l.profit)],
      ['🧾 الفواتير',t.count,l.count,diff(t.count,l.count),arrow(t.count,l.count),color(t.count,l.count)],
      ['💵 متوسط فاتورة',fmt(t.avg)+' ج',fmt(l.avg)+' ج',diff(t.avg,l.avg),arrow(t.avg,l.avg),color(t.avg,l.avg)],
    ].map(([lbl,tv,lv,d,arr,col])=>`
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 80px;gap:8px;align-items:center;padding:10px;border-radius:8px;margin-bottom:6px;background:var(--raised)">

//  📊 ALL BARCODE TYPES — EAN-13, EAN-8, CODE-128, QR, UPC, etc.
// ═══════════════════════════════════════════════════════════════
const BARCODE_FORMATS = [
  {key:'auto',    label:'تلقائي (مقترح)',  desc:'يختار النوع حسب المحتوى'},
  {key:'EAN13',   label:'EAN-13',          desc:'13 رقم — المنتجات التجارية'},
  {key:'EAN8',    label:'EAN-8',           desc:'8 أرقام — منتجات صغيرة'},
  {key:'UPC',     label:'UPC-A',           desc:'12 رقم — السوق الأمريكي'},
  {key:'CODE128', label:'Code 128',        desc:'أحرف وأرقام — الأكثر شيوعاً'},
  {key:'CODE39',  label:'Code 39',         desc:'أحرف وأرقام — مستودعات'},
  {key:'ITF14',   label:'ITF-14',          desc:'14 رقم — كراتين شحن'},
  {key:'MSI',     label:'MSI/Plessey',     desc:'أرقام فقط — رفوف متاجر'},
  {key:'QR',      label:'QR Code',         desc:'نص حر — يدعم العربي'},
];

function detectBarcodeFormat(value) {
  if (!value) return 'CODE128';
  const v = value.trim();
  if (/^\d{13}$/.test(v)) return 'EAN13';
  if (/^\d{8}$/.test(v))  return 'EAN8';
  if (/^\d{12}$/.test(v)) return 'UPC';
  if (/^\d{14}$/.test(v)) return 'ITF14';
  if (/^[A-Z0-9\-\.\s\$\/\+\%]+$/.test(v)) return 'CODE39';
  return 'CODE128';
}

function generateBarcodeValue(format) {
  const ts = Date.now().toString();
  const r  = ()=>Math.floor(Math.random()*10);
  if(format==='EAN13') {
    const digits = ts.slice(-12);
    let sum=0;
    for(let i=0;i<12;i++) sum+=parseInt(digits[i])*(i%2===0?1:3);
    const check=(10-(sum%10))%10;
    return digits+check;
  }
  if(format==='EAN8') {
    const digits=ts.slice(-7);
    let sum=0;
    for(let i=0;i<7;i++) sum+=parseInt(digits[i])*(i%2===0?3:1);
    return digits+((10-(sum%10))%10);
  }
  if(format==='UPC') return ts.slice(-11)+''+r();
  if(format==='ITF14') return ts.slice(-13)+''+r();
  // CODE128 / CODE39 / MSI
  return 'P-'+ts.slice(-8);
}

const _origServerConnect = SERVER.connect.bind(SERVER);
SERVER.connect = async function(url) {
  // Check if server requires auth
  try {
    const r = await fetch(url.replace(/\/$/,'')+'/api/status',{signal:AbortSignal.timeout(2000)});
    if(r.ok){
      const info = await r.json();
      if(info.requirePin) {
        const pin = prompt('🔐 أدخل كلمة مرور الـ Server:');
        if(!pin) return false;
        localStorage.setItem(SERVER_PIN_KEY, pin);
      }
    }
  } catch(e){}
  return _origServerConnect(url);
};

// ── ERP Helpers ──
function genVoucherNo(prefix) {
  if(!DB.erp_counters) DB.erp_counters={};
  DB.erp_counters[prefix]=(DB.erp_counters[prefix]||0)+1;
  return prefix+'-'+new Date().getFullYear()+'-'+String(DB.erp_counters[prefix]).padStart(4,'0');
}
function getStock(whId,pid){ return (DB.stock&&DB.stock[whId]&&DB.stock[whId][pid])||0; }
function setStock(whId,pid,qty){ if(!DB.stock)DB.stock={}; if(!DB.stock[whId])DB.stock[whId]={}; DB.stock[whId][pid]=Math.max(0,qty); }
function addStock(whId,pid,delta){ setStock(whId,pid,getStock(whId,pid)+delta); }
function getTotalStock(pid){ if(!DB.stock)return DB.products.find(p=>p.id===pid)?.stock||0; return Object.values(DB.stock).reduce((s,wh)=>s+(wh[pid]||0),0)||DB.products.find(p=>p.id===pid)?.stock||0; }
function getMainWH(){ return DB.warehouses.find(w=>w.isMain&&w.active!==false)||DB.warehouses[0]||null; }
function recordMov(type,fromWH,toWH,pid,qty,cost,refId,notes){
  DB.movements.push({id:genId(),type,fromWarehouseId:fromWH||null,toWarehouseId:toWH||null,
    productId:pid,qty,cost:cost||0,date:new Date().toISOString(),
    userId:currentUser?.id||'',refId:refId||'',notes:notes||''});
}
function getMainTreasury(){ return DB.treasuries?.find(t=>t.type==='cash'&&t.active!==false)||DB.treasuries?.[0]||null; }
function adjustTreasury(id,amount){ const t=DB.treasuries?.find(x=>x.id===id); if(t)t.balance=(t.balance||0)+amount; }
function createVoucher(type,amount,trId,partyType,partyId,partyName,notes){
  const prefixes={receipt:'QBD',payment:'SRF',collection:'TCH',journal:'YOM',transfer:'TRF'};
  const v={id:genId(),no:genVoucherNo(prefixes[type]||'VCH'),type,date:new Date().toISOString(),
    amount,treasuryId:trId,partyType:partyType||'',partyId:partyId||'',
    partyName:partyName||'',userId:currentUser?.id||'',notes:notes||''};
  if(!DB.vouchers)DB.vouchers=[];
  DB.vouchers.push(v);
  if(type==='receipt'||type==='collection') adjustTreasury(trId,amount);
  else if(type==='payment') adjustTreasury(trId,-amount);
  return v;
}

function saveWarehouse(editId){
  const name=document.getElementById('wh-name')?.value?.trim();
  if(!name){toast('الاسم مطلوب','r');return;}
  if(!DB.warehouses)DB.warehouses=[];
  const isMain=document.getElementById('wh-main')?.checked;
  if(isMain)DB.warehouses.forEach(w=>w.isMain=false);
  const wh={id:editId||genId(),name,code:'',
    type:document.getElementById('wh-type')?.value||'store',
    manager:'',address:'',
    isMain,active:true};
  if(editId){const i=DB.warehouses.findIndex(x=>x.id===editId);if(i>=0)DB.warehouses[i]=wh;}
  else DB.warehouses.push(wh);
  scheduleAutoSave();closeModalDirect();
  toast(`✅ تم ${editId?'تعديل':'إضافة'} المخزن`,'g');
  log('مخازن',`${editId?'تعديل':'إضافة'}: ${name}`);
  renderWarehouses();
}

    .map(([pid,qty])=>{const p=DB.products.find(x=>x.id===pid);return p?{p,qty}:null;})

  openModal(`🏭 ${w.name}`,`<div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">

      <thead><tr><th style="padding:8px;background:var(--raised);text-align:right">الصنف</th><th style="padding:8px;background:var(--raised)">الكمية</th><th style="padding:8px;background:var(--raised)">الحد</th><th style="padding:8px;background:var(--raised)">القيمة</th><th style="padding:8px;background:var(--raised)">الحالة</th></tr></thead>

  const prods=DB.products.filter(p=>p.active!==false);
  openModal(`🔧 ضبط مخزون — ${w?.name||''}`,`<div>

        <select class="fsel" id="adj-type"><option value="set">تعيين رصيد</option><option value="add">إضافة</option><option value="sub">طرح</option></select>
      </div>
      <div class="fg"><label class="flbl">الكمية</label>
        <input class="finput" type="number" id="adj-qty" min="0" placeholder="0">
      </div>
    </div>
    <div class="fg"><label class="flbl">السبب</label>
      <input class="finput" id="adj-reason" placeholder="جرد — كسر — تصحيح...">
    </div>
  </div>`,
  [{label:'إلغاء',cls:'btn-ghost',fn:'closeModalDirect()'},
   {label:'✅ تطبيق',cls:'btn-gold',fn:`applyWhAdjust('${whId}')`}]);

function applyWhAdjust(whId){
  const pid=document.getElementById('adj-prod')?.value;
  const type=document.getElementById('adj-type')?.value;
  const qty=parseFloat(document.getElementById('adj-qty')?.value||0);
  const reason=document.getElementById('adj-reason')?.value||'ضبط';
  if(!pid||qty<0){toast('بيانات ناقصة','r');return;}
  const cur=getStock(whId,pid);
  const newQ=type==='set'?qty:type==='add'?cur+qty:Math.max(0,cur-qty);
  setStock(whId,pid,newQ);
  // Also update product.stock for backward compatibility
  const prod=DB.products.find(p=>p.id===pid);
  if(prod) prod.stock=getTotalStock(pid);
  recordMov('adjust',type==='sub'?whId:null,type==='sub'?null:whId,pid,Math.abs(newQ-cur),0,'',reason);
  scheduleAutoSave();closeModalDirect();
  toast(`✅ تم ضبط المخزون: ${fmt(cur)} → ${fmt(newQ)}`,'g');
  log('مخازن','ضبط مخزون: '+reason);
  renderWarehouses();
}

function openTransferModal(fromId){
  const whs=(DB.warehouses||[]).filter(w=>w.active!==false);
  if(whs.length<2){toast('يجب وجود مخزنين على الأقل','a');return;}
  const prods=DB.products.filter(p=>p.active!==false);
  openModal('↔️ تحويل بين المخازن',`<div>
    <div class="frow f2">
      <div class="fg"><label class="flbl">من مخزن *</label>
        <select class="fsel" id="tr-from" onchange="updateTrAvail()">
          ${whs.map(w=>`<option value="${w.id}" ${w.id===fromId?'selected':''}>${w.name}</option>`).join('')}
        </select>
      </div>
      <div class="fg"><label class="flbl">إلى مخزن *</label>
        <select class="fsel" id="tr-to">
          ${whs.map((w,i)=>`<option value="${w.id}" ${i===1&&!fromId?'selected':''} >${w.name}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="frow f2">
      <div class="fg"><label class="flbl">الصنف *</label>
        <select class="fsel" id="tr-prod" onchange="updateTrAvail()">
          ${prods.map(p=>`<option value="${p.id}">${p.emoji||'📦'} ${p.name}</option>`).join('')}
        </select>
      </div>
      <div class="fg"><label class="flbl">الكمية المتاحة: <span id="tr-avail" style="color:var(--gold)">—</span></label>
        <input class="finput" type="number" id="tr-qty" min="0.01" step="0.01" placeholder="0">
      </div>
    </div>
    <div class="fg"><label class="flbl">ملاحظة</label>
      <input class="finput" id="tr-notes" placeholder="سبب التحويل...">
    </div>
  </div>`,
  [{label:'إلغاء',cls:'btn-ghost',fn:'closeModalDirect()'},
   {label:'↔️ تحويل',cls:'btn-gold',fn:'executeTransfer()'}]);
  setTimeout(updateTrAvail,100);
}

function updateTrAvail(){
  const fromId=document.getElementById('tr-from')?.value;
  const pid=document.getElementById('tr-prod')?.value;
  const el=document.getElementById('tr-avail');
  if(el&&fromId&&pid)el.textContent=fmt(getStock(fromId,pid));
}

function executeTransfer(){
  const fromId=document.getElementById('tr-from')?.value;
  const toId=document.getElementById('tr-to')?.value;
  const pid=document.getElementById('tr-prod')?.value;
  const qty=parseFloat(document.getElementById('tr-qty')?.value||0);
  const notes=document.getElementById('tr-notes')?.value||'';
  if(!fromId||!toId||!pid||!qty){toast('بيانات ناقصة','r');return;}
  if(fromId===toId){toast('المخزنان متطابقان','r');return;}
  const avail=getStock(fromId,pid);
  if(qty>avail){toast(`الكمية (${qty}) أكبر من المتاح (${avail})`,'r');return;}
  addStock(fromId,pid,-qty);
  addStock(toId,pid,qty);
  const prod=DB.products.find(p=>p.id===pid);
  if(prod)prod.stock=getTotalStock(pid);
  recordMov('transfer',fromId,toId,pid,qty,0,'',notes);
  scheduleAutoSave();closeModalDirect();
  const fw=(DB.warehouses||[]).find(w=>w.id===fromId);
  const tw=(DB.warehouses||[]).find(w=>w.id===toId);
  toast(`✅ تم تحويل ${fmt(qty)} من ${fw?.name} إلى ${tw?.name}`,'g');
  log('مخازن',`تحويل ${qty} من ${fw?.name} إلى ${tw?.name}`);
  renderTransfers();
}

let _poIdx=2;
function poRow(prods,i){
  return`<div class="frow f4" id="por-${i}" style="align-items:end;margin-bottom:6px">
    <div class="fg" style="grid-column:span 2">
      <select class="fsel" id="por-prod-${i}" onchange="updatePOTotal()">
        <option value="">اختر الصنف</option>
        ${prods.map(p=>`<option value="${p.id}" data-price="${p.buyPrice||0}">${p.emoji||'📦'} ${p.name}</option>`).join('')}
      </select>
    </div>
    <div class="fg"><input class="finput" type="number" id="por-qty-${i}" placeholder="الكمية" min="0.01" step="0.01" oninput="updatePOTotal()"></div>
    <div class="fg"><input class="finput" type="number" id="por-price-${i}" placeholder="سعر الوحدة" min="0" step="0.01" oninput="updatePOTotal()"></div>
    <button class="btn-icon red" onclick="document.getElementById('por-${i}').remove();updatePOTotal()">🗑️</button>
  </div>`;
}

function addPORow(){
  const prods=DB.products.filter(p=>p.active!==false);
  const div=document.getElementById('po-rows');
  if(!div)return;
  const tmp=document.createElement('div');
  tmp.innerHTML=poRow(prods,_poIdx++);
  div.appendChild(tmp.firstElementChild);
}

function updatePOTotal(){
  let total=0;
  document.querySelectorAll('[id^="por-qty-"]').forEach(el=>{
    const i=el.id.replace('por-qty-','');
    const qty=parseFloat(el.value||0);
    const price=parseFloat(document.getElementById('por-price-'+i)?.value||0);
    total+=qty*price;
  });
  const el=document.getElementById('po-total');
  if(el)el.textContent=fmt(total);
}

function savePO(status){
  const supId=document.getElementById('po-sup')?.value;
  const whId=document.getElementById('po-wh')?.value;
  if(!supId){toast('اختر موردًا','r');return;}
  const items=[];
  document.querySelectorAll('[id^="por-qty-"]').forEach(el=>{
    const i=el.id.replace('por-qty-','');
    const pid=document.getElementById('por-prod-'+i)?.value;
    const qty=parseFloat(el.value||0);
    const price=parseFloat(document.getElementById('por-price-'+i)?.value||0);
    if(pid&&qty>0)items.push({productId:pid,qty,price,total:qty*price});
  });
  if(!items.length){toast('أضف أصنافاً','r');return;}
  const total=items.reduce((s,i)=>s+i.total,0);
  const po={id:genId(),no:genVoucherNo('PO'),supplierId:supId,warehouseId:whId,
    date:document.getElementById('po-date')?.value||new Date().toISOString().slice(0,10),
    items,total,paid:0,status,notes:document.getElementById('po-notes')?.value||''};
  if(!DB.purchaseOrders)DB.purchaseOrders=[];
  DB.purchaseOrders.push(po);
  // Update supplier balance
  const sup=DB.suppliers.find(s=>s.id===supId);
  if(sup)sup.balance=(sup.balance||0)+total;
  scheduleAutoSave();closeModalDirect();
  toast(`✅ تم حفظ الأمر ${po.no}`,'g');
  log('مشتريات ERP','أمر شراء '+po.no+' — '+fmt(total));
  setTimeout(function(){BKUP.afterOperation('أمر شراء');},200);
  renderPurchaseOrders();
}

function receivePO(poId){
  const po=DB.purchaseOrders.find(x=>x.id===poId);
  if(!po)return;
  if(!confirm(`استلام أمر ${po.no}؟ سيُضاف للمخزن`))return;
  const whId=po.warehouseId||getMainWH()?.id||'';
  po.items.forEach(item=>{
    addStock(whId,item.productId,item.qty);
    const prod=DB.products.find(p=>p.id===item.productId);
    if(prod)prod.stock=getTotalStock(item.productId);
    recordMov('in',null,whId,item.productId,item.qty,item.price||0,po.id,'استلام من '+po.no);
  });
  po.status='received';
  scheduleAutoSave();
  toast(`✅ تم استلام ${po.no} وتحديث المخزون`,'g');
  log('مشتريات ERP','استلام أمر '+po.no);
  setTimeout(function(){BKUP.afterOperation('استلام بضاعة');},200);
  renderPurchaseOrders();
}

function saveVoucher(type, partyId, partyType){
  const trId=document.getElementById('vc-tr')?.value;
  const amount=parseFloat(document.getElementById('vc-amt')?.value||0);
  const partyName=document.getElementById('vc-party')?.value||'';
  const notes=document.getElementById('vc-notes')?.value||'';
  if(!amount||amount<=0){toast('أدخل مبلغًا صحيحًا','r');return;}
  if(!trId){toast('اختر خزينة','r');return;}
  // Check balance for payment
  const tr=DB.treasuries.find(t=>t.id===trId);
  if(type==='payment'&&(tr?.balance||0)<amount){
    if(!confirm(`رصيد الخزينة (${fmt(tr.balance)}) أقل من المبلغ (${fmt(amount)}). هل تريد المتابعة؟`))return;
  }
  const v=createVoucher(type,amount,trId,partyType||'manual',partyId||'',partyName,notes);
  // Update party balances
  if(partyType==='customer'&&partyId){
    const cust=DB.customers.find(c=>c.id===partyId);
    if(cust&&type==='receipt')cust.debt=Math.max(0,(cust.debt||0)-amount);
  }
  if(partyType==='supplier'&&partyId){
    const sup=DB.suppliers.find(s=>s.id===partyId);
    if(sup&&type==='payment')sup.balance=Math.max(0,(sup.balance||0)-amount);
  }
  scheduleAutoSave();closeModalDirect();
  toast(`✅ تم حفظ السند ${v.no}`,'g');
  log('سندات',v.no+' — '+type+' — '+fmt(amount));
  setTimeout(function(){BKUP.afterOperation('سند');},200);
  renderVouchers();
}

function saveTreasury(editId){
  const name=document.getElementById('tr-name')?.value?.trim();
  if(!name){toast('الاسم مطلوب','r');return;}
  if(!DB.treasuries)DB.treasuries=[];
  const tr={id:editId||genId(),name,code:document.getElementById('tr-code')?.value||'',
    type:document.getElementById('tr-type')?.value||'cash',
    balance:editId?(DB.treasuries.find(x=>x.id===editId)?.balance||0):parseFloat(document.getElementById('tr-bal')?.value||0),
    notes:document.getElementById('tr-notes')?.value||'',active:true};
  if(editId){const i=DB.treasuries.findIndex(x=>x.id===editId);if(i>=0)DB.treasuries[i]=tr;}
  else DB.treasuries.push(tr);
  scheduleAutoSave();closeModalDirect();
  toast(`✅ تم ${editId?'تعديل':'إضافة'} الخزينة`,'g');
  log('خزينة',`${editId?'تعديل':'إضافة'}: ${name}`);
  renderTreasury();
}

function openTreasuryTransfer(){
  if(!DB.treasuries||DB.treasuries.length<2){toast('يجب وجود خزينتين على الأقل','a');return;}
  const trees=DB.treasuries.filter(t=>t.active!==false);
  openModal('↔️ تحويل بين الخزائن',`<div>
    <div class="frow f2">
      <div class="fg"><label class="flbl">من خزينة</label>
        <select class="fsel" id="tt-from">${trees.map(t=>`<option value="${t.id}">${t.name} (${fmt(t.balance||0)})</option>`).join('')}</select>
      </div>
      <div class="fg"><label class="flbl">إلى خزينة</label>
        <select class="fsel" id="tt-to">${trees.map((t,i)=>`<option value="${t.id}" ${i===1?'selected':''}>${t.name}</option>`).join('')}</select>
      </div>
    </div>
    <div class="frow f2">
      <div class="fg"><label class="flbl">المبلغ</label><input class="finput" type="number" id="tt-amt" min="0.01" step="0.01" placeholder="0.00"></div>
      <div class="fg"><label class="flbl">ملاحظة</label><input class="finput" id="tt-notes" placeholder="سبب التحويل..."></div>
    </div>
  </div>`,
  [{label:'إلغاء',cls:'btn-ghost',fn:'closeModalDirect()'},
   {label:'↔️ تحويل',cls:'btn-gold',fn:'executeTreasuryTransfer()'}]);
}

function executeTreasuryTransfer(){
  const fromId=document.getElementById('tt-from')?.value;
  const toId=document.getElementById('tt-to')?.value;
  const amount=parseFloat(document.getElementById('tt-amt')?.value||0);
  const notes=document.getElementById('tt-notes')?.value||'';
  if(fromId===toId){toast('الخزينتان متطابقتان','r');return;}
  if(!amount||amount<=0){toast('أدخل مبلغًا','r');return;}
  const from=DB.treasuries.find(t=>t.id===fromId);
  if((from?.balance||0)<amount&&!confirm(`رصيد الخزينة (${fmt(from?.balance||0)}) أقل من المبلغ. متأكد؟`))return;
  adjustTreasury(fromId,-amount);
  adjustTreasury(toId,amount);
  const to=DB.treasuries.find(t=>t.id===toId);
  const v=createVoucher('transfer',amount,fromId,'treasury',toId,to?.name||'',notes||'تحويل بين خزائن');
  scheduleAutoSave();closeModalDirect();
  toast(`✅ تحويل ${fmt(amount)} من ${from?.name} إلى ${to?.name}`,'g');
  log('خزينة',`تحويل ${amount} من ${from?.name} إلى ${to?.name}`);
  renderTreasury();
}

function openNewJournal(){
  if(!DB.accounts.length){toast('أضف دليل الحسابات أولاً','a');go('chart_accounts');return;}

function updateJTotal(){
  let d=0,cr=0;
  document.querySelectorAll('#j-entries tr').forEach(row=>{
    const inps=row.querySelectorAll('input');
    d+=parseFloat(inps[0]?.value||0);
    cr+=parseFloat(inps[1]?.value||0);
  });
  const el=document.getElementById('j-balance');
  if(el){
    const bal=Math.abs(d-cr)<0.01;
    el.innerHTML=`المدين: <b style="color:var(--green)">${fmt(d)}</b> | الدائن: <b style="color:var(--red)">${fmt(cr)}</b> ${bal?'<span style="color:var(--green)">✅</span>':'<span style="color:var(--red)">❌</span>'}`;
  }
}

function saveJournal(){
  const entries=[];
  let td=0,tc=0;
  document.querySelectorAll('#j-entries tr').forEach(row=>{
    const sels=row.querySelectorAll('select');
    const inps=row.querySelectorAll('input');
    if(!sels.length)return;
    const accId=sels[0].value;
    const debit=parseFloat(inps[0]?.value||0);
    const credit=parseFloat(inps[1]?.value||0);
    if(accId&&(debit||credit)){entries.push({accountId:accId,debit,credit});td+=debit;tc+=credit;}
  });
  if(!entries.length){toast('أضف قيودًا','r');return;}
  if(Math.abs(td-tc)>0.01){toast(`المدين (${fmt(td)}) ≠ الدائن (${fmt(tc)}) — القيد غير متوازن`,'r');return;}
  const desc=document.getElementById('j-desc')?.value?.trim();
  if(!desc){toast('أدخل بيان القيد','r');return;}
  if(!DB.journals)DB.journals=[];
  const j={id:genId(),no:genVoucherNo('JRN'),date:document.getElementById('j-date')?.value||new Date().toISOString().slice(0,10),
    description:desc,entries,userId:currentUser?.id||''};
  DB.journals.push(j);
  // Update account balances
  entries.forEach(e=>{
    const acc=DB.accounts.find(a=>a.id===e.accountId);
    if(acc)acc.balance=(acc.balance||0)+(e.debit||0)-(e.credit||0);
  });
  scheduleAutoSave();closeModalDirect();
  toast(`✅ تم حفظ القيد ${j.no}`,'g');
  log('محاسبة','قيد '+j.no+' — '+desc);
  renderJournals();
}

// Migration: sync existing product.stock to warehouse stock on first load
function migrateStockToWarehouse(){
  const mainWH=getMainWH();
  if(!mainWH||!DB.products.length)return;
  let migrated=0;
  DB.products.forEach(p=>{
    if((p.stock||0)>0&&!getStock(mainWH.id,p.id)){
      setStock(mainWH.id,p.id,p.stock||0);
      migrated++;
    }
  });
  if(migrated>0){
    scheduleAutoSave();
    console.log(`Migrated ${migrated} products to warehouse ${mainWH.name}`);
  }
}

// Run migration after login - hook via setTimeout check
window._erpMigrateHook = function(){
  if((DB.warehouses||[]).length>0) migrateStockToWarehouse();
};

function _getBulkProducts(){
  const by=document.getElementById('bpu-by')?.value||'all';
  const filter=document.getElementById('bpu-filter')?.value||'';
  return DB.products.filter(p=>{
    if(p.active===false)return false;
    if(by==='all'||!filter)return true;
    if(by==='mfr') return p.manufacturer===filter;
    if(by==='brand') return p.brand===filter;
    if(by==='cat') return p.category===filter;
    return true;
  });
}

function _calcBulkNewPrice(price, type, val2){
  if(!val2||val2<=0)return price;
  if(type==='pct_up')  return Math.round((price*(1+val2/100))*100)/100;
  if(type==='pct_dn')  return Math.round((price*(1-val2/100))*100)/100;
  if(type==='add')     return Math.round((price+val2)*100)/100;
  if(type==='sub')     return Math.max(0,Math.round((price-val2)*100)/100);
  return price;
}

function previewBulkPrice(){
  const prods=_getBulkProducts();
  const prev=document.getElementById('bpu-preview');
  if(!prev)return;
  prev.innerHTML=`<b style="color:var(--gold)">${prods.length} منتج سيتأثر</b><br>
    ${prods.slice(0,5).map(p=>`${p.emoji||'📦'} ${p.name}`).join(' · ')}${prods.length>5?' ...':''}`;
}

function applyBulkPrice(){
  const prods=_getBulkProducts();
  const type=document.getElementById('bpu-type')?.value||'pct_up';
  const val2=parseFloat(document.getElementById('bpu-val')?.value||0);
  const target=document.getElementById('bpu-target')?.value||'sell1';
  if(!val2||val2<=0){toast('أدخل قيمة','r');return;}
  if(!prods.length){toast('لا توجد منتجات متطابقة','r');return;}
  if(!confirm(`تطبيق على ${prods.length} منتج؟`))return;

  prods.forEach(p=>{
    if(target==='buy'||target==='both'){
      p.buyPrice=_calcBulkNewPrice(p.buyPrice||0,type,val2);
    }
    if(target==='sell1'||target==='both'){
      if(type==='margin') p.sellPrice=Math.round((p.buyPrice||0)*(1+val2/100)*100)/100;
      else p.sellPrice=_calcBulkNewPrice(p.sellPrice||0,type,val2);
    }
    if(target==='sell2'||target==='both'){
      if(p.sellPrice2>0){
        if(type==='margin') p.sellPrice2=Math.round((p.buyPrice||0)*(1+(val2*0.8)/100)*100)/100;
        else p.sellPrice2=_calcBulkNewPrice(p.sellPrice2||0,type,val2);
      }
    }
  });

  scheduleAutoSave();
  closeModalDirect();
  toast(`✅ تم تحديث ${prods.length} منتج`,'g');
  log('مخزون',`تحديث جماعي للأسعار — ${type} ${val2} — ${prods.length} منتج`);
  renderInventory();
}

function confirmCollection(custId) {
  const cu = DB.customers.find(x=>x.id===custId);
  if(!cu) return;
  const amount = parseFloat(document.getElementById('col-amount')?.value||0);
  if(!amount||amount<=0){ toast('أدخل مبلغاً صحيحاً','r'); return; }
  const trId = document.getElementById('col-treasury')?.value;
  const method = document.getElementById('col-method')?.value||'نقدي';
  const notes = document.getElementById('col-notes')?.value||'';
  const invId = document.getElementById('col-inv')?.value||'';

  // Update customer debt
  cu.debt = Math.max(0, (cu.debt||0) - amount);

  // Update specific invoice if selected
  if(invId) {
    const inv = DB.invoices.find(i=>i.id===invId);
    if(inv){
      inv.paid = (inv.paid||0) + amount;
      if(inv.paid >= inv.total) inv.status = 'done';
    }
  } else {
    // Apply to oldest invoices first
    let remaining = amount;
    const pendingInvs = DB.invoices
      .filter(i=>i.customerId===custId&&i.status==='partial')
      .sort((a,b)=>new Date(a.date)-new Date(b.date));
    for(const inv of pendingInvs){
      if(remaining<=0) break;
      const rem = (inv.total||0)-(inv.paid||0);
      const pay = Math.min(rem, remaining);
      inv.paid = (inv.paid||0) + pay;
      if(inv.paid >= inv.total) inv.status = 'done';
      remaining -= pay;
    }
  }

  // Create receipt voucher
  const v = createVoucher('receipt', amount, trId, 'customer', custId, cu.name,
    `تحصيل — ${method}${notes?' — '+notes:''}`);

  scheduleAutoSave();
  closeModalDirect();
  toast(`✅ تم تحصيل ${fmt(amount)} ج من ${cu.name} · سند ${v.no}`, 'g');
  log('تحصيل', `${cu.name} — ${fmt(amount)} ج — ${method}`);
  setTimeout(()=>{ BKUP.afterOperation('تحصيل'); }, 200);
  renderCollection();
}

        </div>`).join('')}
    </div>
  </div>`,
  [{label:'إلغاء',cls:'btn-ghost',fn:'closeModalDirect()'},
   {label:'💰 تحصيل الكل',cls:'btn-gold',fn:'processBulkCollection()'}],
  false, true);
}

function processBulkCollection() {
  const trId = document.getElementById('bulk-col-tr')?.value;
  const debtors = DB.customers.filter(cu=>(cu.debt||0)>0);
  let total = 0, count = 0;
  debtors.forEach(cu => {
    const amount = parseFloat(document.getElementById('bulk-col-'+cu.id)?.value||0);
    if(amount <= 0) return;
    cu.debt = Math.max(0, (cu.debt||0) - amount);
    // Apply to invoices
    let remaining = amount;
    const pendingInvs = DB.invoices
      .filter(i=>i.customerId===cu.id&&i.status==='partial')
      .sort((a,b)=>new Date(a.date)-new Date(b.date));
    for(const inv of pendingInvs){
      if(remaining<=0) break;
      const rem=(inv.total||0)-(inv.paid||0);
      const pay=Math.min(rem,remaining);
      inv.paid=(inv.paid||0)+pay;
      if(inv.paid>=inv.total) inv.status='done';
      remaining-=pay;
    }
    createVoucher('collection', amount, trId, 'customer', cu.id, cu.name, 'تحصيل جماعي');
    total += amount; count++;
  });
  if(!count){ toast('أدخل مبالغ التحصيل','r'); return; }
  scheduleAutoSave();
  closeModalDirect();
  toast(`✅ تم تحصيل ${fmt(total)} ج من ${count} عميل`, 'g');
  log('تحصيل جماعي', `${count} عميل — ${fmt(total)} ج`);
  setTimeout(()=>{ BKUP.afterOperation('تحصيل'); }, 200);
  renderCollection();
}
