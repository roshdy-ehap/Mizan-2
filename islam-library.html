      <div class="stat cc-gold"><div class="stat-icon si-gold">☀️</div><div class="stat-val">${fmt(todayData.sales)}</div><div class="stat-lbl">مبيعات اليوم</div></div>
      ${currentPerms.seeProfits?`<div class="stat cc-green"><div class="stat-icon si-green">📈</div><div class="stat-val">${fmt(todayData.profit)}</div><div class="stat-lbl">ربح اليوم</div></div>`:''}
      <div class="stat cc-blue"><div class="stat-icon si-blue">🧾</div><div class="stat-val">${todayData.count}</div><div class="stat-lbl">فواتير اليوم</div></div>

    </div>

      <div class="card-head"><span>🧾</span><span class="card-title">فواتير اليوم</span></div>
      ${done.filter(i=>new Date(i.date||i.created_at).toDateString()===todayS).length===0
        ?'<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">لا توجد فواتير اليوم</div></div>'
        :`<table><thead><tr><th>رقم</th><th>العميل</th><th>الإجمالي</th><th>طريقة الدفع</th><th>الوقت</th><th></th></tr></thead><tbody>
        ${done.filter(i=>new Date(i.date||i.created_at).toDateString()===todayS).map(inv=>{
          const cust=DB.customers.find(c=>c.id===inv.customerId);
          return `<tr>

          </tr>`;

    </div>` : ''}

    ${tab==='monthly' ? `
    <div class="stats-grid sg4 mb2">
      <div class="stat cc-gold"><div class="stat-icon si-gold">🗓️</div><div class="stat-val">${fmt(monthData.sales)}</div><div class="stat-lbl">مبيعات الشهر</div></div>
      ${currentPerms.seeProfits?`<div class="stat cc-green"><div class="stat-icon si-green">📈</div><div class="stat-val">${fmt(monthData.profit)}</div><div class="stat-lbl">ربح الشهر</div></div>`:''}
      <div class="stat cc-blue"><div class="stat-icon si-blue">🧾</div><div class="stat-val">${monthData.count}</div><div class="stat-lbl">فواتير الشهر</div></div>
      <div class="stat cc-violet"><div class="stat-icon si-violet">📅</div><div class="stat-val">${fmt(yearData.sales)}</div><div class="stat-lbl">مبيعات السنة</div></div>
    </div>
    <div class="card">

      <div style="padding:16px;display:flex;gap:4px;align-items:flex-end;height:160px">${barChart(months12,maxMonth,'linear-gradient(to top,#3b9eff,#6ab8ff)')}</div>

    ${tab==='compare' ? `

      <div class="card-head"><span>📈</span><span class="card-title">مقارنة — آخر 7 أيام</span></div>
      <div style="overflow-x:auto"><table><thead><tr><th>اليوم</th><th>المبيعات</th><th>عدد الفواتير</th>${currentPerms.seeProfits?'<th>الربح التقديري</th>':''}</tr></thead><tbody>
      ${days7.map((d,i)=>{
        const dt=new Date(); dt.setDate(dt.getDate()-(6-i));
        const dayInv=done.filter(inv=>new Date(inv.date||inv.created_at).toDateString()===dt.toDateString());
        const cost=dayInv.reduce((s,inv)=>s+inv.items.reduce((ss,it)=>{const p=DB.products.find(x=>x.id===it.id);return ss+(p?.buyPrice||0)*it.qty},0),0);
        const isToday=dt.toDateString()===todayS;
        return `<tr ${isToday?'style="background:rgba(200,168,75,.06)"':''}>

function printReport() {
  const tab = window._rptTab || 'summary';
  const labels = {summary:'ملخص عام',daily:'تقرير يومي',monthly:'تقرير شهري',compare:'مقارنة المبيعات',expenses:'المصروفات'};
  const win = window.open('','_blank','width=800,height=600');
  const content = document.getElementById('content').innerHTML;
  win.document.write(`<!DOCTYPE html><html dir="rtl" lang="ar"><head>
    <meta charset="UTF-8"><title>${labels[tab]||'تقرير'}</title>
    <style>body{font-family:Tajawal,Arial,sans-serif;padding:20px;color:#111}
    table{width:100%;border-collapse:collapse}td,th{border:1px solid #ddd;padding:8px;text-align:right}
    th{background:#f5f5f5;font-weight:700}.stat{background:#f9f9f9;border:1px solid #ddd;border-radius:8px;padding:12px;display:inline-block;margin:6px;min-width:140px;text-align:center}
    .stat-val{font-size:22px;font-weight:900}.stat-lbl{font-size:11px;color:#666}
    @media print{button{display:none}}</style>
  </head><body>
    <div style="text-align:center;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #c8a84b">
      <h1 style="margin:0;color:#c8a84b">ميزان</h1>
      <div style="color:#666;font-size:13px">${labels[tab]} — ${new Date().toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'})}</div>
    </div>
    ${content}
    <script>window.onload=()=>window.print()<\/script>
  </body></html>`);
  win.document.close();
}


function buildTopProducts() {
  const counts = {};
  DB.invoices.forEach(inv => inv.items.forEach(item => { counts[item.id] = (counts[item.id]||0) + item.qty; }));
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if (!top.length) return `<div class="empty"><div class="empty-icon">📦</div><div class="empty-title">لا بيانات بعد</div></div>`;
  return `<table><thead><tr><th>#</th><th>المنتج</th><th>الوحدات المباعة</th></tr></thead><tbody>
  ${top.map(([id,qty],i) => { const p=DB.products.find(x=>x.id===id); return `<tr><td style="color:var(--gold);font-weight:700">${i+1}</td><td style="font-weight:600">${p?`${p.emoji} ${p.name}`:id}</td><td style="color:var(--green);font-weight:700">${qty}</td></tr>`; }).join('')}
  </tbody></table>`;
}

function buildTopCustomers() {
  const top = [...DB.customers].sort((a,b)=>(b.totalBuy||0)-(a.totalBuy||0)).slice(0,5);
  if (!top.length) return `<div class="empty"><div class="empty-icon">👥</div><div class="empty-title">لا بيانات بعد</div></div>`;
  return `<table><thead><tr><th>#</th><th>العميل</th><th>إجمالي المشتريات</th></tr></thead><tbody>
  ${top.map((cu,i)=>`<tr><td style="color:var(--gold);font-weight:700">${i+1}</td><td style="font-weight:600">${cu.name}</td><td style="color:var(--green);font-weight:700">${fmt(cu.totalBuy||0)} ج</td></tr>`).join('')}
  </tbody></table>`;
}

function exportReports() {
  const data = DB.invoices.map(inv=>({'رقم الفاتورة':inv.no,'الإجمالي':inv.total,'التاريخ':fmtDate(inv.date)}));
  exportToExcel(data, 'التقارير');
}

function calcMachineBalance(machineId) {
  if(!machineId) return 0;
  const m = DB.machines.find(x=>x.id===machineId);
  const startBalance = m?.startBalance || 0;
  const ops = DB.machineOps.filter(o=>o.machineId===machineId);
  let bal = startBalance;
  ops.forEach(o=>{
    if(o.type==='إيداع') bal += (o.amount||0);
    else if(o.type==='سحب'||o.type==='تحويل'||o.type==='دفع فواتير') bal -= (o.amount||0);
  });
  return bal;
}

function updateMachineBalance() {
  const mid = document.getElementById('mo-m')?.value;
  const m = DB.machines.find(x=>x.id===mid);
  const bal = calcMachineBalance(mid);
  const el = document.getElementById('mBalancePreview');
  if(el) el.textContent = fmt(bal) + ' ج';
  // Update fee based on operation type
  const type = document.getElementById('mo-type')?.value||'سحب';
  const feeEl = document.getElementById('mo-fee');
  if(feeEl && m) feeEl.value = (type==='إيداع'?m.feeD:m.feeW)||0;
  calcMachineProfit();
}
function calcMachineProfit(){const a=num('mo-amt');const f=num('mo-fee');const el=document.getElementById('moProfitPreview');if(el)el.textContent=`${fmt(a*f/100)} ج`;}
function saveMachineOp(){
  const mId=val('mo-m');const amt=num('mo-amt');const fee=num('mo-fee');
  const note=val('mo-note')||'';
  if(!mId||!amt){toast('بيانات ناقصة','r');return}
  const balBefore=calcMachineBalance(mId);
  const op={id:genId(),machineId:mId,type:val('mo-type'),amount:amt,fee,profit:Math.round(amt*fee/100*100)/100,note,date:new Date().toISOString(),cashierId:currentUser.id,balBefore};
  DB.machineOps.push(op);
  closeModalDirect();toast('تم تسجيل العملية','g');scheduleAutoSave();log('ماكينات',`عملية ${op.type}: ${fmt(amt)} ج — ربح ${fmt(op.profit)} ج`);renderMachines();
}
function deleteMachineOp(id){if(!confirm('حذف هذه العملية؟'))return;DB.machineOps=DB.machineOps.filter(x=>x.id!==id);toast('تم الحذف','g');renderMachines();}

function togglePerm(key) {

function handleExcelFile(event) {
  const file = event.target.files[0];
  if (file) processExcelFile(file);
}

function processExcelFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const pa = document.getElementById('excelPreviewArea');
      if (!pa) return;

      // Detect type from sheet names or columns
      const sheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });

      if (rows.length === 0) { pa.innerHTML = `<div style="text-align:center;padding:20px;color:var(--red)">⚠️ الملف فارغ أو لا يحتوي على بيانات</div>`; return; }

      // Auto-detect type
      const keys = Object.keys(rows[0]).map(k => k.toLowerCase());
      let dataType = 'unknown';
      if (keys.some(k => k.includes('سعر') || k.includes('price') || k.includes('stock') || k.includes('كمية'))) dataType = 'products';
      else if (keys.some(k => k.includes('تليفون') || k.includes('phone') || k.includes('عميل'))) dataType = 'customers';
      else if (keys.some(k => k.includes('مورد') || k.includes('supplier'))) dataType = 'suppliers';

      pa.innerHTML = `
        <div style="margin-top:14px;background:var(--raised);border:1px solid var(--border2);border-radius:var(--RS);overflow:hidden">
          <div style="padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px">
            <div>
              <div style="font-size:13.5px;font-weight:700">✅ تم قراءة الملف: <span style="color:var(--green)">${file.name}</span></div>
              <div style="font-size:11px;color:var(--txt3);margin-top:2px">${rows.length} صف — ورقة: ${sheetName} — نوع مكتشف: <b style="color:var(--amber)">${dataType==='products'?'منتجات':dataType==='customers'?'عملاء':dataType==='suppliers'?'موردون':'غير معروف'}</b></div>
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              <select class="fsel" id="importType" style="width:140px;font-size:12px;padding:6px 10px">
                <option value="products" ${dataType==='products'?'selected':''}>📦 منتجات</option>
                <option value="customers" ${dataType==='customers'?'selected':''}>👥 عملاء</option>
                <option value="suppliers" ${dataType==='suppliers'?'selected':''}>🏭 موردون</option>
              </select>
              <button class="btn btn-green" onclick="doImport(${JSON.stringify(rows).split('"').join("'")})">📥 استيراد الكل (${rows.length})</button>
            </div>
          </div>
          <div style="max-height:250px;overflow:auto">
            <table><thead><tr>${Object.keys(rows[0]).map(k=>`<th>${k}</th>`).join('')}</tr></thead><tbody>
            ${rows.slice(0,10).map(row=>`<tr>${Object.values(row).map(v=>`<td>${v}</td>`).join('')}</tr>`).join('')}
            </tbody></table>
            ${rows.length > 10 ? `<div style="text-align:center;padding:8px;font-size:11px;color:var(--txt3)">... و ${rows.length-10} صف آخر</div>` : ''}
          </div>
        </div>`;

      // Store rows for import
      window._importRows = rows;
    } catch(err) {
      const pa = document.getElementById('excelPreviewArea');
      if (pa) pa.innerHTML = `<div style="text-align:center;padding:16px;color:var(--red)">❌ خطأ في قراءة الملف: ${err.message}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function doImport(rowsStr) {
  // rows may come as string from onclick
  const rows = window._importRows || [];
  const type = document.getElementById('importType')?.value || 'products';
  if (rows.length === 0) { toast('لا توجد بيانات للاستيراد','r'); return; }

  let count = 0;
  if (type === 'products') {
    rows.forEach(row => {
      const name = row['الاسم'] || row['اسم المنتج'] || row['name'] || row['Name'] || '';
      if (!name) return;
      DB.products.push({
        id: genId(),
        name: String(name).trim(),
        category: String(row['الفئة'] || row['category'] || 'أخرى').trim(),
        unit: String(row['الوحدة'] || row['unit'] || '').trim(),
        buyPrice: parseFloat(row['سعر الشراء'] || row['buyPrice'] || 0) || 0,
        sellPrice: parseFloat(row['سعر البيع'] || row['sellPrice'] || 0) || 0,
        stock: parseInt(row['الكمية'] || row['stock'] || 0) || 0,
        minStock: parseInt(row['الحد الأدنى'] || row['minStock'] || 0) || 0,
        barcode: String(row['الباركود'] || row['barcode'] || '').trim(),
        emoji: String(row['الرمز'] || row['emoji'] || '📦').trim() || '📦',
        expiry: String(row['تاريخ الانتهاء'] || row['expiry'] || '').trim(),
      });
      count++;
    });
    log('استيراد', `استيراد ${count} منتج من Excel`);
    toast(`✅ تم استيراد ${count} منتج`, 'g');
  } else if (type === 'customers') {
    rows.forEach(row => {
      const name = row['الاسم'] || row['اسم العميل'] || row['name'] || '';
      if (!name) return;
      DB.customers.push({
        id: genId(),
        name: String(name).trim(),
        phone: String(row['التليفون'] || row['phone'] || '').trim(),
        type: String(row['التصنيف'] || row['type'] || 'عادي').trim(),
        debtLimit: parseFloat(row['حد الدين'] || 0) || 0,
        address: String(row['العنوان'] || row['address'] || '').trim(),
        notes: String(row['ملاحظات'] || row['notes'] || '').trim(),
        totalBuy: 0, debt: 0,
      });
      count++;
    });
    log('استيراد', `استيراد ${count} عميل من Excel`);
    toast(`✅ تم استيراد ${count} عميل`, 'g');
  } else if (type === 'suppliers') {
    rows.forEach(row => {
      const name = row['الاسم'] || row['اسم المورد'] || row['name'] || '';
      if (!name) return;
      DB.suppliers.push({
        id: genId(), name: String(name).trim(),
        phone: String(row['التليفون'] || '').trim(),
        address: String(row['العنوان'] || '').trim(),
        totalOwed: 0,
      });
      count++;
    });
    log('استيراد', `استيراد ${count} مورد من Excel`);
    toast(`✅ تم استيراد ${count} مورد`, 'g');
  }

  scheduleAutoSave();
  renderExcel();
}

async function changeSelfPassword() {
  const np = document.getElementById('self-pw-new')?.value||'';
  const cp = document.getElementById('self-pw-confirm')?.value||'';
  const err = document.getElementById('self-pw-err');
  if(np.length < 4) { err.textContent='كلمة المرور يجب أن تكون 4 أحرف على الأقل'; err.style.display='block'; return; }
  if(np !== cp) { err.textContent='كلمتا المرور غير متطابقتين'; err.style.display='block'; return; }
  const isBuiltin = currentUser.id.startsWith('sys-');
  if(isBuiltin) {
    const acc = BUILTIN_ACCOUNTS.find(a=>a.id===currentUser.id);
    const hashed = await CRYPTO.hashPassword(np);
    if(acc) { acc.password=hashed; saveBuiltins(); }
  } else {
    const acc = DB.staff.find(a=>a.id===currentUser.id);
    if(acc) { acc.password=hashed; scheduleAutoSave(); }
  }
  err.style.display='none';
  toast('✅ تم تغيير كلمة مرورك بنجاح','g');
  log('أمان','تغيير كلمة المرور الشخصية');
  document.getElementById('self-pw-new').value='';
  document.getElementById('self-pw-confirm').value='';
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function fmt(n) { return (n||0).toLocaleString('ar-EG', {maximumFractionDigits:2}); }
function fmtDate(d) { return d ? new Date(d).toLocaleString('ar-EG',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—'; }
function val(id) { return document.getElementById(id)?.value || ''; }
function num(id) { return parseFloat(document.getElementById(id)?.value||0)||0; }
function setTxt(id, t) { const el=document.getElementById(id); if(el)el.textContent=t; }
function statusBadge(s) { const m={'done':'<span class="badge bg">مكتملة</span>','return':'<span class="badge br">مرتجعة</span>','hold':'<span class="badge ba">معلقة</span>'}; return m[s]||`<span class="badge bb">${s}</span>`; }

function log(action, details) {
  DB.activityLog.push({ id:genId(), user:currentUser?.name||'—', action, details, time: new Date().toLocaleString('ar-EG') });
  if (DB.activityLog.length > 1000) DB.activityLog.shift();
}

let toastTimer;
function toast(msg, type='g') {
  const el = document.getElementById('toast');
  const icons = {g:'✅', r:'❌', a:'⚠️'};
  document.getElementById('toastIcon').textContent = icons[type]||'ℹ️';
  document.getElementById('toastMsg').textContent = msg;
  el.className = `toast show t${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 3000);
}

function scheduleAutoSave() {
  try { PERSIST.schedule(DB); } catch(e) {
    // Fallback to localStorage
    try { localStorage.setItem('islam_db_mirror', JSON.stringify(DB)); } catch(e2){}
    const el = document.getElementById('saveIndicator');
    if (el) { el.style.opacity='1'; setTimeout(()=>el.style.opacity='0',1500); }
  }
}

async function saveToLocalStorage() {
  try {
    await PERSIST.save(DB);
  } catch(e) {
    try { localStorage.setItem('islam_db_mirror', JSON.stringify(DB)); } catch(e2){}
  }
}

async function loadFromLocalStorage() {
  try {
    const saved = await PERSIST.load();
    if (!saved || !saved.products) return false;
    Object.keys(saved).forEach(k => { if (k in DB) DB[k] = saved[k]; });
    return true;
  } catch(e) {
    try {
      const raw = localStorage.getItem('islam_db_mirror') || localStorage.getItem('mizan_db_v2');
      if (!raw) return false;
      const saved = JSON.parse(raw);
      if (!saved?.products) return false;
      Object.keys(saved).forEach(k => { if(k in DB) DB[k] = saved[k]; });
      return true;
    } catch(e2) { return false; }
  }
}

async function backup() {
  await PERSIST.save(DB);
  // Also save named backup in IndexedDB
  const label = 'يدوي — ' + new Date().toLocaleString('ar-EG');
  await PERSIST.createManualBackup(DB, label);
  // Download JSON file
  const data = JSON.stringify(DB, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `mizan-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  await IDB.logActivity({ user: currentUser?.name||'نظام', action:'نسخة احتياطية يدوية', details: label });
  toast('✅ تم حفظ النسخة الاحتياطية في 3 أماكن', 'g');
  log('نظام','نسخة احتياطية يدوية');
}

function restoreBackup() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const restored = JSON.parse(ev.target.result);
        if (!restored.products) { toast('ملف غير صالح','r'); return; }
        Object.assign(DB, restored);
        saveToLocalStorage();
        toast('تم استعادة النسخة الاحتياطية وحفظها','g');
        log('نظام','استعادة نسخة احتياطية');
        go(currentPage || 'dash');
      } catch { toast('خطأ في قراءة الملف','r'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function clearAllData() {
  if (!confirm('⚠️ هذا سيحذف كل البيانات نهائياً!\n\nهل أنت متأكد تماماً؟')) return;
  if (!confirm('تأكيد أخير: حذف كل البيانات؟')) return;
  localStorage.removeItem(LS_KEY);
  ['products','customers','suppliers','invoices','purchases','expenses','machines','machineOps','recipes','staff','shifts','activityLog'].forEach(k => DB[k] = []);
  DB.invoiceCounter = 1; DB.purchaseCounter = 1;
  toast('تم مسح كل البيانات','r');
  go('dash');
}

function exportToExcel(data, sheetName) {
  if (!data || data.length === 0) { toast('لا توجد بيانات للتصدير','a'); return; }
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  XLSX.writeFile(wb, `${sheetName}-${new Date().toISOString().slice(0,10)}.xlsx`);
  toast(`تم تصدير ${sheetName}`, 'g');
  log('تصدير', `تصدير ${sheetName} — ${data.length} سجل`);
}

function doGenKey() {
  const client = (document.getElementById('vnd-client')?.value||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  const days = parseInt(document.getElementById('vnd-days')?.value||365);
  if(!client) { showToastGlobal('أدخل كود العميل','r'); return; }
  if(client.length < 3) { showToastGlobal('كود العميل 3 أحرف على الأقل','r'); return; }
  const key = genKey(client, days);
  const out = document.getElementById('vnd-out');
  if(out) out.style.display='block';
  const keyEl = document.getElementById('vnd-key-out');
  if(keyEl) keyEl.textContent = key;
  const info = document.getElementById('vnd-key-info');
  if(info) info.textContent = `العميل: ${client} | المدة: ${days>=36000?'دائم':days+' يوم'}`;
}

function showToastGlobal(msg, type) {
  const el = document.getElementById('toast');
  if(!el) return;
  const icons={g:'✅',r:'❌',a:'⚠️'};
  document.getElementById('toastIcon').textContent = icons[type]||'ℹ️';
  document.getElementById('toastMsg').textContent = msg;
  el.className = `toast show t${type}`;
  clearTimeout(window._toastT);
  window._toastT = setTimeout(()=>{ el.className='toast'; }, 3200);
}

function saveNewPassword(accId, isBuiltin) {
  const np = document.getElementById('cpw-new')?.value||'';
  const cp = document.getElementById('cpw-confirm')?.value||'';
  const err = document.getElementById('cpw-err');
  if(np.length < 4) { err.textContent='كلمة المرور يجب أن تكون 4 أحرف على الأقل'; err.style.display='block'; return; }
  if(np !== cp) { err.textContent='كلمتا المرور غير متطابقتين'; err.style.display='block'; return; }
  if(isBuiltin || isBuiltin==='true') {
    const acc = BUILTIN_ACCOUNTS.find(a=>a.id===accId);
    if(acc) { acc.password = np; saveBuiltins(); }
  } else {
    const acc = DB.staff.find(a=>a.id===accId);
    if(acc) { acc.password = np; scheduleAutoSave(); }
  }
  closeModalDirect();
  toast('✅ تم تغيير كلمة المرور','g');
  log('أمان',`تغيير كلمة المرور للحساب: ${accId}`);
}

                <td>${statusLabel}</td>

  `,[

function confirmDebtCollection(custId) {
  const cust = DB.customers.find(c=>c.id===custId);
  if(!cust) return;
  const amount = parseFloat(document.getElementById('debt-amount')?.value||0);
  if(!amount||amount<=0) { toast('أدخل المبلغ','r'); return; }
  const note = document.getElementById('debt-note')?.value||'';

  // Distribute payment on oldest partial invoices first
  let remaining = amount;
  const partials = DB.invoices.filter(i=>i.customerId===custId&&(i.status==='partial'||i.paid<i.total)).sort((a,b)=>new Date(a.date||a.created_at)-new Date(b.date||b.created_at));
  for(const inv of partials) {
    if(remaining<=0) break;
    const owed = inv.total-(inv.paid||0);
    const pay  = Math.min(owed, remaining);
    inv.paid   = (inv.paid||0)+pay;
    if(inv.paid>=inv.total-0.01) { inv.status='done'; inv.paid=inv.total; }
    else inv.status='partial';
    remaining -= pay;
  }

  cust.debt = Math.max(0,(cust.debt||0)-amount);
  log('تحصيل',`تحصيل دين ${fmt(amount)} ج من ${cust.name} — ${note}`);
  scheduleAutoSave();
  closeModalDirect();
  toast(`✅ تم تحصيل ${fmt(amount)} ج من ${cust.name}`, 'g');
  if(typeof renderCustomers==='function') renderCustomers();
}

function confirmSupplierPay(suppId) {
  const supp   = DB.suppliers.find(s=>s.id===suppId);
  if(!supp) return;
  const amount = parseFloat(document.getElementById('sp-amt')&&document.getElementById('sp-amt').value||0);
  const method = document.getElementById('sp-meth')&&document.getElementById('sp-meth').value||'cash';
  const note   = document.getElementById('sp-note')&&document.getElementById('sp-note').value||'';
  if(!amount||amount<=0) { toast('أدخل المبلغ','r'); return; }
  let rem = amount;
  DB.purchases
    .filter(p=>p.supplierId===suppId && p.total-(p.paid||0)>0)
    .sort((a,b)=>new Date(a.date||a.created_at)-new Date(b.date||b.created_at))
    .forEach(function(p){
      if(rem<=0) return;
      const owed=p.total-(p.paid||0);
      const pay=Math.min(owed,rem);
      p.paid=(p.paid||0)+pay;
      rem-=pay;
    });
  supp.totalOwed=Math.max(0,(supp.totalOwed||0)-amount);
  log('تسديد مورد', fmt(amount)+' ج — '+supp.name+' — '+method+' — '+note);
  scheduleAutoSave();
  setTimeout(function(){BKUP.afterOperation('سداد-مورد');},200);
  closeModalDirect();
  toast('✅ تم تسديد '+fmt(amount)+' ج للمورد '+supp.name,'g');
  renderSuppliers();
}

function confirmCollectDebt(custId) {
  const cust   = DB.customers.find(c=>c.id===custId);
  if(!cust) return;
  const amount = parseFloat(document.getElementById('cd-amt')&&document.getElementById('cd-amt').value||0);
  const method = document.getElementById('cd-meth')&&document.getElementById('cd-meth').value||'cash';
  const note   = document.getElementById('cd-note')&&document.getElementById('cd-note').value||'';
  if(!amount||amount<=0) { toast('أدخل المبلغ','r'); return; }
  let rem = amount;
  DB.invoices
    .filter(i=>i.customerId===custId && Math.max(0,i.total-(i.paid||0))>0 && i.status!=='returned')
    .sort((a,b)=>new Date(a.date||a.created_at)-new Date(b.date||b.created_at))
    .forEach(function(inv){
      if(rem<=0) return;
      const owed=inv.total-(inv.paid||0);
      const pay=Math.min(owed,rem);
      inv.paid=(inv.paid||0)+pay;
      if(inv.paid>=inv.total-0.01){ inv.status='done'; inv.paid=inv.total; }
      else inv.status='partial';
      rem-=pay;
    });
  cust.debt=Math.max(0,(cust.debt||0)-amount);
  log('تحصيل', fmt(amount)+' ج من '+cust.name+' — '+method+' — '+note);
  scheduleAutoSave();
  setTimeout(function(){BKUP.afterOperation('تحصيل-دين');},200);
  closeModalDirect();
  toast('✅ تم تحصيل '+fmt(amount)+' ج من '+cust.name,'g');
  renderCustomers();
}

// ═══════════════════════════════════════════════════════════════════
let _flashHandle = null;

async function selectFlashDrive() {
  if (!('showDirectoryPicker' in window)) {
    toast('استخدم Chrome لهذه الميزة','a');
    return;
  }
  try {
    _flashHandle = await window.showDirectoryPicker({ mode:'readwrite' });
    localStorage.setItem('_flash_name', _flashHandle.name);
    toast('✅ تم ربط المجلد: ' + _flashHandle.name, 'g');
    clearInterval(window._flashTimer);
    window._flashTimer = setInterval(function(){ backupToFlash(true); }, 6*60*60*1000);
    await backupToFlash(false);
  } catch(e) {
    if (e.name !== 'AbortError') toast('تعذر الوصول للمجلد: ' + e.message, 'r');
  }
}

async function backupToFlash(silent) {
  if (!_flashHandle) {
    if (!silent) toast('اختر مجلد الفلاشة أولاً من الإعدادات ← النسخ الاحتياطي','a');
    return;
  }
  try {
    const data     = JSON.stringify(DB, null, 2);
    const stamp    = new Date().toISOString().slice(0,16).replace('T','-').replace(/:/g,'-');
    const fileName = 'islam-backup-' + stamp + '.json';
    const fh       = await _flashHandle.getFileHandle(fileName, {create:true});
    const wr       = await fh.createWritable();
    await wr.write(data);
    await wr.close();
    if (!silent) toast('💾 تم الحفظ على الفلاشة: ' + fileName, 'g');
    log('نظام','حفظ تلقائي الفلاشة: ' + fileName);
  } catch(e) {
    if (!silent) toast('خطأ في حفظ الفلاشة: ' + e.message,'r');
  }
}

async function backupNow() {
  await PERSIST.save(DB);
  const label = 'يدوي — ' + new Date().toLocaleString('ar-EG');
  await PERSIST.createManualBackup(DB, label);
  const data = JSON.stringify(DB, null, 2);
  const name = 'islam-backup-' + new Date().toISOString().slice(0,10) + '.json';

  // Electron: native save dialog
  if(window.electronAPI){
    const r = await window.electronAPI.saveDialog(name, data);
    if(r.ok){ toast('💾 تم الحفظ: ' + r.path.split('\\').pop(),'g'); log('نظام','نسخة يدوية: '+r.path); }
    return;
  }

  // Try File System Access API
  if ('showSaveFilePicker' in window) {
    try {
      const h  = await window.showSaveFilePicker({suggestedName:name,types:[{description:'Backup',accept:{'application/json':['.json']}}]});
      const wr = await h.createWritable();
      await wr.write(data);
      await wr.close();
      toast('💾 تم الحفظ: ' + h.name,'g');
      return;
    } catch(e){ if(e.name==='AbortError') return; }
  }

  // Fallback download
  const blob = new Blob([data],{type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=name; a.click();
  URL.revokeObjectURL(url);
  toast('✅ تم تنزيل النسخة الاحتياطية','g');
  log('نظام','نسخة احتياطية يدوية');
}

function sendWhatsApp(phone, message) {
  if (!phone) { toast('لا يوجد رقم هاتف','r'); return; }
  const clean = phone.replace(/\D/g,'');
  const num   = clean.startsWith('0') ? '2'+clean : clean.startsWith('2') ? clean : '2'+clean;
  const url   = 'https://wa.me/' + num + '?text=' + encodeURIComponent(message);
  window.open(url,'_blank');
}

function sendInvoiceWhatsApp(invoiceId) {
  const inv  = DB.invoices.find(i=>i.id===invoiceId);
  if (!inv) return;
  const cust = DB.customers.find(c=>c.id===inv.customerId);
  if (!cust||!cust.phone) { toast('العميل ليس لديه رقم هاتف','r'); return; }
  const items = inv.items.map(function(it){ return '   • '+it.name+' × '+it.qty+' = '+fmt(it.qty*(it.price||it.sellPrice||0))+' ج'; }).join('\n');
  const msg = '🌟 *ميزان*\nفاتورة رقم: *'+inv.no+'*\nالتاريخ: '+new Date(inv.date||inv.created_at).toLocaleDateString('ar-EG')+'\n\nالأصناف:\n'+items+'\n\n💰 *الإجمالي: '+fmt(inv.total)+' ج*'+(inv.status==='partial'?'\n⚠️ المتبقي: '+fmt(Math.max(0,inv.total-(inv.paid||0)))+' ج':'')+'\n\nشكراً لثقتكم 🙏';
  sendWhatsApp(cust.phone, msg);
}

function sendDebtReminder(custId) {
  const cust = DB.customers.find(c=>c.id===custId);
  if (!cust) return;
  if (!cust.phone) { toast('العميل ليس لديه رقم هاتف','r'); return; }
  if (!(cust.debt>0)) { toast('لا يوجد دين لهذا العميل','a'); return; }
  const msg = '🔔 *ميزان*\nأخي الكريم '+cust.name+'\nنذكركم بالمبلغ المستحق:\n\n💸 *'+fmt(cust.debt)+' جنيه*\n\nنرجو التكرم بالسداد في أقرب وقت.\nشكراً 🙏';
  sendWhatsApp(cust.phone, msg);
}

//  FEATURE D: SALES BY STAFF REPORT (من باع كم)
// ═══════════════════════════════════════════════════════════════════
function showSalesStaffReport() {
  const doneInvs = DB.invoices.filter(function(i){ return i.status==='done'||i.status==='partial'; });
  const allStaff = [].concat(BUILTIN_ACCOUNTS, DB.staff||[]);

  // Group by cashier
  const byStaff = {};
  doneInvs.forEach(function(inv){
    const sid = inv.cashierId||'unknown';
    if(!byStaff[sid]) byStaff[sid]={id:sid,name:inv.cashierName||'غير محدد',emoji:inv.cashierEmoji||'👤',sales:0,count:0,items:0};
    byStaff[sid].sales += inv.total;
    byStaff[sid].count++;
    byStaff[sid].items += inv.items.reduce(function(s,i){return s+i.qty;},0);
  });

  // Fill names from staff list
  Object.values(byStaff).forEach(function(s){
    const found = allStaff.find(function(a){return a.id===s.id;});
    if(found){ s.name=found.name; s.emoji=found.emoji||'👤'; }
  });

  const sorted = Object.values(byStaff).sort(function(a,b){return b.sales-a.sales;});
  const max    = sorted.length>0 ? sorted[0].sales : 1;

  const rows = sorted.length===0
    ? '<tr><td colspan=4 style="text-align:center;color:var(--txt3);padding:20px">لا توجد مبيعات بعد</td></tr>'
    : sorted.map(function(s,i){
        const pct = Math.round((s.sales/max)*100);
        return '<tr>'
          +'<td style="padding:10px 8px"><span style="font-size:18px">'+s.emoji+'</span> <b>'+s.name+'</b>'
          +(i===0?'<span style="margin-right:6px;font-size:10px;background:var(--gold);color:#000;padding:2px 6px;border-radius:10px">🥇 الأول</span>':'')+'</td>'
          +'<td style="padding:10px 8px;font-weight:700;color:var(--gold)">'+fmt(s.sales)+' ج</td>'
          +'<td style="padding:10px 8px">'+s.count+' فاتورة</td>'
          +'<td style="padding:10px 8px;min-width:100px"><div style="background:var(--raised);border-radius:4px;height:8px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:linear-gradient(to left,var(--gold),var(--gold2));border-radius:4px"></div></div></td>'
          +'</tr>';
      }).join('');

  openModal('👤 تقرير البائعين','<div style="direction:rtl">'
    +'<div style="overflow-x:auto"><table style="width:100%;font-size:13px"><thead><tr>'
    +'<th style="padding:8px;text-align:right">البائع</th>'
    +'<th style="padding:8px;text-align:right">المبيعات</th>'

const LOYALTY_RATE = 10; // 1 point per 10 EGP spent

function addLoyaltyPoints(custId, amount) {
  const cust = DB.customers.find(function(c){return c.id===custId;});
  if (!cust) return;
  const pts = Math.floor(amount / LOYALTY_RATE);
  if (pts <= 0) return;
  cust.loyaltyPoints = (cust.loyaltyPoints||0) + pts;
  log('ولاء', 'إضافة '+pts+' نقطة للعميل '+cust.name);
}

function redeemLoyaltyPoints(custId, points) {
  const cust = DB.customers.find(function(c){return c.id===custId;});
  if (!cust || (cust.loyaltyPoints||0) < points) { toast('نقاط غير كافية','r'); return false; }
  cust.loyaltyPoints -= points;
  log('ولاء','استرداد '+points+' نقطة من '+cust.name);
  return true;
}

function checkRecurringExpenses() {
  if (!DB.recurringExpenses) DB.recurringExpenses = [];
  const now = new Date();
  let added = 0;
  DB.recurringExpenses.forEach(function(re){
    if (!re.active) return;
    const last = re.lastAdded ? new Date(re.lastAdded) : null;
    let shouldAdd = false;
    if (!last) { shouldAdd = true; }
    else if (re.period==='daily'   && (now-last)>=86400000) { shouldAdd=true; }
    else if (re.period==='weekly'  && (now-last)>=7*86400000) { shouldAdd=true; }
    else if (re.period==='monthly' && (now.getMonth()!==last.getMonth()||now.getFullYear()!==last.getFullYear())) { shouldAdd=true; }
    if (shouldAdd) {
      DB.expenses.push({id:genId(),type:re.type,amount:re.amount,note:'(تلقائي) '+re.note,date:now.toISOString(),created_at:now.toISOString()});
      re.lastAdded = now.toISOString();
      added++;
    }
  });
  if (added>0) { scheduleAutoSave(); toast('🔄 تم إضافة '+added+' مصروف متكرر تلقائياً','g'); }
}

function openAddRecurringExpense() {
  openModal('🔄 إضافة مصروف متكرر','<div style="direction:rtl;display:flex;flex-direction:column;gap:12px">'

    +'<div class="fg"><label class="flbl">التكرار</label><select class="finput" id="re-period"><option value="daily">يومي</option><option value="weekly">أسبوعي</option><option value="monthly" selected>شهري</option></select></div>'
    +'<div class="fg"><label class="flbl">ملاحظة</label><input class="finput" id="re-note" placeholder="وصف إضافي..."></div>'
    +'</div>',
    [{label:'إلغاء',cls:'btn-ghost',fn:'closeModalDirect()'},{label:'✅ إضافة',cls:'btn-gold',fn:'saveRecurringExpense()'}],false,true);

function saveRecurringExpense() {
  const type   = document.getElementById('re-type')&&document.getElementById('re-type').value;
  const amount = parseFloat(document.getElementById('re-amount')&&document.getElementById('re-amount').value||0);
  const period = document.getElementById('re-period')&&document.getElementById('re-period').value||'monthly';

function renderAttendance() {
  const c = document.getElementById('content');
  if (!DB.attendance) DB.attendance = [];
  const today = new Date().toDateString();
  const todayRecs = DB.attendance.filter(function(a){ return new Date(a.date).toDateString()===today; });
  const allStaff  = [].concat(BUILTIN_ACCOUNTS, DB.staff||[]).filter(function(s){ return s.active!==false; });

  const rows = allStaff.map(function(s){
    const rec    = todayRecs.find(function(a){ return a.staffId===s.id; });
    const isIn   = rec && rec.checkIn && !rec.checkOut;
    const isDone = rec && rec.checkOut;
    const workedMins = isDone ? Math.round((new Date(rec.checkOut)-new Date(rec.checkIn))/60000) : 0;
    const workedStr  = isDone ? Math.floor(workedMins/60)+'س '+( workedMins%60)+'د' : '—';
    return '<tr>'
      +'<td style="padding:10px 8px">'+(s.emoji||'👤')+' <b>'+s.name+'</b><br><span style="font-size:11px;color:var(--txt3)">'+s.username+'</span></td>'
      +'<td style="padding:10px 8px;color:var(--txt3)">'+(rec?new Date(rec.checkIn).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}):'—')+'</td>'
      +'<td style="padding:10px 8px;color:var(--txt3)">'+(isDone?new Date(rec.checkOut).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}):'—')+'</td>'
      +'<td style="padding:10px 8px;font-weight:700">'+workedStr+'</td>'
      +'<td style="padding:10px 8px">'
        +(isDone?'<span style="color:var(--green);font-weight:700">✅ منصرف</span>'
        :isIn?'<button class="btn btn-ghost btn-sm" onclick="staffCheckOut(\''+s.id+'\')">🚪 انصراف</button>'
        :'<button class="btn btn-gold btn-sm" onclick="staffCheckIn(\''+s.id+'\')">🟢 حضور</button>')
      +'</td>'
    +'</tr>';
  }).join('');

  c.innerHTML = '<div class="pg">'
    +'<div class="card mb2"><div class="card-head"><span>⏰</span><span class="card-title">سجل الحضور اليومي — '+new Date().toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+'</span><button class="btn btn-ghost btn-sm" onclick="showAttendanceHistory()">📋 السجل</button><button class="btn btn-ghost btn-sm" onclick="showSalaries()">💰 الرواتب</button></div>'
    +'<table><thead><tr><th>الموظف</th><th>وقت الحضور</th><th>وقت الانصراف</th><th>ساعات العمل</th><th>الإجراء</th></tr></thead><tbody>'+rows+'</tbody></table>'
    +'</div></div>';
}

function staffCheckIn(staffId) {
  if (!DB.attendance) DB.attendance=[];
  const today = new Date().toDateString();
  const exists = DB.attendance.find(function(a){ return a.staffId===staffId && new Date(a.date).toDateString()===today; });
  if (exists) { toast('تم تسجيل الحضور بالفعل','a'); return; }
  DB.attendance.push({id:genId(),staffId,date:new Date().toISOString(),checkIn:new Date().toISOString(),checkOut:null});
  scheduleAutoSave();
  toast('✅ تم تسجيل الحضور','g');
  renderAttendance();
}

function staffCheckOut(staffId) {
  const today = new Date().toDateString();
  const rec   = DB.attendance&&DB.attendance.find(function(a){ return a.staffId===staffId && new Date(a.date).toDateString()===today && !a.checkOut; });
  if (!rec) { toast('لم يتم تسجيل الحضور','r'); return; }
  rec.checkOut = new Date().toISOString();
  scheduleAutoSave();
  toast('✅ تم تسجيل الانصراف','g');
  renderAttendance();
}

function printBarcode(productId, qty) {
  const p = DB.products.find(x=>x.id===productId);
  if (!p) { toast('منتج غير موجود','r'); return; }
  if (!p.barcode) { toast('لا يوجد باركود — أضف باركود للمنتج أولاً','a'); return; }
  const count = parseInt(qty)||1;
  const b = typeof getBranding==='function'?getBranding():{shopName:'ميزان',logoEmoji:'⚖️'};

  // Auto-detect barcode format
  const bc = p.barcode.trim();
  let format = 'auto';
  if(/^\d{13}$/.test(bc)) format='EAN13';
  else if(/^\d{8}$/.test(bc)) format='EAN8';
  else if(/^\d{12}$/.test(bc)) format='UPC';
  else if(/^[A-Z0-9\-\.\ \$\/\+\%]{1,43}$/.test(bc)) format='CODE39';
  else format='CODE128';

  const labels = Array.from({length:count}).map(()=>`
    <div class="lbl">
      <div class="shop">${b.logoEmoji} ${b.shopName}</div>
      <div class="pname">${p.name}</div>
      <svg class="bc"></svg>
      <div class="sku">رقم الصنف: <b>${p.sku||'—'}</b></div>
      <div class="price">${fmt(p.sellPrice||0)} ج</div>
    </div>`).join('');

  const win = window.open('','_blank','width=500,height=500');
  win.document.write(`<!DOCTYPE html><html dir="rtl" lang="ar"><head>
  <meta charset="UTF-8">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/JsBarcode/3.11.5/JsBarcode.all.min.js"><\/script>
  <style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;padding:10px;background:#f0f0f0}
  .grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-start}
  .lbl{width:58mm;background:#fff;border:1px solid #ccc;border-radius:5px;padding:6px 8px;text-align:center;break-inside:avoid;page-break-inside:avoid}
  .shop{font-size:8px;color:#999;margin-bottom:2px}
  .pname{font-size:11px;font-weight:700;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
  .bc{max-width:100%;height:auto;margin:2px 0}
  .sku{font-size:10px;background:#fff9e6;border:1px dashed #c8a84b;border-radius:3px;padding:2px 6px;margin:3px 0;color:#b8960a;display:inline-block}
  .price{font-size:14px;font-weight:800;color:#b8960a;margin-top:2px}
  .no-print{text-align:center;padding:12px;background:#fff;border-radius:8px;margin-bottom:12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  @media print{.no-print{display:none}body{background:#fff;padding:4px}.grid{gap:4px}}
  </style></head><body>
  <div class="no-print">
    <button onclick="window.print()" style="padding:8px 20px;background:#c8a84b;color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:700">🖨️ طباعة</button>
    <button onclick="window.close()" style="padding:8px 16px;background:#eee;border:none;border-radius:8px;cursor:pointer">إغلاق</button>
    <span style="font-size:12px;color:#666;align-self:center">نوع الباركود: ${format}</span>
  </div>
  <div class="grid">${labels}</div>
  <script>
  window.onload = function() {
    document.querySelectorAll('.bc').forEach(function(el){
      try {
        JsBarcode(el, '${bc}', {
          format: '${format}',
          width: 1.5, height: 40,
          displayValue: true, fontSize: 10,
          margin: 2, background: '#fff', lineColor: '#000'
        });
      } catch(e) {
        // Fallback to CODE128
        try { JsBarcode(el,'${bc}',{format:'CODE128',width:1.5,height:40,displayValue:true,fontSize:10,margin:2}); }
        catch(e2) { el.outerHTML='<div style="font-size:10px;color:red">خطأ في الباركود</div>'; }
      }
    });
    window.print();
  };
  <\/script></body></html>`);
  win.document.close();
}

function pickProductImage(inputId, previewId) {
  const input = document.createElement('input');
  input.type  = 'file';
  input.accept= 'image/*';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 2*1024*1024) { toast('الصورة كبيرة جداً — الحد 2MB','r'); return; }
    const reader = new FileReader();
    reader.onload = function(ev) {
      const data = ev.target.result;
      // Compress/resize via canvas
      const img  = new Image();
      img.onload = function() {
        const MAX = 400;
        const ratio = Math.min(MAX/img.width, MAX/img.height, 1);
        const canvas= document.createElement('canvas');
        canvas.width = img.width*ratio;
        canvas.height= img.height*ratio;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        const compressed = canvas.toDataURL('image/jpeg',0.75);
        const inp = document.getElementById(inputId);
        if (inp) inp.value = compressed;
        const prev= document.getElementById(previewId);
        if (prev) prev.innerHTML = '<img src="'+compressed+'" style="width:100%;height:100%;object-fit:cover">';
      };
      img.src = data;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function captureProductImage(inputId, previewId) {
  if (!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia) {
    toast('الكاميرا غير متاحة في هذا المتصفح','r'); return;
  }
  window._siId = inputId; window._siPv = previewId;
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px';
  modal.innerHTML = '<video id="_cam" autoplay playsinline style="max-width:90vw;max-height:60vh;border-radius:12px;border:2px solid var(--gold)"></video>'
    +'<div style="display:flex;gap:12px">'
    +'<button onclick="_snapPhoto(window._siId,window._siPv)" style="padding:12px 28px;border-radius:10px;border:none;background:var(--gold);color:#000;font-size:16px;font-weight:700;cursor:pointer">📷 التقاط</button>'
    +'<button onclick="_stopCamera()" style="padding:12px 28px;border-radius:10px;border:1px solid #555;background:transparent;color:#fff;font-size:14px;cursor:pointer">إلغاء</button>'
    +'</div>';
  document.body.appendChild(modal);
  window._camModal = modal;
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(function(stream){
    window._camStream = stream;
    document.getElementById('_cam').srcObject = stream;
  }).catch(function(e){ toast('تعذر فتح الكاميرا: '+e.message,'r'); _stopCamera(); });
}

function _snapPhoto(inputId, previewId) {
  const vid = document.getElementById('_cam');
  if (!vid) return;
  const canvas = document.createElement('canvas');
  const MAX = 400;
  const ratio = Math.min(MAX/vid.videoWidth, MAX/vid.videoHeight, 1);
  canvas.width = vid.videoWidth*ratio;
  canvas.height= vid.videoHeight*ratio;
  canvas.getContext('2d').drawImage(vid,0,0,canvas.width,canvas.height);
  const data = canvas.toDataURL('image/jpeg',0.75);
  const inp  = document.getElementById(inputId);
  if (inp) inp.value = data;
  const prev = document.getElementById(previewId);
  if (prev) prev.innerHTML = '<img src="'+data+'" style="width:100%;height:100%;object-fit:cover">';
  _stopCamera();
}

function _stopCamera() {
  if (window._camStream) { window._camStream.getTracks().forEach(function(t){t.stop();}); window._camStream=null; }
  if (window._camModal)  { window._camModal.remove(); window._camModal=null; }
}

function viewProductImage(productId) {
  const p = DB.products.find(function(x){return x.id===productId;});
  if (!p||!p.imgData) return;
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer';
  overlay.onclick = function(){ overlay.remove(); };
  overlay.innerHTML = '<img src="'+p.imgData+'" style="max-width:90vw;max-height:80vh;border-radius:12px;object-fit:contain">'
    +'<div style="color:#fff;margin-top:12px;font-size:16px;font-weight:700">'+(p.emoji||'')+'  '+p.name+'</div>'

function setAdjustMode(mode) {
  var setBtn  = document.getElementById('adj-mode-set');
  var diffBtn = document.getElementById('adj-mode-diff');
  var setDiv  = document.getElementById('adj-set-section');
  var diffDiv = document.getElementById('adj-diff-section');
  if(mode==='set'){
    if(setBtn)  setBtn.className='btn btn-gold';
    if(diffBtn) diffBtn.className='btn btn-ghost';
    if(setDiv)  setDiv.style.display='block';
    if(diffDiv) diffDiv.style.display='none';
  } else {
    if(setBtn)  setBtn.className='btn btn-ghost';
    if(diffBtn) diffBtn.className='btn btn-gold';
    if(setDiv)  setDiv.style.display='none';
    if(diffDiv) diffDiv.style.display='block';
    updateDeltaDisplay();
  }
}

function updateSetDisplay(currentStock) {
  var inp = document.getElementById('adj-new-qty');
  var disp= document.getElementById('adj-diff-display');
  if(!inp||!disp) return;
  var newQty = parseFloat(inp.value)||0;
  var diff   = newQty - currentStock;
  if(Math.abs(diff)<0.001){ disp.style.display='none'; return; }
  disp.style.display='block';
  disp.innerHTML = diff>0
    ? '<span style="color:var(--green);font-weight:700">↑ سيُضاف '+fmt(Math.abs(diff))+' للمخزون</span>'
    : '<span style="color:var(--red);font-weight:700">↓ سيُخصم '+fmt(Math.abs(diff))+' من المخزون</span>';
}

function updateDeltaDisplay() {
  var inp  = document.getElementById('adj-delta');
  var disp = document.getElementById('adj-result-display');
  if(!inp||!disp) return;
  var delta  = parseFloat(inp.value)||0;
  var cur    = window._adjCurrentStock||0;
  var result = Math.max(0, cur+delta);
  disp.innerHTML = 'الرصيد الحالي: <b>'+fmt(cur)+'</b>'
    +' → بعد التعديل: <b style="color:'+(delta>=0?'var(--green)':'var(--red)')+'">'+fmt(result)+'</b>';
}

function quickAdj(n) {
  var inp = document.getElementById('adj-delta');
  if(!inp) return;
  inp.value = (parseFloat(inp.value)||0)+n;
  updateDeltaDisplay();
}

function confirmStockAdjust(productId) {
  const p = DB.products.find(function(x){ return x.id===productId; });
  if(!p) return;

  const setDiv  = document.getElementById('adj-set-section');
  const isSet   = setDiv && setDiv.style.display!=='none';
  const reason  = (document.getElementById('adj-reason')&&document.getElementById('adj-reason').value)||'جرد';
  const note    = (document.getElementById('adj-note')&&document.getElementById('adj-note').value)||'';
  const oldStock= p.stock||0;
  var   newStock;

  if(isSet){
    newStock = parseFloat(document.getElementById('adj-new-qty')&&document.getElementById('adj-new-qty').value)||0;
  } else {
    const delta = parseFloat(document.getElementById('adj-delta')&&document.getElementById('adj-delta').value)||0;
    newStock = Math.max(0, oldStock+delta);
  }

  const diff = newStock - oldStock;
  p.stock    = newStock;

  // Record in adjustment log
  if(!DB.stockAdjustments) DB.stockAdjustments=[];
  DB.stockAdjustments.push({
    id:genId(), productId, productName:p.name,
    oldStock, newStock, diff,
    reason, note, date:new Date().toISOString(),
    user: currentUser&&currentUser.name||'نظام'
  });

  log('جرد', p.name+': '+fmt(oldStock)+' → '+fmt(newStock)+' ('+reason+')');
  scheduleAutoSave();
  setTimeout(function(){BKUP.afterOperation('ضبط-مخزون');},200);
  closeModalDirect();
  toast('✅ تم ضبط رصيد '+p.name+': '+fmt(newStock), 'g');
  renderInventory();
}

  if(Math.abs(diff)<0.001){
    disp.innerHTML='—'; disp.style.color='';
    if(row) row.style.background='';
  } else if(diff>0){
    disp.innerHTML='<b>+'+fmt(diff)+'</b>'; disp.style.color='var(--green)';
    if(row) row.style.background='rgba(31,203,122,.05)';
  } else {
    disp.innerHTML='<b>'+fmt(diff)+'</b>'; disp.style.color='var(--red)';
    if(row) row.style.background='rgba(240,82,82,.05)';
  }
}

//  🌐 SUPABASE ONLINE SYNC — اختياري
//  أدخل بيانات Supabase في الإعدادات لتفعيل المزامنة الأونلاين
// ═══════════════════════════════════════════════════════════════════════════

const CLOUD = (function() {
  const CFG_KEY = '_isl_cloud_cfg';

  function getCfg() {
    try { return JSON.parse(localStorage.getItem(CFG_KEY)||'{}'); } catch(e){ return {}; }
  }
  function saveCfg(cfg) {
    try { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); } catch(e){}
  }
  function isEnabled() {
    const cfg = getCfg();
    return !!(cfg.url && cfg.key && cfg.enabled);
  }

  async function req(method, table, body, params) {
    const cfg = getCfg();
    if(!cfg.url||!cfg.key) throw new Error('Supabase غير مضبوط');
    let url = cfg.url.replace(/\/$/,'') + '/rest/v1/' + table;
    if(params) url += '?' + new URLSearchParams(params);
    const res = await fetch(url, {
      method, headers: {
        'apikey': cfg.key,
        'Authorization': 'Bearer ' + cfg.key,
        'Content-Type': 'application/json',
        'Prefer': method==='POST' ? 'return=minimal' : 'return=representation'
      },
      body: body ? JSON.stringify(body) : undefined
    });
    if(!res.ok) throw new Error(await res.text());
    return method==='GET' ? res.json() : res;
  }

  // ── Upload full backup ──
  async function uploadBackup() {
    const data    = JSON.stringify(DB);
    const sizeKB  = Math.round(data.length/1024);
    await req('POST','isl_backups',{
      shop_id: getCfg().shopId||'default',
      data,
      size_kb: sizeKB,
      created_at: new Date().toISOString()
    });
    return sizeKB;
  }

  // ── Sync daily sales summary ──
  async function syncSales() {
    const today   = new Date().toISOString().slice(0,10);
    const todayInvs= DB.invoices.filter(function(i){ return (i.date||i.created_at||'').slice(0,10)===today && i.status!=='returned'; });
    const revenue = todayInvs.reduce(function(s,i){ return s+i.total; },0);
    const cost    = todayInvs.reduce(function(s,i){ return s+i.items.reduce(function(ss,it){ return ss+(it.buyPrice||0)*it.qty; },0); },0);
    const payload = {
      shop_id: getCfg().shopId||'default',
      date: today,
      revenue, cost,
      profit: revenue-cost,
      invoice_count: todayInvs.length,
      cashier_count: [...new Set(todayInvs.map(function(i){ return i.cashierId; }))].length,
      top_products: JSON.stringify(getTopProducts(todayInvs,5)),
      updated_at: new Date().toISOString()
    };
    // Upsert
    await req('POST','isl_sales',payload,{on_conflict:'shop_id,date'});
    return payload;
  }

  // ── Sync low stock alerts ──
  async function syncLowStock() {
    const low = DB.products.filter(function(p){ return (p.minStock||0)>0 && (p.stock||0)<=p.minStock; });
    if(!low.length) return 0;
    await req('POST','isl_alerts',{
      shop_id: getCfg().shopId||'default',
      type: 'low_stock',
      count: low.length,
      items: JSON.stringify(low.map(function(p){ return {name:p.name,stock:p.stock,minStock:p.minStock}; })),
      created_at: new Date().toISOString()
    });
    return low.length;
  }

  // ── Get top products helper ──
  function getTopProducts(invs, n) {
    const counts = {};
    invs.forEach(function(inv){
      inv.items.forEach(function(it){
        counts[it.name] = (counts[it.name]||0) + it.qty*(it.price||it.sellPrice||0);
      });
    });
    return Object.entries(counts).sort(function(a,b){ return b[1]-a[1]; }).slice(0,n)
      .map(function(x){ return {name:x[0],total:x[1]}; });
  }

  // ── Full sync (runs on schedule) ──
  async function syncAll(silent) {
    if(!isEnabled()) return;
    try {
      const [s] = await Promise.all([syncSales(), syncLowStock()]);
      localStorage.setItem('_isl_last_sync', new Date().toISOString());
      if(!silent) toast('☁️ تمت المزامنة الأونلاين','g');
      return true;
    } catch(e) {
      if(!silent) toast('⚠️ فشلت المزامنة: ' + e.message, 'r');
      return false;
    }
  }

  // ── Start auto-sync every 30 min ──
  function startAutoSync() {
    clearInterval(window._cloudTimer);
    if(!isEnabled()) return;
    syncAll(true);
    window._cloudTimer = setInterval(function(){ syncAll(true); }, 30*60*1000);
  }

  return { getCfg, saveCfg, isEnabled, uploadBackup, syncSales, syncLowStock, syncAll, startAutoSync, req };
})();

//  🔒 AES-256 ENCRYPTION — تشفير ملفات النسخ الاحتياطي
// ═══════════════════════════════════════════════════════════════════════════
const SEC = (function() {

  async function deriveKey(password, saltBuf) {
    const enc = new TextEncoder();
    const keyMat = await crypto.subtle.importKey('raw', enc.encode(password), {name:'PBKDF2'}, false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:saltBuf, iterations:100000, hash:'SHA-256'},
      keyMat, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']
    );
  }

  function buf2hex(buf) { return [...new Uint8Array(buf)].map(function(b){ return b.toString(16).padStart(2,'0'); }).join(''); }
  function hex2buf(hex) { return new Uint8Array(hex.match(/../g).map(function(h){ return parseInt(h,16); })).buffer; }

  async function encryptBackup(jsonStr, password) {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv   = crypto.getRandomValues(new Uint8Array(12));
    const key  = await deriveKey(password, salt);
    const enc  = new TextEncoder();
    const ct   = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, enc.encode(jsonStr));
    return JSON.stringify({
      v: 1, alg: 'AES-GCM-256',
      salt: buf2hex(salt),
      iv:   buf2hex(iv),
      ct:   buf2hex(ct),
      app:  'ميزان'
    });
  }

  async function decryptBackup(encStr, password) {
    const obj = JSON.parse(encStr);
    if(!obj.ct) return encStr; // not encrypted
    const key = await deriveKey(password, hex2buf(obj.salt));
    const pt  = await crypto.subtle.decrypt({name:'AES-GCM', iv:hex2buf(obj.iv)}, key, hex2buf(obj.ct));
    return new TextDecoder().decode(pt);
  }

  async function encryptedBackup() {
    const pwd = prompt('🔒 أدخل كلمة مرور التشفير للنسخة الاحتياطية\n(احتفظ بها — بدونها لا يمكن الاستعادة)');
    if(!pwd) return;
    const pwd2 = prompt('🔒 أكد كلمة المرور');
    if(pwd!==pwd2) { toast('كلمتا المرور غير متطابقتين','r'); return; }

    const btn = document.getElementById('enc-bck-btn');
    if(btn) { btn.textContent='جاري التشفير...'; btn.disabled=true; }
    try {
      const json = JSON.stringify(DB, null, 2);
      const encrypted = await encryptBackup(json, pwd);
      const blob = new Blob([encrypted], {type:'application/json'});
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url;
      a.download = 'islam-ENCRYPTED-' + new Date().toISOString().slice(0,10) + '.enc.json';
      a.click();
      URL.revokeObjectURL(url);
      toast('🔒 تم تنزيل نسخة مشفرة بـ AES-256','g');
    } catch(e) {
      toast('خطأ في التشفير: ' + e.message, 'r');
    } finally {
      if(btn) { btn.textContent='🔒 نسخة مشفرة'; btn.disabled=false; }
    }
  }

  async function restoreEncrypted() {
    // Electron: use native dialog
    if(window.electronAPI){
      const r = await window.electronAPI.openDialog();
      if(!r.ok) return;
      const text = r.data;
      try{
        const obj = JSON.parse(text);
        let json;
        if(obj.ct){
          const pwd = prompt('🔓 أدخل كلمة مرور التشفير لفك الحماية');
          if(!pwd) return;
          try { json = await decryptBackup(text, pwd); }
          catch(e) { toast('❌ كلمة المرور غير صحيحة أو الملف تالف','r'); return; }
        } else { json = text; }
        const restored = JSON.parse(json);
        if(!restored.products) { toast('ملف غير صالح','r'); return; }
        if(!confirm('⚠️ سيتم استبدال كل البيانات الحالية — هل أنت متأكد؟')) return;
        Object.assign(DB, restored);
        scheduleAutoSave();
        toast('✅ تم استعادة النسخة الاحتياطية','g');
        log('نظام','استعادة نسخة احتياطية');
        go(currentPage||'dash');
      }catch(e2){ toast('خطأ في قراءة الملف: '+e2.message,'r'); }
      return;
    }
    const input = document.createElement('input');
    input.type='file'; input.accept='.json,.enc.json';
    input.onchange = async function(e) {
      const file = e.target.files[0];
      if(!file) return;
      const text = await file.text();
      let json;
      try {
        const obj = JSON.parse(text);
        if(obj.ct) {
          // Encrypted
          const pwd = prompt('🔓 أدخل كلمة مرور التشفير لفك الحماية');
          if(!pwd) return;
          try { json = await decryptBackup(text, pwd); }
          catch(e) { toast('❌ كلمة المرور غير صحيحة أو الملف تالف','r'); return; }
        } else {
          json = text; // Plain JSON
        }
        const restored = JSON.parse(json);
        if(!restored.products) { toast('ملف غير صالح','r'); return; }
        if(!confirm('⚠️ سيتم استبدال كل البيانات الحالية — هل أنت متأكد؟')) return;
        Object.assign(DB, restored);
        scheduleAutoSave();
        toast('✅ تم استعادة النسخة الاحتياطية','g');
        log('نظام','استعادة نسخة احتياطية مشفرة');
        go(currentPage||'dash');
      } catch(e2) { toast('خطأ في قراءة الملف: ' + e2.message,'r'); }
    };
    input.click();
  }

  return { encryptedBackup, restoreEncrypted, encryptBackup, decryptBackup };
})();

// ═══════════════════════════════════════════════════════════════════════════
//  🔐 ACCOUNT-BASED ENCRYPTED CLOUD SYSTEM
//  كل حساب له مفتاح تشفير خاص = هاتف + كلمة مرور
//  لا أحد يستطيع قراءة بيانات حساب آخر حتى لو وصل لـ Supabase
// ═══════════════════════════════════════════════════════════════════════════

const ACCSEC = (function() {

  // ── Hash a phone number → safe Supabase shop_id ──
  async function hashPhone(phone) {
    const clean = phone.replace(/\D/g,'');
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('isl:'+clean));
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,32);
  }

  // ── Derive AES-256 key from phone + password ──
  async function deriveKey(phone, password) {
    const clean = phone.replace(/\D/g,'');
    const salt  = new TextEncoder().encode('islamlib:' + clean + ':v1');
    const keyMat= await crypto.subtle.importKey('raw', new TextEncoder().encode(password), {name:'PBKDF2'}, false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      {name:'PBKDF2', salt, iterations:150000, hash:'SHA-256'},
      keyMat, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']
    );
  }

  function buf2b64(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))); }
  function b642buf(b64) { return Uint8Array.from(atob(b64), c=>c.charCodeAt(0)).buffer; }

  // ── Encrypt any JSON string with phone+password ──
  async function encryptForAccount(jsonStr, phone, password) {
    const key = await deriveKey(phone, password);
    const iv  = crypto.getRandomValues(new Uint8Array(12));
    const ct  = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, new TextEncoder().encode(jsonStr));
    return JSON.stringify({ v:2, alg:'AES-GCM-256-PHONE', iv:buf2b64(iv), ct:buf2b64(ct) });
  }

  // ── Decrypt with phone+password ──
  async function decryptForAccount(encStr, phone, password) {
    const obj = JSON.parse(encStr);
    if (!obj.ct) return encStr;
    const key = await deriveKey(phone, password);
    const pt  = await crypto.subtle.decrypt({name:'AES-GCM', iv:b642buf(obj.iv)}, key, b642buf(obj.ct));
    return new TextDecoder().decode(pt);
  }

  // ── Upload account's encrypted snapshot to Supabase ──
  async function uploadAccountData(acc) {
    if (!acc.phone) throw new Error('الحساب ليس لديه رقم هاتف');
    const cfg = CLOUD.getCfg();
    if (!cfg.url || !cfg.key) throw new Error('الكلاود غير مضبوط');

    const shopId = await hashPhone(acc.phone);

    // Build account-specific payload (sales + stock only, no passwords)
    const payload = {
      invoices:  DB.invoices,
      products:  DB.products.map(function(p){ return {id:p.id,name:p.name,stock:p.stock,minStock:p.minStock,sellPrice:p.sellPrice,buyPrice:p.buyPrice,emoji:p.emoji,barcode:p.barcode,category:p.category,unit:p.unit}; }),
      customers: DB.customers.map(function(c){ return {id:c.id,name:c.name,debt:c.debt,loyaltyPoints:c.loyaltyPoints}; }),
      expenses:  DB.expenses,
      suppliers: DB.suppliers.map(function(s){ return {id:s.id,name:s.name,balance:s.balance}; }),
      exported_at: new Date().toISOString(),
      account_name: acc.name,
      account_role: acc.role,
    };

    const encrypted = await encryptForAccount(JSON.stringify(payload), acc.phone, acc.password || '');

    const url = cfg.url.replace(/\/$/,'') + '/rest/v1/isl_accounts';
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'apikey': cfg.key, 'Authorization': 'Bearer ' + cfg.key,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({
        shop_id: shopId,
        phone_hash: shopId,
        account_name: acc.name,
        account_role: acc.role,
        data_enc: encrypted,
        updated_at: new Date().toISOString()
      })
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }
    return shopId;
  }

  // ── Upload for all accounts that have phones ──
  async function uploadAllAccounts() {
    const all = [...BUILTIN_ACCOUNTS, ...(DB.staff||[])].filter(function(a){ return a.phone && a.active!==false; });
    if (!all.length) {
      toast('أضف رقم هاتف لحساب واحد على الأقل من الموظفين','a');
      return 0;
    }
    let ok = 0;
    for (const acc of all) {
      try {
        await uploadAccountData(acc);
        ok++;
      } catch(e) {
        console.warn('Upload failed for', acc.name, e.message);
      }
    }
    return ok;
  }

  // ── UI: Show Account Online Portal ──
  function openAccountPortal() {
    const all = [...BUILTIN_ACCOUNTS, ...(DB.staff||[])].filter(function(a){ return a.active!==false; });
    const rows = all.map(function(a){
      const hasPhone = !!a.phone;
      const isBuiltin = a.id && a.id.startsWith('sys-');
      return '<tr>'
        +'<td style="padding:10px 8px"><b>'+(a.emoji||'👤')+' '+a.name+'</b><div style="font-size:11px;color:var(--txt3)">@'+a.username+'</div></td>'
        +'<td style="padding:10px 8px">'
          +'<input type="tel" id="phone-'+a.id+'" value="'+(a.phone||'')+'" placeholder="01xxxxxxxxx" '
          +(isBuiltin?'':'')
          +' style="width:140px;background:var(--raised);border:1px solid '+(hasPhone?'rgba(200,168,75,.4)':'var(--border2)')+';border-radius:8px;padding:6px 10px;color:var(--txt);font-family:inherit;font-size:13px">'
        +'</td>'
        +'<td style="padding:10px 8px">'
          +(hasPhone
            ?'<span style="color:var(--green);font-size:13px;font-weight:700">✅ مفعّل</span>'
            :'<span style="color:var(--txt3);font-size:12px">⚫ غير مفعّل</span>')
        +'</td>'
        +'<td style="padding:10px 8px">'
          +'<button class="btn btn-ghost btn-sm" onclick="saveAccountPhone(\''+a.id+'\',\''+( a.id.startsWith('sys-')?'builtin':'staff')+'\')">💾 حفظ</button>'
        +'</td>'
      +'</tr>';
    }).join('');

    const cfg = CLOUD.getCfg();
    const cloudReady = cfg.url && cfg.key;

    openModal('📱 بوابة الوصول الأونلاين','<div style="direction:rtl">'
      +'<div style="background:'+(cloudReady?'rgba(31,203,122,.06)':'rgba(200,168,75,.06)')+';border:1px solid '+(cloudReady?'rgba(31,203,122,.2)':'rgba(200,168,75,.2)')+';border-radius:12px;padding:14px;margin-bottom:16px">'
      +(cloudReady
        ?'<div style="font-weight:700;color:var(--green);margin-bottom:6px">☁️ الكلاود متصل ✅</div><div style="font-size:12px;color:var(--txt3)">كل حساب له رقم هاتف سيُشفَّر بيانته بـ (هاتفه + كلمة مروره) — لا يمكن لأحد آخر قراءتها</div>'
        :'<div style="font-weight:700;color:var(--amber);margin-bottom:6px">⚠️ الكلاود غير مضبوط</div><div style="font-size:12px;color:var(--txt3)">اضبط إعدادات Supabase أولاً من الإعدادات ← ☁️ الداشبورد الأونلاين</div><button class="btn btn-gold btn-sm" onclick="closeModalDirect();openCloudSettings()" style="margin-top:8px">⚙️ إعداد الكلاود</button>')
      +'</div>'
      +'<div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px">📋 الحسابات وأرقام الهواتف:</div>'
      +'<div style="max-height:280px;overflow-y:auto"><table style="width:100%;font-size:13px"><thead><tr>'
      +'<th style="padding:8px;text-align:right">الحساب</th>'
      +'<th style="padding:8px">رقم الهاتف</th>'
      +'<th style="padding:8px">الحالة</th>'
      +'<th style="padding:8px">حفظ</th>'
      +'</tr></thead><tbody>'+rows+'</tbody></table></div>'
      +'<div style="margin-top:14px;padding:12px;background:var(--raised);border-radius:10px;font-size:12px;color:var(--txt3)">'
      +'🔒 <b>كيف يعمل التشفير:</b><br>'
      +'• كل شخص يدخل الداشبورد بـ <b>رقم هاتفه + كلمة مروره فقط</b><br>'
      +'• البيانات مشفرة بـ <b>AES-256</b> — حتى Supabase لا يرى المحتوى<br>'
      +'• لو نسي كلمة مروره لا يمكن فك التشفير<br>'
      +'• كل حساب يرى بياناته فقط — لا يرى حسابات الآخرين'
      +'</div>'
      +(cloudReady?'<button class="btn btn-gold" onclick="uploadAllAccountsNow()" style="width:100%;margin-top:12px">☁️ رفع بيانات كل الحسابات الآن</button>':'')
      +'</div>',
      [{label:'إغلاق',cls:'btn-gold',fn:'closeModalDirect()'}], true, true);
  }

  async function uploadAllAccountsNow() {
    toast('⏳ جاري الرفع...','a');
    const n = await uploadAllAccounts();
    if (n > 0) toast('✅ تم رفع بيانات '+n+' حساب بنجاح','g');
    else toast('لا توجد حسابات مفعّل لها رقم هاتف','r');
  }

  return { hashPhone, deriveKey, encryptForAccount, decryptForAccount, uploadAccountData, uploadAllAccounts, openAccountPortal, uploadAllAccountsNow };
})();

// ── Save phone for builtin or staff account ──
function saveAccountPhone(accId, type) {
  const inp = document.getElementById('phone-'+accId);
  if (!inp) return;
  const phone = inp.value.trim();
  if (phone && !/^0[1-9]\d{9}$/.test(phone) && !/^\+?\d{8,15}$/.test(phone)) {
    toast('رقم الهاتف غير صحيح','r'); return;
  }
  if (type === 'builtin') {
    const acc = BUILTIN_ACCOUNTS.find(function(a){ return a.id===accId; });
    if (!acc) { toast('حساب غير موجود','r'); return; }
    acc.phone = phone;
    // Save builtins back
    try { localStorage.setItem('islam_builtin_v1', JSON.stringify(BUILTIN_ACCOUNTS)); } catch(e){}
  } else {
    const acc = DB.staff.find(function(a){ return a.id===accId; });
    if (!acc) { toast('حساب غير موجود','r'); return; }
    acc.phone = phone;
    scheduleAutoSave();
  }
  inp.style.borderColor = phone ? 'rgba(200,168,75,.6)' : 'var(--border2)';
  toast('✅ تم حفظ رقم هاتف '+(phone?phone:'(محذوف)'), 'g');
}

//  ☁️ MANUAL CLOUD SYNC — رفع يدوي في أي وقت
// ═══════════════════════════════════════════════════════════════
async function manualCloudSync() {
  const btn   = document.getElementById('cloud-sync-btn');
  const ic    = document.getElementById('cloud-sync-ic');
  const lbl   = document.getElementById('cloud-sync-lbl');

  // If cloud not configured → open settings
  if (!CLOUD.isEnabled()) {
    if (confirm('☁️ الكلاود غير مفعّل بعد\nهل تريد ضبط إعدادات Supabase الآن؟')) {
      openCloudSettings();
    }
    return;
  }

  // Animate button
  btn.disabled = true;
  ic.textContent  = '⏳';
  lbl.textContent = 'جاري الرفع...';
  btn.style.borderColor = 'var(--gold)';
  btn.style.color = 'var(--gold)';

  try {
    // 1. Sync sales summary
    await CLOUD.syncSales();

    // 2. Sync low stock alerts
    await CLOUD.syncLowStock();

    // 3. Upload per-account encrypted data
    const n = await ACCSEC.uploadAllAccounts();

    const now = new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
    localStorage.setItem('_isl_last_sync', new Date().toISOString());

    // Success state
    ic.textContent  = '✅';
    lbl.textContent = 'رُفع ' + now;
    btn.style.borderColor = 'rgba(31,203,122,.5)';
    btn.style.color = 'var(--green)';

    toast('☁️ تم رفع البيانات أونلاين بنجاح' + (n > 0 ? ' · ' + n + ' حساب مشفر' : ''), 'g');
    log('نظام', 'رفع يدوي للبيانات أونلاين');

    // Reset after 4 seconds
    setTimeout(function() {
      ic.textContent  = '☁️';
      lbl.textContent = 'رفع';
      btn.style.borderColor = 'var(--border2)';
      btn.style.color = 'var(--txt3)';
      btn.disabled = false;
    }, 4000);

  } catch(e) {
    ic.textContent  = '❌';
    lbl.textContent = 'فشل';
    btn.style.borderColor = 'rgba(240,82,82,.5)';
    btn.style.color = 'var(--red)';
    toast('فشل الرفع: ' + e.message, 'r');
    setTimeout(function() {
      ic.textContent  = '☁️';
      lbl.textContent = 'رفع';
      btn.style.borderColor = 'var(--border2)';
      btn.style.color = 'var(--txt3)';
      btn.disabled = false;
    }, 3000);
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  💾 TRIPLE BACKUP SYSTEM
//  - نسخة الهارد: تلقائية على مجلد ثابت كل عملية + كل 5 دقائق
//  - نسخة الفلاشة: فورية بعد كل عملية بيع/شراء/مصروف/تعديل
//  - نسخة يدوية: زر في الإعدادات
// ═══════════════════════════════════════════════════════════════════════

const BKUP = (function(){
  let _hardHandle  = null;   // FileSystemDirectoryHandle للهارد
  let _flashHandle2 = null;  // FileSystemDirectoryHandle للفلاشة (مستقل عن القديم)
  let _hardPath    = '';     // اسم المجلد للعرض
  let _flashPath2  = '';
  let _hardTimer   = null;
  let _opCounter   = 0;      // عداد العمليات منذ آخر نسخة

  const HK  = '_bkup_hard_v1';
  const FK  = '_bkup_flash_v1';
  const LOG = '_bkup_log';

  function getSetting(k){ try{return JSON.parse(localStorage.getItem(k)||'null');}catch(e){return null;} }
  function setSetting(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }

  // ── نسخ بيانات كـ JSON ──
  function makeData(label){
    return JSON.stringify({
      ...DB,
      _meta:{ label, exported_at:new Date().toISOString(), version:2 }
    }, null, 2);
  }

  // ── اسم الملف ──
  function fileName(prefix){
    const now = new Date();
    const d = now.toISOString().slice(0,10);
    const t = now.toTimeString().slice(0,8).replace(/:/g,'-');
    return `${prefix}-${d}_${t}.json`;
  }

  // ── كتابة لمجلد FileSystem ──
  async function writeToDir(dirHandle, name, data){
    const fh = await dirHandle.getFileHandle(name, {create:true});
    const wr = await fh.createWritable();
    await wr.write(data);
    await wr.close();
    return name;
  }

  // ── Electron IPC helper ──
  function isElectron(){ return !!(window.electronAPI); }

  // ══ HARD DRIVE BACKUP ══════════════════════════════
  async function selectHard(){
    if(isElectron()){
      const path = await window.electronAPI.selectFolder('اختر مجلد النسخ على الهارد');
      if(!path) return;
      _hardPath = path;
      setSetting(HK,{type:'electron',path});
      startHardTimer();
      toast('✅ تم ربط مجلد الهارد: '+path,'g');
      return;
    }
    if(!('showDirectoryPicker' in window)){toast('استخدم Chrome أو التطبيق لهذه الميزة','a');return;}
    try{
      _hardHandle = await window.showDirectoryPicker({mode:'readwrite'});
      _hardPath   = _hardHandle.name;
      setSetting(HK,{type:'browser',name:_hardHandle.name});
      startHardTimer();
      toast('✅ تم ربط مجلد الهارد: '+_hardPath,'g');
      await backupHard(false,'يدوي-ربط');
    }catch(e){if(e.name!=='AbortError') toast('خطأ: '+e.message,'r');}
  }

  function startHardTimer(){
    clearInterval(_hardTimer);
    _hardTimer = setInterval(function(){ backupHard(true,'تلقائي-5د'); }, 5*60*1000);
  }

  async function backupHard(silent, label){
    label = label||'يدوي';
    const data = makeData('هارد — '+label);
    const name = fileName('hard');

    // Electron
    if(isElectron()){
      const st = getSetting(HK);
      if(!st||!st.path){ if(!silent) toast('اختر مجلد الهارد أولاً','a'); return; }
      try{
        await window.electronAPI.writeFile(st.path+'/'+name, data);
        if(!silent) toast('💾 هارد: '+name,'g');
        addBkLog('hard',name);
      }catch(e){ if(!silent) toast('خطأ هارد: '+e.message,'r'); }
      return;
    }
    // Browser
    if(!_hardHandle){ if(!silent) toast('اختر مجلد الهارد أولاً','a'); return; }
    try{
      await writeToDir(_hardHandle, name, data);
      if(!silent) toast('💾 هارد: '+name,'g');
      addBkLog('hard',name);
    }catch(e){ if(!silent) toast('خطأ هارد: '+e.message,'r'); }
  }

  // ══ FLASH DRIVE BACKUP ════════════════════════════
  async function selectFlash(){
    if(isElectron()){
      const path = await window.electronAPI.selectFolder('اختر مجلد الفلاشة');
      if(!path) return;
      _flashPath2 = path;
      setSetting(FK,{type:'electron',path});
      toast('✅ تم ربط الفلاشة: '+path,'g');
      await backupFlash(false,'ربط');
      return;
    }
    if(!('showDirectoryPicker' in window)){toast('استخدم Chrome أو التطبيق','a');return;}
    try{
      _flashHandle2 = await window.showDirectoryPicker({mode:'readwrite'});
      _flashPath2   = _flashHandle2.name;
      setSetting(FK,{type:'browser',name:_flashHandle2.name});
      toast('✅ تم ربط الفلاشة: '+_flashPath2,'g');
      await backupFlash(false,'ربط');
    }catch(e){if(e.name!=='AbortError') toast('خطأ: '+e.message,'r');}
  }

  async function backupFlash(silent, label){
    label = label||'عملية';
    const data = makeData('فلاشة — '+label);
    const name = fileName('flash');

    if(isElectron()){
      const st = getSetting(FK);
      if(!st||!st.path){ if(!silent) toast('اختر مجلد الفلاشة أولاً','a'); return; }
      try{
        await window.electronAPI.writeFile(st.path+'/'+name, data);
        if(!silent) toast('🔌 فلاشة: '+name,'g');
        addBkLog('flash',name);
      }catch(e){ if(!silent) toast('خطأ فلاشة: '+e.message,'r'); }
      return;
    }
    if(!_flashHandle2){ if(!silent) return; toast('اختر مجلد الفلاشة أولاً','a'); return; }
    try{
      await writeToDir(_flashHandle2, name, data);
      if(!silent) toast('🔌 فلاشة: '+name,'g');
      addBkLog('flash',name);
    }catch(e){ if(!silent) toast('خطأ فلاشة: '+e.message,'r'); }
  }

  // ══ بعد كل عملية ══════════════════════════════════
  async function afterOperation(opLabel){
    _opCounter++;
    // نسخة هارد: بعد كل عملية
    await backupHard(true, opLabel||'عملية-'+_opCounter);
    // نسخة فلاشة: بعد كل عملية
    await backupFlash(true, opLabel||'عملية-'+_opCounter);
  }

  // ══ LOG ══════════════════════════════════════════
  function addBkLog(type, name){
    try{
      const logs = JSON.parse(localStorage.getItem(LOG)||'[]');
      logs.unshift({type, name, at:new Date().toISOString()});
      localStorage.setItem(LOG, JSON.stringify(logs.slice(0,200)));
    }catch(e){}
  }
  function getLogs(){ try{return JSON.parse(localStorage.getItem(LOG)||'[]');}catch(e){return[];} }

    const hst = getSetting(HK);

    return {
      hard:  { active:!!(hst), path: _hardPath||(hst?.path||hst?.name||'') },
      flash: { active:!!(fst||_flashHandle2), path: _flashPath2||(fst?.path||fst?.name||'') },
