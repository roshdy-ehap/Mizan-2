  const customAdmin = (DB.staff||[]).find(u=>u.role==='owner');
  const admin = customAdmin || adminAcc;
  if(!admin || admin.password !== adminPw) {
    if(errEl){ errEl.textContent='❌ كلمة مرور المدير غير صحيحة'; errEl.style.display='block'; }
    return;
  }
  if(!newPw || newPw.length < 4) {
    if(errEl){ errEl.textContent='❌ كلمة المرور الجديدة يجب أن تكون 4 أحرف على الأقل'; errEl.style.display='block'; }
    return;
  }

  // Find and update target account
  const builtin = BUILTIN_DEFAULTS.find(u=>u.id===targetId);
  const staffAcc = (DB.staff||[]).find(u=>u.id===targetId);
  if(builtin) builtin.password = newPw;
  if(staffAcc) staffAcc.password = newPw;

  scheduleAutoSave();
  closeModalDirect();
  const target = builtin||staffAcc;
  toast(`✅ تم تغيير كلمة مرور "${target?.name||targetId}" بنجاح`, 'g');
  log('نظام', `تغيير كلمة مرور: ${target?.username||targetId}`);
}

// Emergency admin reset — if all passwords are forgotten, use secret key
function emergencyReset() {
  const key = prompt('أدخل مفتاح الطوارئ:');
  const validKey = 'MIZAN-RESET-' + new Date().getFullYear();
  if(key !== validKey) { toast('مفتاح خاطئ','r'); return; }
  BUILTIN_DEFAULTS.forEach(u => {
    if(u.role==='owner') u.password = 'admin123';
  });
  scheduleAutoSave();
  toast('✅ تم إعادة تعيين كلمة مرور المدير إلى: admin123','g');
  alert('كلمة مرور المدير: admin123\nمفتاح الطوارئ لهذه السنة: ' + validKey);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
  if (e.key === 'F1') { e.preventDefault(); go('pos'); }
  if (e.key === 'F2') { e.preventDefault(); go('dash'); }
});

// ── INIT ──
(async function init() {
  // One-time fix: clear any stored hashed passwords that break file:// login
  try {
    const _bk = localStorage.getItem('islam_builtin_v1');
    if (_bk) {
      const _ba = JSON.parse(_bk);
      if (_ba.some(a => a.password && a.password.startsWith('pbkdf2$'))) {
        localStorage.removeItem('islam_builtin_v1');
        console.log('[FIX] Cleared hashed passwords from localStorage');
      }
    }
  } catch(e) {}

  try {
    loadBuiltins();
  } catch(e) { console.warn('loadBuiltins error:', e); }

  try {
    await loadFromLocalStorage();
  } catch(e) {
    // IDB failed (file:// sometimes blocked) — try localStorage fallback
    try {
      const raw = localStorage.getItem('islam_db_mirror') || localStorage.getItem('mizan_db_v2');
      if (raw) {
        const saved = JSON.parse(raw);
        if (saved?.products) Object.keys(saved).forEach(k => { if(k in DB) DB[k] = saved[k]; });
      }
    } catch(e2) {}
  }

  const status = 'active'; // license bypassed
  checkLicense(); // keep for settings display only
  document.getElementById('app').style.display = 'none';

  if (status === 'expired' || status === 'blocked') {
    document.getElementById('loginScreen').style.display = 'none';
    showExpiredScreen();
    return;
  }

  // Try restore session
  try {
    const restoredUser = SESSION.tryRestore();
    if (restoredUser) {
      const all = [...BUILTIN_ACCOUNTS, ...DB.staff];
      const acc = all.find(a => a.id === restoredUser.id);
      if (acc) { loginAs(acc); return; }
    }
  } catch(e) {}

  document.getElementById('loginScreen').style.display = 'flex';
  try { buildLicBadge(); } catch(e) {}
  try { PERSIST.startAutoBackup(DB); } catch(e) {}

  // Migrate old data
  try {
    const oldData = localStorage.getItem('mizan_db_v2');
    if (oldData && !localStorage.getItem('_isl_migrated')) {
      const old = JSON.parse(oldData);
      if (old?.products) {
        Object.keys(old).forEach(k => { if(k in DB) DB[k] = old[k]; });
        try { await PERSIST.save(DB); } catch(e) { localStorage.setItem('islam_db_mirror', JSON.stringify(DB)); }
        localStorage.setItem('_isl_migrated', '1');
      }
    }
  } catch(e) {}
})();

// ── Session expired prompt ──
function showSessionExpired() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  toast('⏰ انتهت جلستك — سجّل الدخول مجدداً', 'a');
}
</script>

<script>
// ══════════════════════════════════════════════
//  PWA — تثبيت كتطبيق سطح مكتب
// ══════════════════════════════════════════════

// Service Worker — يجعل التطبيق يعمل offline كاملاً
if ('serviceWorker' in navigator) {
  const SW_CODE = `
    const CACHE = 'islam-lib-v2';
    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(c => c.addAll(['./', './index.html']))
        .catch(() => {})
      );
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('./')))
      );
    });
  `;
  const blob = new Blob([SW_CODE], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// Install prompt — يظهر زر التثبيت
let _installPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _installPrompt = e;
  showInstallBanner();
});

window.addEventListener('appinstalled', () => {
  const banner = document.getElementById('installBanner');
  if (banner) banner.remove();
  toast('✅ تم تثبيت التطبيق على سطح المكتب!', 'g');
});

function showInstallBanner() {
  if (document.getElementById('installBanner')) return;
  
  const banner = document.createElement('div');
  banner.id = 'installBanner';
  banner.style.cssText = `
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 99999; background: linear-gradient(135deg, #0c1018, #161d2e);
    border: 1px solid #c8a84b55; border-radius: 14px; padding: 14px 20px;
    display: flex; align-items: center; gap: 14px; box-shadow: 0 8px 40px rgba(0,0,0,.7);
    font-family: 'Tajawal', sans-serif; direction: rtl; min-width: 320px;
    animation: fadeUp .3s ease;
  `;
  banner.innerHTML = `
    <div style="font-size:28px">📱</div>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:700;color:#d8e4f5;margin-bottom:2px">ثبّت التطبيق</div>
      <div style="font-size:11px;color:#6a84aa">يعمل بدون إنترنت كتطبيق مستقل</div>
    </div>
    <button onclick="doInstall()" style="
      padding: 8px 16px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, #6b5418, #c8a84b);
      color: #000; font-family: inherit; font-size: 13px;
      font-weight: 700; cursor: pointer; white-space: nowrap;
    ">تثبيت ⬇️</button>
    <button onclick="this.closest('#installBanner').remove()" style="
      background: transparent; border: none; color: #6a84aa;
      font-size: 18px; cursor: pointer; padding: 4px 6px;
    ">✕</button>
  `;
  document.body.appendChild(banner);
}

async function doInstall() {
  if (!_installPrompt) {
    // Manual install instructions if prompt not available
    showInstallInstructions();
    return;
  }
  _installPrompt.prompt();
  const result = await _installPrompt.userChoice;
  _installPrompt = null;
  const banner = document.getElementById('installBanner');
  if (banner) banner.remove();
}

function showInstallInstructions() {
  const isChrome = navigator.userAgent.includes('Chrome') && !navigator.userAgent.includes('Edg');
  const isEdge   = navigator.userAgent.includes('Edg');
  
  let instructions = '';
  if (isChrome) {
    instructions = `
      <div style="display:flex;flex-direction:column;gap:10px;text-align:right">
        <div style="background:var(--raised);border-radius:10px;padding:14px">
          <div style="font-weight:700;color:var(--gold);margin-bottom:8px">Chrome:</div>
          <div style="color:var(--txt);font-size:13px;line-height:2">
            1️⃣ انقر على أيقونة ⋮ في أعلى يمين المتصفح<br>
            2️⃣ اختر <b>"تثبيت ميزان"</b> أو <b>"Save and share → Install page as app"</b><br>
            3️⃣ انقر تثبيت ✅
          </div>
        </div>
      </div>`;
  } else if (isEdge) {
    instructions = `
      <div style="background:var(--raised);border-radius:10px;padding:14px">
        <div style="font-weight:700;color:var(--gold);margin-bottom:8px">Edge:</div>
        <div style="color:var(--txt);font-size:13px;line-height:2">
          1️⃣ انقر على ⋯ في أعلى يمين المتصفح<br>
          2️⃣ اختر <b>"Apps → Install this site as an app"</b><br>
          3️⃣ انقر تثبيت ✅
        </div>
      </div>`;
  } else {
    instructions = `
      <div style="color:var(--txt);font-size:13px;line-height:2">
        افتح الصفحة في Chrome أو Edge للتثبيت كتطبيق.
      </div>`;
  }
  
  openModal('📱 تثبيت التطبيق على سطح المكتب', `
    <div style="font-size:13px;margin-bottom:16px;color:var(--txt3);line-height:1.8">
      لتثبيت ميزان كتطبيق مستقل على جهازك:
    </div>
    ${instructions}
    <div style="margin-top:14px;padding:12px;background:rgba(200,168,75,.06);border:1px solid rgba(200,168,75,.2);border-radius:10px;font-size:11.5px;color:var(--txt3)">
      ✅ بعد التثبيت: يظهر أيقونة على سطح المكتب ويفتح بدون متصفح
    </div>
  `, [{label:'حسناً', cls:'btn-gold', fn:'closeModalDirect()'}], false, true);
}

// Check if already installed as PWA
if (window.matchMedia('(display-mode: standalone)').matches) {
  console.log('Running as installed PWA');
}
</script>
