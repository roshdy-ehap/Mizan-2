<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cairo:wght@400;600;700;900&display=swap');

.cp{cursor:pointer}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:       #07090f;
  --panel:    #0c1018;
  --card:     #111620;
  --raised:   #161d2e;
  --hover:    #1c2540;
  --border:   #1a2438;
  --border2:  #223050;
  --gold:     #c8a84b;
  --gold2:    #e8c96a;
  --gold-bg:  rgba(200,168,75,.09);
  --gold-br:  rgba(200,168,75,.25);
  --green:    #1fcb7a;
  --green-bg: rgba(31,203,122,.08);
  --red:      #f05252;
  --red-bg:   rgba(240,82,82,.08);
  --blue:     #3b9eff;
  --blue-bg:  rgba(59,158,255,.08);
  --amber:    #f59e0b;
  --violet:   #9f7aea;
  --txt:      #d8e4f5;
  --txt2:     #6a84aa;
  --txt3:     #314060;
  --R:        10px;
  --RS:       6px;
  --SB:       252px;
  --shadow:   0 8px 32px rgba(0,0,0,.55);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'Cairo','Tajawal',sans-serif;background:var(--bg);color:var(--txt);display:flex;height:100vh;overflow:hidden;direction:rtl}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ═══ LOGIN SCREEN ═══ */
#loginScreen{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at 30% 40%, #0d1a35 0%, var(--bg) 70%);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
}
.login-box{
  background:var(--panel);border:1px solid var(--border2);
  border-radius:16px;padding:40px;width:400px;
  box-shadow:0 24px 80px rgba(0,0,0,.7);
  position:relative;overflow:hidden;
}
.login-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-icon{
  width:64px;height:64px;border-radius:16px;
  background:linear-gradient(135deg,#6b5418,var(--gold));
  display:inline-flex;align-items:center;justify-content:center;
  font-size:28px;margin-bottom:12px;
  box-shadow:0 0 30px rgba(200,168,75,.3);
}
.login-title{font-family:'Tajawal',sans-serif;font-size:24px;font-weight:900;color:var(--gold2)}
.login-sub{font-size:12px;color:var(--txt3);margin-top:3px}
.login-form{display:flex;flex-direction:column;gap:14px}
.login-field{display:flex;flex-direction:column;gap:6px}
.login-label{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px}
.login-input{
  background:var(--card);border:1px solid var(--border2);border-radius:var(--RS);
  padding:11px 14px;color:var(--txt);font-family:inherit;font-size:14px;
  outline:none;transition:.18s;direction:ltr;text-align:right;
}
.login-input:focus{border-color:var(--gold-br);box-shadow:0 0 0 3px rgba(200,168,75,.1)}
.login-btn{
  padding:12px;border-radius:var(--RS);border:none;
  background:linear-gradient(135deg,#6b5418,var(--gold));
  color:#000;font-family:inherit;font-size:15px;font-weight:700;
  cursor:pointer;transition:.18s;margin-top:6px;
  box-shadow:0 4px 16px rgba(200,168,75,.3);
}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(200,168,75,.45)}
.login-err{
  background:var(--red-bg);border:1px solid rgba(240,82,82,.25);
  border-radius:var(--RS);padding:10px 14px;
  font-size:12.5px;color:var(--red);text-align:center;display:none;
}
.login-accounts{margin-top:16px;border-top:1px solid var(--border);padding-top:14px}
.la-title{font-size:10px;color:var(--txt3);text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px}
.la-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.la-chip{
  padding:7px 10px;border-radius:var(--RS);
  border:1px solid var(--border2);background:var(--card);
  cursor:pointer;transition:.15s;text-align:center;
}
.la-chip:hover{border-color:var(--gold-br);background:var(--raised)}
.la-role{font-size:10px;color:var(--txt2);font-weight:700}
.la-pass{font-size:9px;color:var(--txt3);margin-top:1px}

/* ═══ MAIN APP ═══ */
#app{display:none;flex:1;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{
  width:var(--SB);background:var(--panel);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
  position:relative;overflow:hidden;
  transition:width .2s;
}
/* ── Responsive Layout ── */
@media (max-width:1100px){
  :root{--SB:200px}
  .pg{padding:12px}
  .frow.f4{grid-template-columns:1fr 1fr}
}
/* ════ RESPONSIVE — all devices ════ */
html { font-size:14px }
body { overflow-x:hidden }
.content { overflow-y:auto; overflow-x:hidden }

@media (max-width:1200px){
  :root{--SB:200px}
}
@media (max-width:900px){
  :root{--SB:0px}
  #sb-toggle{display:block!important}
  .sb{position:fixed;right:-240px;width:240px!important;z-index:500;height:100vh;
    transition:right .25s;box-shadow:-4px 0 30px rgba(0,0,0,.6)}
  .sb.open{right:0!important}
  .topbar{padding:8px 10px;gap:6px}
  .frow.f3,.frow.f4{grid-template-columns:1fr 1fr}
  .stats-grid,.sg3,.sg4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr}
  table{font-size:11px}
  table td,table th{padding:6px 6px}
}
@media (max-width:600px){
  :root{--SB:0px}
  html{font-size:13px}
  .pg{padding:10px 8px}
  .frow.f2,.frow.f3,.frow.f4{grid-template-columns:1fr}
  .stats-grid,.sg3,.sg4,.g2,.g3{grid-template-columns:1fr 1fr}
  .modal-box{max-width:100%!important;border-radius:12px}
  .mbody{padding:12px}
  .pos-left,.pos-right{min-width:0}
  table{font-size:11px}
  .topbar .tbar-btn{font-size:14px;padding:3px 4px}
}
@media (max-width:400px){
  .stats-grid,.sg4{grid-template-columns:1fr 1fr}
  .frow.f2{grid-template-columns:1fr}
}
@media (max-width:500px){
  :root{--SB:0px}
  .frow.f2,.frow.f3,.frow.f4{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .pos-left,.pos-right{min-width:0}
  html{font-size:13px}
}
.sb::after{
  content:'';position:absolute;top:0;right:0;width:2px;height:100%;
  background:linear-gradient(180deg,transparent,var(--gold),transparent);opacity:.2;
}
.sb-logo{padding:18px 14px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-icon{
  width:40px;height:40px;border-radius:10px;
  background:linear-gradient(135deg,#6b5418,var(--gold));
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
  box-shadow:0 0 14px rgba(200,168,75,.2);
}
.sb-name{font-family:'Tajawal',sans-serif;font-size:16px;font-weight:900;color:var(--gold2)}
.sb-ver{font-size:9.5px;color:var(--txt3)}
.sb-nav{flex:1;overflow-y:auto;padding:8px 6px;scrollbar-width:none}
.sb-sec{font-size:9px;font-weight:700;color:var(--txt3);letter-spacing:1.4px;text-transform:uppercase;padding:10px 8px 4px}
.nb{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-radius:var(--RS);cursor:pointer;transition:.15s;
  color:var(--txt2);font-size:13px;font-weight:600;margin-bottom:1px;position:relative;
  user-select:none;
}
.nb:hover{background:var(--raised);color:var(--txt)}
.nb.on{background:var(--gold-bg);color:var(--gold2);border:1px solid var(--gold-br)}
.nb.on::before{
  content:'';position:absolute;right:0;top:22%;bottom:22%;
  width:2.5px;background:var(--gold);border-radius:1px 0 0 1px;
}
.nb .ni{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nb .lock-icon{margin-right:auto;font-size:11px;opacity:.4}
.nb .nbadge{
  margin-right:auto;background:var(--red);color:#fff;
  font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center;
}
.nbadge.g{background:var(--green);color:#000}
.nbadge.a{background:var(--amber);color:#000}
.sb-foot{padding:10px 6px;border-top:1px solid var(--border)}
.sb-user{
  display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--RS);
  background:var(--card);border:1px solid var(--border);cursor:pointer;transition:.15s;
}
.sb-user:hover{border-color:var(--gold-br)}
.uavatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#0c5c38,var(--green));
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;
}
.uname{font-size:12.5px;font-weight:700}
.urole{font-size:10px;color:var(--txt3)}
.logout-btn{
  width:100%;margin-top:6px;padding:7px;border-radius:var(--RS);
  background:transparent;border:1px solid var(--border);
  color:var(--txt2);font-family:inherit;font-size:12px;font-weight:600;
  cursor:pointer;transition:.15s;
}
.logout-btn:hover{background:var(--red-bg);border-color:rgba(240,82,82,.3);color:var(--red)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  display:flex;align-items:center;gap:10px;padding:10px 18px;
  background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;
}
.pg-title{font-family:'Tajawal',sans-serif;font-size:18px;font-weight:700;flex:1}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
.tbar-time{font-size:11px;color:var(--txt3);font-family:'Cairo',monospace}
.tbar-btn{
  width:32px;height:32px;border-radius:var(--RS);background:var(--raised);
  border:1px solid var(--border);color:var(--txt2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:14px;transition:.15s;
}
.tbar-btn:hover{border-color:var(--gold-br);color:var(--gold)}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;max-width:100%;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

/* ═══ COMPONENTS ═══ */
.btn{
  display:inline-flex;align-items:center;gap:5px;padding:7px 13px;
  border-radius:var(--RS);border:none;font-family:inherit;font-size:12.5px;font-weight:700;
  cursor:pointer;transition:.15s;white-space:nowrap;
}
.btn-gold{background:linear-gradient(135deg,#6b5418,var(--gold));color:#000;box-shadow:0 2px 10px rgba(200,168,75,.2)}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(200,168,75,.38)}
.btn-green{background:linear-gradient(135deg,#0a5c35,var(--green));color:#000}
.btn-green:hover{transform:translateY(-1px)}
.btn-red{background:linear-gradient(135deg,#7a1818,var(--red));color:#fff}
.btn-ghost{background:transparent;color:var(--txt2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--raised);color:var(--txt);border-color:var(--border2)}
.btn-excel{background:linear-gradient(135deg,#1a4a28,#1fcb7a);color:#000;font-weight:700}
.btn-excel:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(31,203,122,.35)}
.btn-sm{padding:5px 10px;font-size:11.5px}
.btn-icon{
  width:30px;height:30px;border-radius:var(--RS);background:var(--raised);
  border:1px solid var(--border);color:var(--txt2);cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;font-size:13px;transition:.15s;
}
.btn-icon:hover{border-color:var(--gold-br);color:var(--gold)}
.btn-icon.red:hover{border-color:rgba(240,82,82,.4);color:var(--red);background:var(--red-bg)}
.btn-icon:disabled{opacity:.3;cursor:not-allowed}
.btn:disabled{opacity:.3;cursor:not-allowed}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--R);overflow:hidden}
.card-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-title{font-size:13.5px;font-weight:700;flex:1}

table{width:100%;border-collapse:collapse;font-size:12.5px}
thead{background:rgba(255,255,255,.02)}
th{
  padding:9px 13px;text-align:right;font-size:10px;font-weight:700;
  color:var(--txt3);text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--border);
}
td{padding:10px 13px;border-bottom:1px solid rgba(255,255,255,.02);color:var(--txt2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.02);color:var(--txt)}

.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10.5px;font-weight:700}
.bg{background:var(--green-bg);color:var(--green);border:1px solid rgba(31,203,122,.2)}
.br{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,82,82,.2)}
.ba{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.bb{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(59,158,255,.2)}
.bv{background:rgba(159,122,234,.1);color:var(--violet);border:1px solid rgba(159,122,234,.2)}
.bgold{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-br)}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.mb{margin-bottom:12px}
.mb2{margin-bottom:18px}

.fg{display:flex;flex-direction:column;gap:4px}
.flbl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
.finput,.fsel{
  background:var(--panel);border:1px solid var(--border2);border-radius:var(--RS);
  padding:8px 12px;color:var(--txt);font-family:inherit;font-size:13px;
  outline:none;transition:.18s;width:100%;direction:rtl;
}
.finput:focus,.fsel:focus{border-color:var(--gold-br);box-shadow:0 0 0 3px rgba(200,168,75,.08)}
.finput::placeholder{color:var(--txt3)}
.frow{display:grid;gap:10px;margin-bottom:10px}
.f2{grid-template-columns:1fr 1fr}
.f3{grid-template-columns:1fr 1fr 1fr}
.f4{grid-template-columns:repeat(4,1fr)}

/* empty state */
.empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:50px 20px;color:var(--txt3);text-align:center;
}
.empty-icon{font-size:42px;margin-bottom:12px;opacity:.35}
.empty-title{font-size:15px;font-weight:700;color:var(--txt2);margin-bottom:6px}
.empty-sub{font-size:12px}

/* permission denied */
.perm-denied{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;padding:40px;text-align:center;color:var(--txt3);
}
.perm-icon{font-size:50px;margin-bottom:14px;opacity:.4}
.perm-title{font-size:18px;font-weight:700;color:var(--txt2);margin-bottom:6px}
.perm-sub{font-size:12.5px;max-width:340px;line-height:1.7}

/* modal */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;z-index:999;
  opacity:0;pointer-events:none;transition:.2s;
}
.modal-bg.on{opacity:1;pointer-events:all}
.modal-box{
  background:var(--card);border:1px solid var(--border2);border-radius:var(--R);
  width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 70px rgba(0,0,0,.75);
  transform:scale(.94) translateY(18px);transition:.22s;
}
.modal-bg.on .modal-box{transform:scale(1) translateY(0)}
.modal-box.wide{width:750px}
.modal-box.narrow{width:420px}
.mhead{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mttl{font-size:15px;font-weight:700}
.mclose{
  width:28px;height:28px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:var(--txt2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:14px;transition:.15s;
}
.mclose:hover{background:var(--red);color:#fff;border-color:var(--red)}
.mbody{padding:18px}
.mfoot{padding:13px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* toast */
.toast{
  position:fixed;bottom:18px;left:18px;
  background:var(--raised);border:1px solid var(--border2);border-radius:var(--R);
  padding:11px 15px;display:flex;align-items:center;gap:10px;
  box-shadow:var(--shadow);font-size:13px;font-weight:600;z-index:3000;
  transform:translateY(70px);opacity:0;transition:.28s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1}
.toast.tg{border-color:rgba(31,203,122,.35)}
.toast.tr{border-color:rgba(240,82,82,.35)}
.toast.ta{border-color:rgba(245,158,11,.35)}

/* POS */
.pos-wrap{display:grid;grid-template-columns:1fr 355px;gap:12px;height:calc(100vh - 52px)}
.pos-left{background:var(--card);border:1px solid var(--border);border-radius:var(--R);display:flex;flex-direction:column;overflow:hidden}
.pos-search-row{padding:9px 10px;border-bottom:1px solid var(--border);display:flex;gap:7px}
.pos-cats{display:flex;gap:5px;padding:7px 10px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.pcat{
  padding:5px 11px;border-radius:20px;font-size:11.5px;font-weight:700;
  cursor:pointer;white-space:nowrap;border:1px solid var(--border);color:var(--txt2);transition:.15s;
}
.pcat:hover{border-color:var(--gold-br);color:var(--gold)}
.pcat.on{background:var(--gold-bg);border-color:var(--gold-br);color:var(--gold2)}
.pgrid{
  flex:1;overflow-y:auto;display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:7px;padding:9px;align-content:start;
}
.ptile{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--RS);
  padding:11px;cursor:pointer;transition:.14s;text-align:center;
}
.ptile:hover{border-color:var(--gold-br);background:var(--raised);transform:scale(1.02)}
.ptile:active{transform:scale(.97)}
.pt-emoji{font-size:24px;display:block;margin-bottom:5px}
.pt-name{font-size:11px;font-weight:700;color:var(--txt);margin-bottom:3px;line-height:1.3}

<script>
// ╔═══════════════════════════════════════════════════════╗
// ║  SECURITY ENGINE v2 — كل الحماية هنا                ║
// ║  ① Hash كلمات المرور  ② Sessions  ③ Brute Force    ║
// ║  ④ IndexedDB دائم     ⑤ Auto-backup ⑥ Encryption   ║
// ╚═══════════════════════════════════════════════════════╝

/* ── CRYPTO: بديل bcrypt للـ Frontend ── */
const CRYPTO = (() => {
  // PBKDF2-style hash using Web Crypto API
  async function hashPassword(password) {
    const enc = new TextEncoder();
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const key  = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
    const bits = await crypto.subtle.deriveBits(
      { name:'PBKDF2', salt, iterations:100000, hash:'SHA-256' }, key, 256
    );
    const hashArr = Array.from(new Uint8Array(bits));
    const saltArr = Array.from(salt);
    return 'pbkdf2$' + saltArr.map(b=>b.toString(16).padStart(2,'0')).join('') +
           '$' + hashArr.map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  async function verifyPassword(password, stored) {
    // Plain text (default for builtin accounts)
    if (!stored || !stored.startsWith('pbkdf2$')) {
      return password === stored;
    }
    // PBKDF2 hash — only works on https:// or localhost
    try {
      const [, saltHex, hashHex] = stored.split('$');
      const salt = new Uint8Array(saltHex.match(/.{2}/g).map(h=>parseInt(h,16)));
      const enc  = new TextEncoder();
      const key  = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
      const bits = await crypto.subtle.deriveBits(
        { name:'PBKDF2', salt, iterations:100000, hash:'SHA-256' }, key, 256
      );
      const newHash = Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,'0')).join('');
      return newHash === hashHex;
    } catch(e) {
      // Crypto not available (file:// protocol) — cannot verify hash, deny
      return false;
    }
  }

  // Encrypt sensitive data for storage
  async function encrypt(text, keyStr) {
    try {
      const enc   = new TextEncoder();
      const keyMat = await crypto.subtle.importKey('raw', enc.encode(keyStr.padEnd(32,'0').slice(0,32)), 'AES-GCM', false, ['encrypt']);
      const iv    = crypto.getRandomValues(new Uint8Array(12));
      const ct    = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, keyMat, enc.encode(text));
      const buf   = new Uint8Array(iv.byteLength + ct.byteLength);
      buf.set(iv, 0); buf.set(new Uint8Array(ct), iv.byteLength);
      return btoa(String.fromCharCode(...buf));
    } catch(e) { return text; }
  }

  async function decrypt(b64, keyStr) {
    try {
      const buf   = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
      const iv    = buf.slice(0,12);
      const ct    = buf.slice(12);
      const enc   = new TextEncoder();
      const keyMat = await crypto.subtle.importKey('raw', enc.encode(keyStr.padEnd(32,'0').slice(0,32)), 'AES-GCM', false, ['decrypt']);
      const pt    = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, keyMat, ct);
      return new TextDecoder().decode(pt);
    } catch(e) { return b64; }
  }

  return { hashPassword, verifyPassword, encrypt, decrypt };
})();

/* ── INDEXED DB STORAGE: بديل localStorage الدائم ── */
const IDB = (() => {
  const DB_NAME = 'IslamLibraryDB';
  const DB_VER  = 3;
  let _db = null;

  function open() {
    if (_db) return Promise.resolve(_db);
    return new Promise((res, rej) => {
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        // Main data store
        if (!db.objectStoreNames.contains('data'))
          db.createObjectStore('data', { keyPath: 'k' });
        // Activity log (append-only, tamper-resistant)
        if (!db.objectStoreNames.contains('actlog')) {
          const s = db.createObjectStore('actlog', { keyPath: 'id', autoIncrement: true });
          s.createIndex('time', 'time');
          s.createIndex('user', 'user');
        }
        // Sessions store
        if (!db.objectStoreNames.contains('sessions'))
          db.createObjectStore('sessions', { keyPath: 'token' });
        // Backup metadata
        if (!db.objectStoreNames.contains('backups'))
          db.createObjectStore('backups', { keyPath: 'id', autoIncrement: true });
      };
      req.onsuccess = e => { _db = e.target.result; res(_db); };
      req.onerror   = e => { console.error('IDB Error:', e); rej(e); };
    });
  }

  async function set(key, value) {
    const db = await open();
    return new Promise((res, rej) => {
      const tx   = db.transaction('data', 'readwrite');
      const req  = tx.objectStore('data').put({ k: key, v: value, ts: Date.now() });
      req.onsuccess = () => res(true);
      req.onerror   = () => rej(req.error);
    });
  }

  async function get(key) {
    const db = await open();
    return new Promise((res, rej) => {
      const req = db.transaction('data','readonly').objectStore('data').get(key);
      req.onsuccess = () => res(req.result?.v ?? null);
      req.onerror   = () => rej(req.error);
    });
  }

  async function del(key) {
    const db = await open();
    return new Promise((res, rej) => {
      const req = db.transaction('data','readwrite').objectStore('data').delete(key);
      req.onsuccess = () => res(true);
      req.onerror   = () => rej(req.error);
    });
  }

  // Activity log — append only, no delete API
  async function logActivity(entry) {
    const db = await open();
    return new Promise((res) => {
      const tx  = db.transaction('actlog','readwrite');
      tx.objectStore('actlog').add({ ...entry, time: new Date().toISOString() });
      tx.oncomplete = () => res(true);
    });
  }

  async function getActivityLog(limit = 500) {
    const db = await open();
    return new Promise((res) => {
      const results = [];
      const req = db.transaction('actlog','readonly').objectStore('actlog')
                    .index('time').openCursor(null, 'prev');
      req.onsuccess = e => {
        const cur = e.target.result;
        if (cur && results.length < limit) { results.push(cur.value); cur.continue(); }
        else res(results);
      };
      req.onerror = () => res([]);
    });
  }

  // Save backup snapshot
  async function saveBackup(label, data) {
    const db = await open();
    return new Promise((res) => {
      const tx = db.transaction('backups','readwrite');
      tx.objectStore('backups').add({ label, data, time: new Date().toISOString() });
      tx.oncomplete = () => res(true);
    });
  }

  async function getBackups() {
    const db = await open();
    return new Promise((res) => {
      const results = [];
      const req = db.transaction('backups','readonly').objectStore('backups').openCursor(null,'prev');
      req.onsuccess = e => {
        const cur = e.target.result;
        if (cur && results.length < 10) { results.push({ id:cur.value.id, label:cur.value.label, time:cur.value.time }); cur.continue(); }
        else res(results);
      };
      req.onerror = () => res([]);
    });
  }

  return { set, get, del, logActivity, getActivityLog, saveBackup, getBackups, open };
})();

/* ── SESSION MANAGER ── */
const SESSION = (() => {
  let _session = null;
  const TTL_MS = 8 * 60 * 60 * 1000;  // 8 ساعات
  const IDLE_MS = 30 * 60 * 1000;     // 30 دقيقة خمول
  let _idleTimer = null;

  function _genToken() {
    const arr = crypto.getRandomValues(new Uint8Array(32));
    return Array.from(arr).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  function create(user) {
    const token = _genToken();
    _session = { token, user, createdAt: Date.now(), expiresAt: Date.now() + TTL_MS };
    // Save token in sessionStorage only (cleared on browser close)
    sessionStorage.setItem('_ist', token);
    sessionStorage.setItem('_isu', JSON.stringify({ id: user.id, name: user.name, role: user.role }));
    _resetIdle();
    return token;
  }

  function destroy() {
    _session = null;
    sessionStorage.removeItem('_ist');
    sessionStorage.removeItem('_isu');
    clearTimeout(_idleTimer);
  }

  function getUser() { return _session?.user || null; }
  function getToken() { return _session?.token || null; }

  function isValid() {
    if (!_session) return false;
    if (Date.now() > _session.expiresAt) { destroy(); return false; }
    return true;
  }

  function _resetIdle() {
    clearTimeout(_idleTimer);
    _idleTimer = setTimeout(() => {
      if (_session) {
        destroy();
        // Show re-login prompt
        if (typeof showSessionExpired === 'function') showSessionExpired();
      }
    }, IDLE_MS);
  }

  // Reset idle on user activity
  ['click','keydown','touchstart','mousemove'].forEach(ev =>
    document.addEventListener(ev, () => { if(_session) _resetIdle(); }, { passive:true })
  );

  // Restore session on page refresh (same browser session)
  function tryRestore() {
    const token = sessionStorage.getItem('_ist');
    const uStr  = sessionStorage.getItem('_isu');
    if (!token || !uStr) return false;
    try {
      const u = JSON.parse(uStr);
      _session = { token, user: u, createdAt: Date.now(), expiresAt: Date.now() + TTL_MS };
      _resetIdle();
      return u;
    } catch(e) { return false; }
  }

  return { create, destroy, getUser, getToken, isValid, tryRestore };
})();

/* ── BRUTE FORCE PROTECTION ── */
const BRUTEFORCE = (() => {
  const _map = {}; // username -> { count, lockedUntil }
  const MAX = 5;
  const LOCK_MS = 5 * 60 * 1000; // 5 دقائق

  function check(username) {
    const s = _map[username];
    if (!s) return { ok: true };
    if (Date.now() < s.lockedUntil) {
      const mins = Math.ceil((s.lockedUntil - Date.now()) / 60000);
      return { ok: false, locked: true, minsLeft: mins };
    }
    return { ok: true, attemptsLeft: MAX - s.count };
  }

  function fail(username) {
    if (!_map[username]) _map[username] = { count:0, lockedUntil:0 };
    _map[username].count++;
    if (_map[username].count >= MAX) {
      _map[username].lockedUntil = Date.now() + LOCK_MS;
      return { locked: true, minsLeft: 5 };
    }
    return { locked: false, attemptsLeft: MAX - _map[username].count };
  }

  function reset(username) { delete _map[username]; }

  return { check, fail, reset };
})();

/* ── PERSISTENT STORAGE: يحفظ DB في IndexedDB تلقائياً ── */
const PERSIST = (() => {
  const KEY = 'main_db';
  let _saveTimer = null;
  let _autoBackupTimer = null;

  async function save(db) {
    await IDB.set(KEY, JSON.stringify(db));
    // Also keep localStorage as secondary backup
    try { localStorage.setItem('islam_db_mirror', JSON.stringify(db)); } catch(e){}
    const el = document.getElementById('saveIndicator');
    if (el) { el.style.opacity='1'; setTimeout(()=>el.style.opacity='0', 1500); }
  }

  async function load() {
    // Try IndexedDB first (primary)
    let raw = await IDB.get(KEY);
    if (!raw) {
      // Fallback to localStorage
      raw = localStorage.getItem('islam_db_mirror') ||
            localStorage.getItem('mizan_db_v2');
    }
    if (!raw) return null;
    try { return JSON.parse(raw); } catch(e) { return null; }
  }

  function schedule(db) {
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => save(db), 600);
  }

  function startAutoBackup(db) {
    // Auto-backup every 6 hours
    _autoBackupTimer = setInterval(async () => {
      const snapshot = JSON.stringify(db);
      const label = 'تلقائي — ' + new Date().toLocaleString('ar-EG');
      await IDB.saveBackup(label, snapshot);
      await IDB.logActivity({ user:'نظام', action:'نسخة احتياطية تلقائية', details:'كل 6 ساعات' });
    }, 6 * 60 * 60 * 1000);
  }

  async function createManualBackup(db, label) {
    const snapshot = JSON.stringify(db);
    await IDB.saveBackup(label || ('يدوي — ' + new Date().toLocaleString('ar-EG')), snapshot);
    return snapshot;
  }

  return { save, load, schedule, startAutoBackup, createManualBackup };
})();

//  LICENSE SYSTEM
// ══════════════════════════════════════════════
const _VS = 'ISL#MASTER#2025#VENDOR#KEY'; // vendor secret
const _LK = 'islam_lic_v1';
const _BK = 'islam_builtin_v1';
const TRIAL_DAYS = 30;

let licState = { status:'unknown', key:null, activatedAt:null, expiresAt:null, name:'', daysLeft:0, trialStart:null };

function _h(s) {
  let h = 0xdeadbeef;
  for(let i=0;i<s.length;i++) h = Math.imul(h^s.charCodeAt(i), 0x9e3779b9)>>>0;
  return (h>>>0).toString(36).toUpperCase().padEnd(6,'0').slice(0,4);
}

function genKey(clientCode, days) {
  // Key: ISL-P1-P2-P3-P4
  const d = String(days).padStart(4,'0');
  const p1 = _h(clientCode.toUpperCase() + _VS);
  const p2 = _h(_VS + d);
  const p3 = _h(p1 + clientCode + d);
  const p4 = String(((parseInt(p1,36)||1) * (days%997||1)) % 9999).padStart(4,'0');
  return `ISL-${p1}-${p2}-${p3}-${p4}`;
}

// Hardcoded demo keys that always work
const DEMO_KEYS = {
  'ISL-2025-DEMO-FULL-ACTV': 365,
  'ISL-TEST-CODE-0001-PERM': 36500,
  'ISL-TRIAL-EXT-30-DAYSS': 30,
};

function validateKey(key) {
  if(!key) return null;
  const k = key.toUpperCase().replace(/\s+/g,'');
  // Check demo keys first
  if(DEMO_KEYS[k]) return { days: DEMO_KEYS[k] };
  // Validate structure
  const p = k.split('-');
  if(p.length!==5 || p[0]!=='ISL') return null;
  // Try all valid day values
  for(const days of [30,60,90,180,365,730,1095,36500]) {
    for(const cc of [p[1], p[1].slice(0,3), p[1].slice(0,2)]) {
      const test = genKey(cc, days);
      const tp = test.split('-');
      if(tp[2]===p[2] && tp[3]===p[3] && tp[4]===p[4]) return { days };
    }
  }
  return null;
}

function saveLic() { try { localStorage.setItem(_LK, JSON.stringify(licState)); } catch(e){} }
function loadLic() { try { const r=localStorage.getItem(_LK); if(r) Object.assign(licState,JSON.parse(r)); } catch(e){} }

function checkLicense() {
  loadLic();
  const now = Date.now();
  if(licState.status==='active') {
    if(licState.expiresAt && licState.expiresAt!==-1 && now>licState.expiresAt) {
      licState.status='expired'; licState.daysLeft=0; saveLic();
    } else {
      licState.daysLeft = licState.expiresAt===-1 ? 99999 : Math.ceil((licState.expiresAt-now)/86400000);
    }
    return licState.status;
  }
  if(licState.status==='expired'||licState.status==='blocked') return licState.status;
  // Trial logic
  if(!licState.trialStart){ licState.trialStart=now; licState.status='trial'; licState.expiresAt=now+TRIAL_DAYS*86400000; saveLic(); }
  const exp = licState.trialStart + TRIAL_DAYS*86400000;
  if(now>exp){ licState.status='expired'; licState.daysLeft=0; }
  else { licState.status='trial'; licState.daysLeft=Math.ceil((exp-now)/86400000); }
  saveLic();
  return licState.status;
}

function doActivate(key, name) {
  const r = validateKey(key);
  if(!r) return false;
  const now = Date.now();
  licState = {
    status:'active', key: key.toUpperCase().trim(), activatedAt: now,
    expiresAt: r.days>=36000 ? -1 : now+r.days*86400000,
    name: name||'مفعّل', daysLeft: r.days>=36000?99999:r.days, trialStart: licState.trialStart
  };
  saveLic();
  return true;
}

function doLogin() {
  const u   = (document.getElementById('li-user').value||'').trim();
  const p   = document.getElementById('li-pass').value||'';
  const err = document.getElementById('li-err');
  const btn = document.getElementById('li-btn');
  if(err) err.style.display='none';

  // License check — bypassed for distribution
  // const ls = checkLicense();
  // if(ls==='expired'||ls==='blocked'){ showExpiredScreen(); return; }

  // Brute force check
  try {
    const bf = BRUTEFORCE.check(u);
    if(!bf.ok && bf.locked){
      if(err){ err.textContent='🔒 حساب مقفل — انتظر '+bf.minsLeft+' دقيقة'; err.style.display='block'; }
      return;
    }
  } catch(e){}

  if(btn){ btn.disabled=true; btn.textContent='...'; }

  // Make sure builtins are loaded
  try{ if(!BUILTIN_ACCOUNTS.length) loadBuiltins(); } catch(e){}

  // Build full user list
  const allUsers = [];
  try{ allUsers.push(...BUILTIN_ACCOUNTS); } catch(e){}
  try{ allUsers.push(...(DB.staff||[])); } catch(e){}
  try{ allUsers.push(...BUILTIN_DEFAULTS); } catch(e){}

  // Find user — check username match
  const acc = allUsers.find(function(a){
    return a.username===u && a.active!==false;
  });

  if(!acc){
    try{ BRUTEFORCE.fail(u); } catch(e){}
    if(err){ err.textContent='اسم المستخدم غير موجود'; err.style.display='block'; }
    if(btn){ btn.disabled=false; btn.textContent='🔐 دخول إلى النظام'; }
    return;
  }

  // Verify password — always plain text comparison (works on file://)
  const storedPwd = acc.password||'';
  const isHashed  = storedPwd.startsWith('pbkdf2$');
  const match     = isHashed ? (p===acc.password) : (p===storedPwd);
  // also try defaults if no match
  const defAcc    = BUILTIN_DEFAULTS.find(function(d){ return d.id===acc.id||d.username===u; });
  const matchDef  = defAcc && p===defAcc.password;

  if(!match && !matchDef){
    try{
      const bfR = BRUTEFORCE.fail(u);
      if(bfR.locked){ if(err){ err.textContent='🔒 تم قفل الحساب 5 دقائق'; err.style.display='block'; } }
      else{ if(err){ err.textContent='كلمة المرور غير صحيحة'+(bfR.attemptsLeft?' — '+bfR.attemptsLeft+' محاولة متبقية':''); err.style.display='block'; } }
    } catch(e){ if(err){ err.textContent='كلمة المرور غير صحيحة'; err.style.display='block'; } }
    if(btn){ btn.disabled=false; btn.textContent='🔐 دخول إلى النظام'; }
    return;
  }

  // ✅ SUCCESS
  try{ BRUTEFORCE.reset(u); } catch(e){}
  try{ SESSION.create(acc); } catch(e){}
  try{ IDB.logActivity({user:acc.name,action:'تسجيل دخول',details:acc.role}); } catch(e){}
  if(btn){ btn.disabled=false; btn.textContent='🔐 دخول إلى النظام'; }
  loginAs(acc);
}

function buildNav() {
  const nav = document.getElementById('sideNav');
  const shopType = localStorage.getItem('_mizan_shop_type') || 'other';
  let html = '';
  let lastSection = '';
  NAV_ITEMS.forEach(item => {
    // Hide items not relevant to this shop type
    if (item.shopTypes && !item.shopTypes.includes(shopType) && shopType !== 'other') return;
    const allowed = !item.perm || currentPerms[item.perm];
    if (item.section && item.section !== lastSection) {
      html += `<div class="sb-sec">${item.section}</div>`;
      lastSection = item.section;
    }
    html += `<div class="nb" id="nb-${item.id}" onclick="go('${item.id}')" ${!allowed ? 'style="opacity:.35;pointer-events:none"' : ''}>
      <span class="ni">${item.icon}</span>${item.label}
      ${item.badge ? `<span class="nbadge ${item.badgeCls||''}">${item.badge}</span>` : ''}
      ${!allowed ? '<span class="lock-icon">🔒</span>' : ''}
    </div>`;
  });
  nav.innerHTML = html;
}

// ── POS Search with barcode debounce (prevents double-add) ──
let _posDebTimer = null;
let _posJustAdded = false;  // Flag to block double-add

function debouncePOS() {
  const raw = document.getElementById('posSearch')?.value || '';
  const q = raw.toLowerCase().trim();
  if (!q) { renderPOSGrid(DB.products); return; }

  // Check for exact barcode/SKU match immediately
  const exact = DB.products.find(p =>
    (p.barcode && p.barcode.toLowerCase() === q) ||
    (p.sku && p.sku.toLowerCase() === q)
  );

  if (exact) {
    // Clear FIRST, then add — prevents any double-add from re-trigger
    const inp = document.getElementById('posSearch');
    if (inp) { inp.value = ''; }
    addToCart(exact.id);
    renderPOSGrid(DB.products);
    barcodeBeep('ok');
    return;
  }

  // Partial match — just filter display
  renderPOSGrid(DB.products.filter(p =>
    p.name.toLowerCase().includes(q) ||
    (p.barcode||'').toLowerCase().includes(q) ||
    (p.sku||'').toLowerCase().includes(q)
  ));
}

function handlePOSKey(e) {
  if (e.key === 'Escape') {
    document.getElementById('posSearch').value = '';
    renderPOSGrid(DB.products);
  }
  // Note: Enter does NOT add to cart — the 300ms debounce in oninput handles it
  // This prevents double-add when scanner sends chars + \n
}

// Keep filterPOS as alias for compatibility
function filterPOS() { debouncePOS(); }

// Beep / vibrate feedback for barcode scan
function barcodeBeep(type) {
  if (DB.settings?.soundEnabled === false) return;
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = type==='ok' ? 880 : 220;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
  try { if(navigator.vibrate) navigator.vibrate(type==='ok'?[50]:[100,50,100]); } catch(e){}
}

  if (!el) return;
  if (list.length === 0) {
    el.innerHTML = `<div style="grid-column:1/-1"><div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">لا توجد منتجات</div><div class="empty-sub">أضف منتجات من صفحة المخزون أو استورد من Excel</div></div></div>`;
    return;
  }
  el.innerHTML = list.map(p => `
    <div class="ptile" onclick="addToCart('${p.id}')">
      <span class="pt-emoji">${p.emoji||'📦'}</span>
      <div class="pt-name">${p.name}</div>
      ${p.sku?`<div style="font-size:9px;color:var(--txt3);margin-top:1px">#${p.sku}</div>`:''}
      <div class="pt-price">${fmt(p.sellPrice)} ج</div>
      <div class="pt-stock" style="color:${p.stock<=0?'var(--red)':p.stock<=(p.minStock||0)?'var(--amber)':'var(--txt3)'}">مخزون: ${p.stock}</div>
    </div>`).join('');
}

function addToCart(id) {
  const p = DB.products.find(x => x.id === id);
  if (!p) return;
  if (p.stock <= 0) { toast('لا يوجد مخزون كافٍ', 'r'); return; }
  const ex = cart.find(x => x.id === id);
  if (ex) {
    if (ex.qty >= p.stock) { toast('وصلت للحد الأقصى المتاح', 'a'); return; }
    ex.qty++;
  } else {
    cart.push({ ...p, qty: 1 });
  }
  renderCart();
}

function renderCart() {
  const el = document.getElementById('cartArea');
  if (!el) return;
  if (cart.length === 0) {
    el.innerHTML = `<div class="inv-empty"><div style="font-size:32px;margin-bottom:8px;opacity:.3">🛒</div><div style="font-size:12px">اختر منتجاً للبدء</div></div>`;
    updatePOSTotals();
    return;
  }
  el.innerHTML = cart.map((item, i) => `
    <div class="inv-item">
      <div>
        <div class="iname">${item.emoji||'📦'} ${item.name}</div>
        <div class="imeta">${fmt(item.sellPrice)} × ${item.qty}</div>
      </div>
      <div class="qc">
        <button class="qbtn" onclick="chQty(${i},-1)">−</button>
        <span class="qnum">${item.qty}</span>
        <button class="qbtn" onclick="chQty(${i},1)">+</button>
      </div>
      <div class="itotal">${fmt(item.sellPrice * item.qty)} ج</div>
      <button class="delbtn" onclick="removeItem(${i})">✕</button>
    </div>`).join('');
  updatePOSTotals();
}

function chQty(i, d) {
  const p = DB.products.find(x => x.id === cart[i].id);
  cart[i].qty += d;
  if (cart[i].qty <= 0) cart.splice(i, 1);
  else if (p && cart[i].qty > p.stock) { cart[i].qty = p.stock; toast('وصلت للحد الأقصى','a'); }
  renderCart();
}
function removeItem(i) { cart.splice(i, 1); renderCart(); }
function clearCart() { if (cart.length && confirm('مسح الفاتورة الحالية؟')) { cart = []; renderCart(); } }
function holdCart() { toast('تم تعليق الفاتورة','a'); }
function selPay(el) { document.querySelectorAll('.pm').forEach(b => b.classList.remove('on')); el.classList.add('on'); }

function updatePOSTotals() {
  const sub = cart.reduce((s,i) => s + i.sellPrice * i.qty, 0);
  const disc = parseFloat(document.getElementById('discPct')?.value || 0);
  const dAmt = sub * disc / 100;
  const grand = sub - dAmt;
  setTxt('posSubtotal', `${fmt(sub)} ج`);
  setTxt('discAmt', `-${fmt(dAmt)} ج`);
  setTxt('grandTotal', `${fmt(grand)} ج`);
  calcChange();
}

function calcChange() {
  const sub = cart.reduce((s,i) => s + i.sellPrice * i.qty, 0);
  const disc = parseFloat(document.getElementById('discPct')?.value || 0);
  const grand = sub * (1 - disc/100);
  const paid = isSplit
    ? (parseFloat(document.getElementById('split-cash')?.value||0) + parseFloat(document.getElementById('split-digital')?.value||0))
    : parseFloat(document.getElementById('paidAmt')?.value || 0);
  const change = Math.max(0, paid - grand);
  const el = document.getElementById('changeLbl');
  if (el) {
    el.textContent = `${fmt(change)} ج`;
    el.style.color = paid >= grand && paid > 0 ? 'var(--green)' : 'var(--red)';
  }
}

function checkout() {
  if (cart.length === 0) { toast('الفاتورة فارغة!', 'r'); return; }
  const sub = cart.reduce((s,i) => s + i.sellPrice * i.qty, 0);
  const disc = parseFloat(document.getElementById('discPct')?.value || 0);
  const dAmt = sub * disc / 100;
  const total = sub - dAmt;
  const paid = parseFloat(document.getElementById('paidAmt')?.value || 0);
  const selMethod = document.querySelector('.pm.on')?.textContent?.trim() || 'نقدي';
  const isSplit   = selMethod.includes('مقسّم');
  const method    = isSplit ? 'مقسّم (نقدي+رقمي)' : selMethod;
  const custId = document.getElementById('invCustomer')?.value || '';

  if (method.includes('نقدي') && paid < total) { toast('المبلغ المدفوع أقل من الإجمالي!','r'); return; }

  // reduce stock
  cart.forEach(item => {
    const p = DB.products.find(x => x.id === item.id);
    if (p) p.stock -= item.qty;
  });

  // update customer debt if آجل
  if (custId && method.includes('آجل')) {
    const cust = DB.customers.find(c => c.id === custId);
    if (cust) { cust.debt = (cust.debt||0) + total; cust.totalBuy = (cust.totalBuy||0) + total; }
  } else if (custId) {
    const cust = DB.customers.find(c => c.id === custId);
    if (cust) cust.totalBuy = (cust.totalBuy||0) + total;
  }

  const inv = {
    id: genId(), no: currentInvoiceNo(), customerId: custId,
    items: cart.map(i => ({...i})),
    subtotal: sub, discount: dAmt, total, paid, method,
    splitCash: isSplit ? parseFloat(document.getElementById('split-cash')?.value||0) : null,
    splitDigital: isSplit ? parseFloat(document.getElementById('split-digital')?.value||0) : null,
    change: Math.max(0, paid - total),
    cashierId: currentUser.id, date: new Date().toISOString(), status: 'done'
  };
  DB.invoices.push(inv);
  DB.invoiceCounter++;
  log('فاتورة', `إنشاء فاتورة ${inv.no} بإجمالي ${fmt(total)} ج`);
  if (custId) addLoyaltyPoints(custId, total);
  scheduleAutoSave();
  toast(`✅ تم البيع — ${inv.no}`, 'g');
  cart = [];
  setTimeout(function(){BKUP.afterOperation('بيع');},300);
  renderPOS();
}

        <div><div style="font-size:11px;color:var(--txt3)">المدفوع</div><div style="font-size:18px;font-weight:700;color:var(--green)">${fmt(inv.paid||0)} ج</div></div>

      </div>

      </div>
      <div class="fg"><label class="flbl">طريقة الدفع</label>
        <select class="finput" id="inst-method">
          <option value="cash">💵 نقدي</option>
          <option value="card">💳 بطاقة</option>
          <option value="transfer">📱 تحويل</option>
        </select>
      </div>
      <div class="fg"><label class="flbl">ملاحظة (اختياري)</label>
        <input class="finput" id="inst-note" placeholder="سبب الدفع الجزئي...">
      </div>
    </div>
  `,[
    {label:'إلغاء',cls:'btn-ghost',fn:'closeModalDirect()'},
    {label:'💳 تسجيل الدفع',cls:'btn-gold',fn:`processInstallment('${invoiceId}')`}
  ],false,true);
}

function processInstallment(invoiceId) {
  // backup hook at end — see wrapper below
  const inv = DB.invoices.find(i=>i.id===invoiceId);
  if(!inv) return;
  const amount = parseFloat(document.getElementById('inst-amount')?.value||0);
  const method = document.getElementById('inst-method')?.value||'cash';
  const note   = document.getElementById('inst-note')?.value||'';
  if(!amount || amount<=0) { toast('أدخل المبلغ','r'); return; }
  const remaining = inv.total-(inv.paid||0);
  if(amount > remaining+0.01) { toast('المبلغ أكبر من المتبقي','r'); return; }

  inv.paid = (inv.paid||0) + amount;
  if(inv.paid >= inv.total - 0.01) {
    inv.status = 'done';
    inv.paid = inv.total;
    // Clear customer debt
    const cust = DB.customers.find(c=>c.id===inv.customerId);
    if(cust && inv.status==='partial') { cust.debt = Math.max(0,(cust.debt||0)-amount); }
  } else {
    inv.status = 'partial';
    const cust = DB.customers.find(c=>c.id===inv.customerId);
    if(cust) { cust.debt = Math.max(0,(cust.debt||inv.total)-(amount)); }
  }
  
  // Log payment
  log('دفعة',`قسط ${fmt(amount)} ج — فاتورة ${inv.no} — ${note}`);
  scheduleAutoSave();
  closeModalDirect();
  toast(`✅ تم تسجيل دفعة ${fmt(amount)} ج`, 'g');
  if(typeof renderInvoices === 'function') renderInvoices();
  if(typeof renderCustomers === 'function') renderCustomers();
  setTimeout(function(){BKUP.afterOperation('قسط');},200);
}

      </div>
      <div>${itemsHTML}</div>
      <div class="fg"><label class="flbl">سبب الإرجاع</label>
        <input class="finput" id="ret-reason" placeholder="عيب مصنعي / خطأ في الطلب...">
      </div>
    </div>
  `,[
    {label:'إلغاء',cls:'btn-ghost',fn:'closeModalDirect()'},
    {label:'🔄 تأكيد الإرجاع',cls:'btn-red',fn:`processReturn('${invoiceId}')`}
  ],false,true);
}

function processReturn(invoiceId) {
  const inv = DB.invoices.find(i=>i.id===invoiceId);
  if(!inv) return;
  const reason = document.getElementById('ret-reason')?.value||'';
  let totalRefund = 0;
  
  inv.items.forEach((item,idx)=>{
    const chk = document.getElementById('ret-chk-'+idx);
    const qty = parseInt(document.getElementById('ret-qty-'+idx)?.value||0);
    if(!chk?.checked || qty<=0) return;
    const retQty = Math.min(qty, item.qty);
    totalRefund += retQty * item.price;
    // Return stock
    const p = DB.products.find(x=>x.id===item.id);
    if(p) p.stock += retQty;
    // Mark item as returned
    item.returnedQty = (item.returnedQty||0) + retQty;
  });

  if(totalRefund===0) { toast('اختر الأصناف المُرجعة','r'); return; }

  // Update invoice
  inv.status = 'returned';
  inv.refundAmount = totalRefund;
  inv.returnReason = reason;
  inv.returnDate = new Date().toISOString();

  // Update customer debt if applicable
  const cust = DB.customers.find(c=>c.id===inv.customerId);
  if(cust) { cust.debt = Math.max(0,(cust.debt||0)-totalRefund); cust.totalBuy = Math.max(0,(cust.totalBuy||0)-totalRefund); }

  log('إرجاع',`إرجاع ${fmt(totalRefund)} ج — فاتورة ${inv.no} — ${reason}`);
  scheduleAutoSave();
  setTimeout(function(){BKUP.afterOperation('مرتجع');},200);
  closeModalDirect();
  toast(`✅ تم إرجاع ${fmt(totalRefund)} ج وتحديث المخزون`, 'g');
  if(typeof renderInvoices === 'function') renderInvoices();
}

function buildInvTable(list, canEdit) {
  if (list.length === 0) return `<div class="empty"><div class="empty-icon">📦</div><div class="empty-title">لا توجد منتجات</div><div class="empty-sub">أضف منتجات يدويًا أو استورد من Excel</div></div>`;
  return `<table><thead><tr>
    <th>المنتج</th><th>الفئة</th><th>الكمية</th><th>سعر الشراء</th><th>سعر البيع</th><th>هامش</th><th>الحالة</th>
    ${canEdit ? '<th>إجراءات</th>' : ''}
  </tr></thead><tbody>
  ${list.map(p => {
    const margin = p.sellPrice && p.buyPrice ? (((p.sellPrice - p.buyPrice) / p.sellPrice) * 100).toFixed(1) : '—';
    const stockStatus = p.stock === 0 ? `<span class="badge br">نفد</span>` : p.stock <= (p.minStock||0) && p.minStock > 0 ? `<span class="badge ba">منخفض</span>` : `<span class="badge bg">متوفر</span>`;
    return `<tr>
      <td style="display:flex;align-items:center;gap:8px">
        ${p.imgData
          ? `<img src="${p.imgData}" style="width:38px;height:38px;border-radius:6px;object-fit:cover;flex-shrink:0;border:1px solid var(--border2)" onclick="viewProductImage('${p.id}')" title="عرض الصورة" class="cp">`
          : `<div style="width:38px;height:38px;border-radius:6px;background:var(--raised);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid var(--border2)">${p.emoji||'📦'}</div>`}
        <div onclick="openProductDetail('${p.id}')" style="cursor:pointer">
          <b style="color:var(--txt)">${p.name}</b>
          <div style="font-size:10px;margin-top:1px;display:flex;gap:4px;flex-wrap:wrap">
            ${p.sku?`<span style="background:rgba(200,168,75,.1);color:var(--gold);padding:1px 5px;border-radius:4px">#${p.sku}</span>`:''}
            ${p.manufacturer?`<span style="color:var(--txt3)">${p.manufacturer}</span>`:''}
            ${p.barcode?`<span style="color:var(--txt3)">${p.barcode}</span>`:''}
          </div>
        </div>
      </td>
      <td>${p.category||'—'}</td>
      <td style="font-weight:700;color:${p.stock===0?'var(--red)':p.stock<=(p.minStock||0)&&p.minStock>0?'var(--amber)':'var(--green)'}">${p.stock} ${p.unit||''}</td>
      <td>${fmt(p.buyPrice)} ج</td>
      <td style="color:var(--gold);font-weight:700">${fmt(p.sellPrice)} ج</td>
      <td style="color:var(--green)">${margin}%</td>
      <td>${stockStatus}</td>
      ${canEdit ? `<td style="display:flex;gap:3px;flex-wrap:wrap">
        <button class="btn-icon" onclick="openStockAdjust('${p.id}')" title="ضبط الرصيد">🔢</button>
        <button class="btn-icon" onclick="openEditProduct('${p.id}')" title="تعديل">✏️</button>
        ${p.barcode?`<button class="btn-icon" onclick="openBarcodePrintDialog('${p.id}')" title="طباعة باركود">🏷️</button>`:''}
        <button class="btn-icon" onclick="openSKULabelDialog('${p.id}')" title="طباعة بطاقة SKU">🔖</button>
        <button class="btn-icon red" onclick="deleteProduct('${p.id}')" title="حذف">🗑️</button>
      </td>` : ''}
    </tr>`;
  }).join('')}
  </tbody></table>`;
}

function filterInv() {
  const q = (document.getElementById('invSearch')?.value||'').toLowerCase();
  const cat = document.getElementById('invCatFilter')?.value||'';
  const list = DB.products.filter(p =>
    (!q || p.name.toLowerCase().includes(q) || (p.barcode||'').includes(q)) &&
    (!cat || p.category === cat)
  );
  const canEdit = currentPerms.editPrices || currentUser.role === 'owner' || currentUser.role === 'manager';
  document.getElementById('invTable').innerHTML = buildInvTable(list, canEdit);
  setTxt('invCount', `${list.length} منتج`);
}

function saveProduct(editId) {
  const name = document.getElementById('mp-name')?.value?.trim();
  if (!name) { toast('اسم المنتج مطلوب','r'); return; }
  // Generate SKU if new product
  let sku = '';
  if (!editId) {
    DB.skuCounter = (DB.skuCounter||0) + 1;
    sku = String(DB.skuCounter).padStart(3,'0');
  } else {
    sku = DB.products.find(p=>p.id===editId)?.sku || String(DB.skuCounter||1).padStart(3,'0');
  }
  const prod = {
    id: editId || genId(),
    sku,
    name, category: val('mp-cat'), unit: val('mp-unit'),
    buyPrice: num('mp-buy'), sellPrice: num('mp-sell'),
    sellPrice2: num('mp-sell2') || 0,
    stock: num('mp-stock'), minStock: num('mp-min'),
    manufacturer: val('mp-mfr') || '',
    brand: val('mp-brand') || '',
    notes: val('mp-notes') || '',
    barcode: val('mp-barcode'), barcodeFormat: val('mp-bfmt')||'auto', emoji: val('mp-emoji') || '📦',
    expiry: val('mp-expiry'),
    imgData: val('mp-img-data') || (editId ? (DB.products.find(p=>p.id===editId)||{}).imgData : '') || '',
  };
  if (editId) {
    const i = DB.products.findIndex(p => p.id === editId);
    if (i >= 0) DB.products[i] = prod;
    log('مخزون', `تعديل منتج: ${name}`);
  } else {
    DB.products.push(prod);
    log('مخزون', `إضافة منتج: ${name}`);
  }
  scheduleAutoSave();
  closeModalDirect();
  toast(`تم ${editId ? 'تعديل' : 'إضافة'} المنتج`, 'g');
  renderInventory();
}

function deleteProduct(id) {
  if (!currentPerms.editStock && currentUser.role !== 'owner') { toast('لا تملك صلاحية الحذف','r'); return; }
  const p = DB.products.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`حذف المنتج "${p.name}"؟ هذا الإجراء لا يمكن التراجع عنه.`)) return;
  DB.products = DB.products.filter(x => x.id !== id);
  log('مخزون', `حذف منتج: ${p.name}`);
  toast('تم حذف المنتج', 'g');
  scheduleAutoSave();
  renderInventory();
}

function exportInventory() {
  if (DB.products.length === 0) { toast('لا توجد منتجات للتصدير','a'); return; }
  const data = DB.products.map(p => ({
    'الاسم': p.name, 'الفئة': p.category||'', 'الوحدة': p.unit||'',
    'سعر الشراء': p.buyPrice||0, 'سعر البيع': p.sellPrice||0,
    'الكمية': p.stock||0, 'الحد الأدنى': p.minStock||0,
    'الباركود': p.barcode||'', 'الرمز': p.emoji||'',
  }));
  exportToExcel(data, 'المنتجات');
}

function buildCustTable(list, canEdit) {

  return `<table><thead><tr><th>الاسم</th><th>التليفون</th><th>التصنيف</th><th>إجمالي المشتريات</th><th>الدين</th>${canEdit?'<th>إجراءات</th>':''}</tr></thead><tbody>
  ${list.map(cu => `<tr>
    <td style="font-weight:600">${cu.name}</td>
    <td style="color:var(--txt3)">${cu.phone||'—'}</td>
    <td>${cu.type==='VIP'?`<span class="badge bgold">VIP 🌟</span>`:`<span class="badge bb">عادي</span>`}</td>

function saveCustomer(editId) {
  const name = document.getElementById('mc-name')?.value?.trim();
  if (!name) { toast('الاسم مطلوب','r'); return; }
  const openingDebt = num('mc-debt') || 0;
  const debtType    = val('mc-debt-type') || 'debt';
  const cu = {
    id: editId||genId(), name,
    phone: val('mc-phone'), type: val('mc-type'),
    debtLimit: num('mc-limit'), address: val('mc-addr'),
    notes: val('mc-notes'), totalBuy: openingDebt, debt: debtType==='debt' ? openingDebt : -openingDebt,
    openingBalance: openingDebt, openingBalanceType: debtType,
  };
  if (editId) {
    const idx = DB.customers.findIndex(c => c.id === editId);
    if (idx >= 0) { cu.totalBuy = DB.customers[idx].totalBuy; cu.debt = DB.customers[idx].debt; DB.customers[idx] = cu; }
    log('عملاء', `تعديل عميل: ${name}`);
  } else {
    DB.customers.push(cu);
    log('عملاء', `إضافة عميل: ${name}`);
  }
  closeModalDirect();
  toast(`تم ${editId?'تعديل':'إضافة'} العميل`, 'g');
  scheduleAutoSave();
  renderCustomers();
}

function openEditCustomer(id) {
  const cu = DB.customers.find(x => x.id === id);
  if (!cu) return;
  openModal('✏️ تعديل عميل', `
    <div class="frow f2"><div class="fg"><label class="flbl">الاسم *</label><input class="finput" id="mc-name" value="${cu.name}"></div>
    <div class="fg"><label class="flbl">التليفون</label><input class="finput" id="mc-phone" value="${cu.phone||''}"></div></div>
    <div class="frow f2"><div class="fg"><label class="flbl">التصنيف</label><select class="fsel" id="mc-type">${['عادي','VIP','جملة'].map(t=>`<option ${cu.type===t?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="fg"><label class="flbl">حد الدين (ج)</label><input class="finput" type="number" id="mc-limit" value="${cu.debtLimit||0}"></div></div>
    <div class="frow"><div class="fg"><label class="flbl">العنوان</label><input class="finput" id="mc-addr" value="${cu.address||''}"></div></div>
    <div class="frow"><div class="fg"><label class="flbl">ملاحظات</label><input class="finput" id="mc-notes" value="${cu.notes||''}"></div></div>
  `, [
    {label:'إلغاء', cls:'btn-ghost', fn:'closeModalDirect()'},
    {label:'💾 حفظ التعديلات', cls:'btn-gold', fn:`saveCustomer('${id}')`},
  ]);
}

function deleteCustomer(id) {
  const cu = DB.customers.find(x => x.id === id);
  if (!cu) return;
  if (!confirm(`حذف العميل "${cu.name}"؟`)) return;
  DB.customers = DB.customers.filter(x => x.id !== id);
  log('عملاء', `حذف عميل: ${cu.name}`);
  toast('تم حذف العميل', 'g');
  scheduleAutoSave();
  renderCustomers();
}

function exportCustomers() {
  if (!DB.customers.length) { toast('لا يوجد عملاء للتصدير','a'); return; }
  exportToExcel(DB.customers.map(c => ({'الاسم':c.name,'التليفون':c.phone||'','التصنيف':c.type||'','الدين':c.debt||0,'إجمالي المشتريات':c.totalBuy||0})), 'العملاء');
}

// ══ INVOICE BROWSER — التقليب بين الفواتير ══
let _invList = [];
let _invIdx  = 0;

function viewInvoice(id, list) {
  _invList = list || [...DB.invoices].reverse();
  const idx = _invList.findIndex(i => i.id === id);
  _invIdx = idx >= 0 ? idx : 0;
  _showInv();
}

function _showInv() {
  const inv  = _invList[_invIdx];
  if (!inv) return;
  const cust = DB.customers.find(c => c.id === inv.customerId);
  const total= _invList.length;
  const paid = inv.paid !== undefined ? inv.paid : inv.total;
  const remaining = Math.max(0, inv.total - paid);
  const statusMap = { done:'✅ مكتمل', partial:'⏳ جزئي', returned:'🔄 مُرجع', pending:'🕐 معلق' };

  const html = `<div style="direction:rtl">
    <!-- NAV -->
    <div style="display:flex;align-items:center;justify-content:space-between;background:var(--raised);border-radius:10px;padding:8px 14px;margin-bottom:12px">
      <button onclick="if(_invIdx<_invList.length-1){_invIdx++;_showInv()}" style="padding:6px 16px;border-radius:8px;border:1px solid var(--border2);background:var(--hover);color:var(--txt);font-family:inherit;font-size:13px;cursor:pointer" ${_invIdx>=_invList.length-1?'disabled style="opacity:.3;cursor:default;padding:6px 16px;border-radius:8px;border:1px solid var(--border2);font-family:inherit;font-size:13px"':''}>
        ▶ السابق
      </button>
      <div style="text-align:center">
        <div style="font-size:10px;color:var(--txt3)">${_invIdx+1} / ${total} فاتورة</div>
        <div style="font-size:15px;font-weight:700;color:var(--gold)">${inv.no}</div>
      </div>
      <button onclick="if(_invIdx>0){_invIdx--;_showInv()}" style="padding:6px 16px;border-radius:8px;border:1px solid var(--border2);background:var(--hover);color:var(--txt);font-family:inherit;font-size:13px;cursor:pointer" ${_invIdx<=0?'disabled style="opacity:.3;cursor:default;padding:6px 16px;border-radius:8px;border:1px solid var(--border2);font-family:inherit;font-size:13px"':''}>
        التالي ◀
      </button>
    </div>
    <!-- HEADER -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div style="background:var(--raised);border-radius:10px;padding:11px">
        <div style="font-size:10px;color:var(--txt3)">العميل</div>
        <div style="font-weight:700;margin-top:2px">${cust?.name||'عميل نقدي'}</div>
        ${cust?.phone?`<div style="font-size:11px;color:var(--txt3);margin-top:2px">${cust.phone}</div>`:''}
      </div>
      <div style="background:var(--raised);border-radius:10px;padding:11px">
        <div style="font-size:10px;color:var(--txt3)">التاريخ والحالة</div>
        <div style="font-weight:700;font-size:12px;margin-top:2px">${fmtDate(inv.date||inv.created_at)}</div>
        <div style="font-size:11px;font-weight:700;margin-top:3px;color:${inv.status==='done'?'var(--green)':inv.status==='partial'?'var(--amber)':'var(--red)'}">${statusMap[inv.status]||inv.status||'—'}</div>
      </div>
    </div>
    <!-- ITEMS -->
    <div style="max-height:190px;overflow-y:auto;margin-bottom:10px">
      <table style="font-size:12px">
        <thead><tr><th>الصنف</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead>
        <tbody>${inv.items.map(it=>`<tr>
          <td>${it.emoji||'📦'} ${it.name}</td>
          <td style="text-align:center">${it.qty}</td>
          <td>${fmt(it.price||it.sellPrice||0)} ج</td>
          <td style="color:var(--gold);font-weight:700">${fmt((it.price||it.sellPrice||0)*it.qty)} ج</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>
    <!-- TOTALS -->
    <div style="background:var(--raised);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:5px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between"><span style="color:var(--txt3)">المجموع</span><span>${fmt(inv.subtotal||inv.total)} ج</span></div>
      ${(inv.discount||0)>0?`<div style="display:flex;justify-content:space-between"><span style="color:var(--txt3)">الخصم</span><span style="color:var(--red)">- ${fmt(inv.discount)} ج</span></div>`:''}
      <div style="display:flex;justify-content:space-between;font-size:17px;font-weight:700;padding-top:5px;border-top:1px solid var(--border)"><span>الإجمالي</span><span style="color:var(--gold)">${fmt(inv.total)} ج</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:var(--txt3)">المدفوع</span><span style="color:var(--green)">${fmt(paid)} ج</span></div>
      ${remaining>0.01?`<div style="display:flex;justify-content:space-between;font-weight:700"><span style="color:var(--red)">المتبقي</span><span style="color:var(--red)">${fmt(remaining)} ج</span></div>`:''}
      <div style="display:flex;justify-content:space-between"><span style="color:var(--txt3)">طريقة الدفع</span><span>${inv.method==='cash'?'💵 نقدي':inv.method==='card'?'💳 بطاقة':'📱 تحويل'}</span></div>
    </div>
    <!-- ACTIONS -->
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button onclick="printInvoice('${inv.id}')" style="flex:1;min-width:100px;padding:8px;border-radius:8px;border:1px solid var(--border2);background:var(--raised);color:var(--txt);font-family:inherit;font-size:12px;cursor:pointer">🖨️ 80mm</button>
      <button onclick="printInvoice('${inv.id}','a4')" style="flex:1;min-width:100px;padding:8px;border-radius:8px;border:1px solid var(--border2);background:var(--raised);color:var(--txt);font-family:inherit;font-size:12px;cursor:pointer">📄 A4</button>
      ${remaining>0.01&&inv.status!=='returned'?`<button onclick="closeModalDirect();openInstallmentModal('${inv.id}')" style="flex:1;min-width:100px;padding:8px;border-radius:8px;border:none;background:rgba(200,168,75,.15);color:var(--gold);font-family:inherit;font-size:12px;cursor:pointer;font-weight:700">💳 دفع قسط</button>`:''}
      ${inv.status!=='returned'?`<button onclick="closeModalDirect();openReturnModal('${inv.id}')" style="flex:1;min-width:100px;padding:8px;border-radius:8px;border:1px solid rgba(245,158,11,.3);background:rgba(245,158,11,.06);color:var(--amber);font-family:inherit;font-size:12px;cursor:pointer">🔄 إرجاع</button>`:''}
      ${cust&&cust.phone?`<button onclick="sendInvoiceWhatsApp('${inv.id}')" style="flex:1;min-width:100px;padding:8px;border-radius:8px;border:none;background:rgba(37,211,102,.1);color:#25d366;font-family:inherit;font-size:12px;cursor:pointer">📱 واتساب</button>`:''}
    </div>
  </div>`;

  const mb = document.getElementById('modalBody');
  if (mb) {
    mb.innerHTML = html;
  } else {
    openModal('🧾 الفواتير', html, [{label:'إغلاق', cls:'btn-ghost', fn:'closeModalDirect();_invList=[]'}], true, true);
  }

  // Arrow key navigation
  document._invNav && document.removeEventListener('keydown', document._invNav);
  document._invNav = e => {
    if (!document.getElementById('modalBody')) return;
    if (e.key==='ArrowRight'||e.key==='ArrowUp') { e.preventDefault(); if(_invIdx<_invList.length-1){_invIdx++;_showInv();} }
    if (e.key==='ArrowLeft'||e.key==='ArrowDown') { e.preventDefault(); if(_invIdx>0){_invIdx--;_showInv();} }
  };
  document.addEventListener('keydown', document._invNav);
}

function deleteInvoice(id) {
  if (!currentPerms.deleteInvoice) { toast('لا تملك صلاحية حذف الفواتير','r'); return; }
  if (!confirm('حذف هذه الفاتورة نهائيًا؟')) return;
  DB.invoices = DB.invoices.filter(i => i.id !== id);
  log('فاتورة', `حذف فاتورة ID:${id}`);
  toast('تم حذف الفاتورة', 'g');
  scheduleAutoSave();
  renderInvoices();
}

function exportInvoices() {
  if (!DB.invoices.length) { toast('لا توجد فواتير','a'); return; }
  exportToExcel(DB.invoices.map(inv => ({
    'رقم الفاتورة': inv.no,
    'العميل': DB.customers.find(c=>c.id===inv.customerId)?.name||'عميل نقدي',

    'طريقة الدفع': inv.method,
    'الحالة': inv.status,
    'التاريخ': fmtDate(inv.date),
  })), 'الفواتير');
}

let _purItemCount = 0;
let _purItems = {}; // {idx: {productId, qty, buyPrice}}

function purSearch() {
  const q = (document.getElementById('pur-search')?.value || '').toLowerCase().trim();
  const res = document.getElementById('pur-search-results');
  if (!q) { if(res) res.style.display='none'; return; }

  // Exact barcode/SKU → add directly
  const exact = DB.products.find(p =>
    (p.barcode && p.barcode.toLowerCase() === q) ||
    (p.sku && p.sku.toLowerCase() === q)
  );
  if (exact) {
    addPurItem(exact.id);
    document.getElementById('pur-search').value = '';
    if(res) res.style.display='none';
    barcodeBeep('ok');
    return;
  }

  // Partial results
  const matches = DB.products.filter(p => p.active!==false && (
    p.name.toLowerCase().includes(q) ||
    (p.barcode||'').toLowerCase().includes(q) ||
    (p.sku||'').toLowerCase().includes(q)
  )).slice(0, 8);

  if (!matches.length) { if(res){res.style.display='none';} return; }

  if (res) {
    res.style.display = 'block';
    res.innerHTML = matches.map(p => `
      <div onclick="addPurItem('${p.id}');document.getElementById('pur-search').value='';document.getElementById('pur-search-results').style.display='none'"
        style="padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px"
        onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background=''">
        <span style="font-size:20px">${p.emoji||'📦'}</span>
        <div style="flex:1">
          <div style="font-weight:600;font-size:13px">${p.name}</div>
          <div style="font-size:10px;color:var(--txt3)">${p.sku?'#'+p.sku+' · ':''} سعر شراء: ${fmt(p.buyPrice||0)} ج</div>
        </div>
        <span style="font-size:12px;color:var(--gold);font-weight:700">${fmt(p.sellPrice||0)} ج</span>
      </div>`).join('');
  }
}

function addPurItem(productId) {
  const p = productId ? DB.products.find(x=>x.id===productId) : null;
  const tbody = document.getElementById('pur-items-body');
  if (!tbody) return;

  // If product already in list, increment qty
  if (p) {
    const existing = Object.entries(_purItems).find(([idx,item])=>item.productId===productId);
    if (existing) {
      const [idx] = existing;
      const qtyEl = document.getElementById('pur-qty-'+idx);
      if (qtyEl) { qtyEl.value = (parseFloat(qtyEl.value)||0) + 1; updatePurTotal(); return; }
    }
  }

  const idx = _purItemCount++;
  _purItems[idx] = { productId: p?.id||'', qty: 1, buyPrice: p?.buyPrice||0 };

  const row = document.createElement('tr');
  row.id = 'pur-row-'+idx;
  row.style.borderBottom = '1px solid rgba(255,255,255,.04)';
  row.innerHTML = `
    <td style="padding:6px 8px">
      ${p ? `<b>${p.emoji||'📦'} ${p.name}</b><div style="font-size:10px;color:var(--txt3)">${p.sku?'#'+p.sku:''} ${p.barcode?'· '+p.barcode:''}</div>`
           : `<select class="fsel" id="pur-sel-${idx}" onchange="onPurSelChange(${idx})" style="font-size:12px">
                <option value="">اختر منتج...</option>
                ${DB.products.filter(p=>p.active!==false).map(pr=>`<option value="${pr.id}">${pr.emoji||'📦'} ${pr.name}</option>`).join('')}
              </select>`}
    </td>
    <td style="padding:6px 8px;text-align:center">
      <input type="number" id="pur-qty-${idx}" value="1" min="0.01" step="0.01"
        oninput="updatePurTotal()"
        style="width:70px;background:var(--raised);border:1px solid var(--border2);border-radius:6px;padding:5px;color:var(--txt);font-family:inherit;font-size:12px;text-align:center">
    </td>
    <td style="padding:6px 4px;text-align:center">
      <input type="number" id="pur-price-${idx}" value="${p?.buyPrice||0}" min="0" step="0.01"
        oninput="updatePurTotal();updatePurPrices(${idx})"
        style="width:82px;background:var(--raised);border:1px solid var(--border2);border-radius:6px;padding:5px;color:var(--amber,#f59e0b);font-family:inherit;font-size:12px;text-align:center;font-weight:700">
    </td>
    <td style="padding:6px 4px;text-align:center">
      <input type="number" id="pur-sell-${idx}" value="${p?.sellPrice||0}" min="0" step="0.01"
        oninput="updatePurTotal()"
        style="width:82px;background:var(--raised);border:1px solid var(--border2);border-radius:6px;padding:5px;color:var(--green);font-family:inherit;font-size:12px;text-align:center;font-weight:700">
    </td>
    <td style="padding:6px 4px;text-align:center;color:var(--gold);font-weight:700" id="pur-sub-${idx}">
      ${fmt((p?.buyPrice||0)*1)}
    </td>
    <td style="padding:6px 4px;text-align:center">
      <button onclick="removePurItem(${idx})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px">✕</button>
    </td>`;
  tbody.appendChild(row);
  updatePurTotal();
  // Focus qty field for quick entry
  setTimeout(()=>document.getElementById('pur-qty-'+idx)?.focus(), 50);
}

function onPurSelChange(idx) {
  const pid = document.getElementById('pur-sel-'+idx)?.value;
  if (!pid) return;
  const p = DB.products.find(x=>x.id===pid);
  if (!p) return;
  _purItems[idx] = { productId: pid, qty: 1, buyPrice: p.buyPrice||0 };
  const priceEl = document.getElementById('pur-price-'+idx);
  if (priceEl) priceEl.value = p.buyPrice||0;
  updatePurTotal();
}

function updatePurPrices(idx) {
  const buyPrice = parseFloat(document.getElementById('pur-price-'+idx)?.value||0);
  if (_purItems[idx]) _purItems[idx].buyPrice = buyPrice;
  const qty = parseFloat(document.getElementById('pur-qty-'+idx)?.value||0);
  const sub = document.getElementById('pur-sub-'+idx);
  if (sub) sub.textContent = fmt(buyPrice * qty);
  // Auto-suggest sell price if not manually set (margin 30%)
  const sellEl = document.getElementById('pur-sell-'+idx);
  if (sellEl && (!parseFloat(sellEl.value) || sellEl.dataset.autoset)) {
    const suggested = Math.ceil(buyPrice * 1.3);
    sellEl.value = suggested;
    sellEl.dataset.autoset = '1';
  }
}

function removePurItem(idx) {
  const row = document.getElementById('pur-row-'+idx);
  if (row) row.remove();
  delete _purItems[idx];
  updatePurTotal();
}

function updatePurTotal() {
  let total = 0;
  Object.keys(_purItems).forEach(idx => {
    const qty = parseFloat(document.getElementById('pur-qty-'+idx)?.value||0);
    const price = parseFloat(document.getElementById('pur-price-'+idx)?.value||0);
    const sub = qty * price;
    const subEl = document.getElementById('pur-sub-'+idx);
    if (subEl) subEl.textContent = fmt(sub);
    total += sub;
  });
  const totalEl = document.getElementById('pur-grand-total');
  if (totalEl) totalEl.textContent = fmt(total);
}

  toast(`✅ تم إضافة "${name}"`, 'g');

let purItemCount = 1;
function savePurchase(){
  const supId = val('pur-sup');
  if(!supId){ toast('اختر موردًا','r'); return; }

  const items = [];
  Object.keys(_purItems).forEach(idx=>{
    const pid = _purItems[idx]?.productId ||
                document.getElementById('pur-sel-'+idx)?.value;
    if(!pid) return;
    const qty   = parseFloat(document.getElementById('pur-qty-'+idx)?.value||0);
    const price = parseFloat(document.getElementById('pur-price-'+idx)?.value||0);
    if(qty > 0){
      const sellPrice = parseFloat(document.getElementById('pur-sell-'+idx)?.value||0);
      items.push({productId:pid, qty, buyPrice:price, sellPrice, total:qty*price});
      const prod = DB.products.find(p=>p.id===pid);
      if(prod){
        prod.stock = (prod.stock||0) + qty;
        if(price > 0) prod.buyPrice = price;
        if(sellPrice > 0) prod.sellPrice = sellPrice;
        // Update warehouse stock
        const mainWH = typeof getMainWH==='function' ? getMainWH() : null;
        if(mainWH){ addStock(mainWH.id, pid, qty); }
      }
    }
  });

  if(!items.length){ toast('أضف أصنافاً للفاتورة','r'); return; }

  const total = items.reduce((s,i)=>s+i.total, 0);
  const pur = {
    id:genId(), supplierId:supId, items, total,
    date: val('pur-date')||new Date().toISOString().slice(0,10),
    notes: val('pur-notes')||'',
    cashierId: currentUser.id
  };
  DB.purchases.push(pur);

  // Update supplier balance
  const sup = DB.suppliers.find(s=>s.id===supId);
  if(sup) sup.totalOwed = (sup.totalOwed||0) + total;

  log('مشتريات', `استلام من ${sup?.name||'مورد'} — ${fmt(total)} ج`);
  _purItems = {};
  closeModalDirect();
  toast('✅ تم تسجيل الاستلام — '+fmt(total)+' ج','g');
  scheduleAutoSave();
  setTimeout(()=>{ BKUP.afterOperation('مشتريات'); },200);
  renderPurchases();
}

  `,[{label:'إلغاء',cls:'btn-ghost',fn:'closeModalDirect()'},{label:'💾 حفظ',cls:'btn-gold',fn:'saveExpense()'}]);
}
function saveExpense(){
  const amt=num('ex-amt');if(!amt){toast('المبلغ مطلوب','r');return}
  const e={id:genId(),type:val('ex-type'),amount:amt,note:val('ex-note'),date:new Date().toISOString(),cashierId:currentUser.id};
  DB.expenses.push(e);log('مصروفات',`مصروف: ${e.type} — ${fmt(amt)} ج`);
  closeModalDirect();toast('تم تسجيل المصروف','g');scheduleAutoSave();
  setTimeout(function(){BKUP.afterOperation('مصروف');},200);renderExpenses();
}
function deleteExpense(id){if(!confirm('حذف هذا المصروف؟'))return;DB.expenses=DB.expenses.filter(x=>x.id!==id);toast('تم الحذف','g');renderExpenses();}
function exportExpenses(){if(!DB.expenses.length){toast('لا توجد مصروفات','a');return}exportToExcel(DB.expenses.map(e=>({'النوع':e.type,'المبلغ':e.amount,'الملاحظة':e.note||'','التاريخ':fmtDate(e.date)})),'المصروفات');}

function renderReports() {
  const c = document.getElementById('content');
  const tab = window._rptTab || 'summary';
  
  // ── Data helpers ──
  const done = DB.invoices.filter(i=>i.status==='done');
  const totalSales = done.reduce((s,i)=>s+i.total,0);
  const totalCost  = done.reduce((s,inv)=>s+inv.items.reduce((ss,it)=>{const p=DB.products.find(x=>x.id===it.id);return ss+(p?.buyPrice||0)*it.qty},0),0);
  const totalExp   = DB.expenses.reduce((s,e)=>s+e.amount,0);
  const grossProfit= totalSales-totalCost;
  const netProfit  = grossProfit-totalExp;

  // ── Today / This month / This year ──
  const now   = new Date();
  const todayS= now.toDateString();
  const thisM = now.getMonth();
  const thisY = now.getFullYear();

  function periodSales(invArr, filter) {
    const f = invArr.filter(filter);
    const sales = f.reduce((s,i)=>s+i.total,0);
    const cost  = f.reduce((s,inv)=>s+inv.items.reduce((ss,it)=>{const p=DB.products.find(x=>x.id===it.id);return ss+(p?.buyPrice||0)*it.qty},0),0);
    const exp   = DB.expenses.filter(filter.toString().includes('toDateString') ? e=>new Date(e.date).toDateString()===todayS : e=>true).reduce((s,e)=>s+e.amount,0);
    return {sales, cost, profit: sales-cost, count: f.length};
  }

  const todayData = periodSales(done, i=>new Date(i.date||i.created_at).toDateString()===todayS);
  const monthData = periodSales(done, i=>{const d=new Date(i.date||i.created_at);return d.getMonth()===thisM&&d.getFullYear()===thisY;});
  const yearData  = periodSales(done, i=>new Date(i.date||i.created_at).getFullYear()===thisY);

  // ── Last 7 days comparison ──
  function last7() {
    const days=[];
    for(let d=6;d>=0;d--){
      const dt=new Date(); dt.setDate(dt.getDate()-d);
      const ds=dt.toDateString();
      const inv=done.filter(i=>new Date(i.date||i.created_at).toDateString()===ds);
      days.push({label:dt.toLocaleDateString('ar-EG',{weekday:'short',day:'numeric'}), sales:inv.reduce((s,i)=>s+i.total,0), count:inv.length});
    }
    return days;
  }

  // ── Last 12 months comparison ──
  function last12months() {
    const months=[];
    for(let m=11;m>=0;m--){
      const dt=new Date(thisY,thisM-m,1);
      const inv=done.filter(i=>{const d=new Date(i.date||i.created_at);return d.getMonth()===dt.getMonth()&&d.getFullYear()===dt.getFullYear();});
      months.push({label:dt.toLocaleDateString('ar-EG',{month:'short',year:'2-digit'}), sales:inv.reduce((s,i)=>s+i.total,0), count:inv.length});
    }
    return months;
  }

  const days7   = last7();
  const months12= last12months();
  const maxDay  = Math.max(...days7.map(d=>d.sales),1);
  const maxMonth= Math.max(...months12.map(m=>m.sales),1);

  function barChart(data, maxVal, color) {
    return data.map(d=>`
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:0">
        <div style="font-size:10px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center">${fmt(d.sales)}</div>
        <div style="width:100%;background:var(--raised);border-radius:4px 4px 0 0;height:80px;display:flex;align-items:flex-end;overflow:hidden">
          <div style="width:100%;background:${color};border-radius:3px 3px 0 0;height:${Math.max(4,(d.sales/maxVal)*80)}px;transition:.3s"></div>
        </div>
        <div style="font-size:9px;color:var(--txt3);text-align:center;white-space:nowrap;overflow:hidden;max-width:100%">${d.label}</div>
      </div>`).join('');
  }

  c.innerHTML = `<div class="pg">
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">

      <button class="btn ${tab==='daily'?'btn-gold':'btn-ghost'}" onclick="window._rptTab='daily';renderReports()">📅 يومي</button>
      <button class="btn ${tab==='monthly'?'btn-gold':'btn-ghost'}" onclick="window._rptTab='monthly';renderReports()">🗓️ شهري</button>
      <button class="btn ${tab==='compare'?'btn-gold':'btn-ghost'}" onclick="window._rptTab='compare';renderReports()">📈 مقارنة</button>
      <button class="btn btn-ghost" onclick="openComparisonReport()">📊 مقارنة الأشهر</button>
      <button class="btn ${tab==='expenses'?'btn-gold':'btn-ghost'}" onclick="window._rptTab='expenses';renderReports()">💸 مصروفات</button>
      <div style="flex:1"></div>

      ${currentPerms.seeProfits?`

      <div class="stat cc-blue"><div class="stat-icon si-blue">✨</div><div class="stat-val">${fmt(netProfit)}</div><div class="stat-lbl">صافي الربح</div></div>

      <div class="stat cc-red"><div class="stat-icon si-red">💸</div><div class="stat-val">${fmt(totalExp)}</div><div class="stat-lbl">إجمالي المصروفات</div></div>
    </div>
    <div class="g2">
      <div class="card"><div class="card-head"><span>🏆</span><span class="card-title">أكثر المنتجات مبيعًا</span></div>${buildTopProducts()}</div>
      <div class="card"><div class="card-head"><span>👥</span><span class="card-title">أعلى العملاء مشتريات</span></div>${buildTopCustomers()}</div>
    </div>` : ''}

    ${tab==='daily' ? `
