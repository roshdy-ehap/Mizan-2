<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizan POS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #070d1a;
            color: #e1e8ed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: #0f1929;
            border-bottom: 2px solid #1e293b;
            padding: 20px 0;
            margin-bottom: 30px;
        }

        h1 {
            color: #3b82f6;
            font-size: 28px;
            font-weight: 600;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #0f1929;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #3b82f6;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.1);
        }

        .card h2 {
            color: #3b82f6;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .card p {
            color: #94a3b8;
            font-size: 14px;
        }

        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #2563eb;
        }

        .section {
            background: #0f1929;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section h2 {
            color: #3b82f6;
            margin-bottom: 15px;
            font-size: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #1e293b;
        }

        th {
            background: #1e293b;
            color: #3b82f6;
            font-weight: 600;
        }

        tr:hover {
            background: #1e293b;
        }

        .status-active {
            color: #10b981;
        }

        .status-inactive {
            color: #ef4444;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #64748b;
            border-top: 1px solid #1e293b;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>نظام ميزان نقاط البيع</h1>
        </div>
    </header>

    <div class="container">
        <div class="dashboard">
            <div class="card">
                <h2>المبيعات اليومية</h2>
                <p id="daily-sales">0.00 ريال</p>
            </div>
            <div class="card">
                <h2>عدد الفواتير</h2>
                <p id="invoice-count">0</p>
            </div>
            <div class="card">
                <h2>المنتجات</h2>
                <p id="product-count">0</p>
            </div>
            <div class="card">
                <h2>العملاء</h2>
                <p id="customer-count">0</p>
            </div>
        </div>

        <div class="section">
            <h2>الفواتير الأخيرة</h2>
            <table>
                <thead>
                    <tr>
                        <th>رقم الفاتورة</th>
                        <th>التاريخ</th>
                        <th>المبلغ</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody id="invoices-table">
                    <tr>
                        <td colspan="4" style="text-align: center; color: #64748b;">لا توجد فواتير</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="section">
            <h2>الإجراءات السريعة</h2>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn" onclick="newInvoice()">فاتورة جديدة</button>
                <button class="btn" onclick="addProduct()">إضافة منتج</button>
                <button class="btn" onclick="manageCustomers()">إدارة العملاء</button>
                <button class="btn" onclick="viewReports()">التقارير</button>
                <button class="btn" onclick="backup()">نسخ احتياطية</button>
            </div>
        </div>
    </div>

    <footer>
        <p>نظام ميزان لنقاط البيع - الإصدار 3.1.0</p>
        <p style="font-size: 12px; margin-top: 5px;">جميع الحقوق محفوظة © 2026</p>
    </footer>

    <script>
        // تحميل البيانات عند بدء التطبيق
        window.addEventListener('DOMContentLoaded', () => {
            loadDashboardData();
        });

        function loadDashboardData() {
            // هذا مثال على كيفية تحميل البيانات
            // يمكنك توصيله بـ IPC handlers في main.js
            console.log('Dashboard loaded');
        }

        function newInvoice() {
            alert('فاتورة جديدة');
        }

        function addProduct() {
            alert('إضافة منتج جديد');
        }

        function manageCustomers() {
            alert('إدارة العملاء');
        }

        function viewReports() {
            alert('التقارير');
        }

        function backup() {
            alert('إنشاء نسخة احتياطية');
        }
    </script>
</body>
</html>
